<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dispoziții — ARAFURA</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#7c3aed">
  <script src="config.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --purple: #7c3aed; --purple-dark: #6d28d9; --purple-light: #ede9fe;
      --blue: #1e40af; --blue-light: #dbeafe;
      --green: #16a34a; --green-dark: #15803d; --green-light: #d1fae5;
      --red: #dc2626; --red-light: #fee2e2;
      --orange: #ea580c; --orange-light: #ffedd5;
      --navy: #1e293b; --text: #0f172a; --sub: #64748b;
      --bg: #f8fafc; --card: #ffffff; --border: #e2e8f0;
      --radius: 12px;
    }
    body {
      font-family: 'Segoe UI', -apple-system, system-ui, sans-serif;
      background: var(--bg); color: var(--text); min-height: 100dvh;
    }
    .header {
      background: linear-gradient(135deg, var(--purple) 0%, var(--purple-dark) 100%);
      color: white; padding: 14px 20px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 12px rgba(124,58,237,.3);
      position: sticky; top: 0; z-index: 100; gap: 16px;
    }
    .header-left { display: flex; align-items: center; gap: 14px; min-width: 0; }
    .header h1 { font-size: 19px; font-weight: 800; letter-spacing: .3px; white-space: nowrap; }
    .header-user {
      font-size: 12px; opacity: .9; background: rgba(255,255,255,.12);
      padding: 4px 12px; border-radius: 14px; border: 1px solid rgba(255,255,255,.18);
      white-space: nowrap; font-weight: 600;
    }
    .header button {
      padding: 8px 16px; font-size: 13px; font-weight: 600;
      border: none; border-radius: 8px; cursor: pointer;
      background: rgba(255,255,255,.18); color: white;
      border: 1px solid rgba(255,255,255,.25);
    }
    .header button:hover { background: rgba(255,255,255,.28); }

    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px);
      background: var(--text); color: white; padding: 14px 22px; border-radius: 10px;
      font-size: 14px; font-weight: 600; z-index: 1000; opacity: 0;
      transition: all .3s; box-shadow: 0 6px 24px rgba(0,0,0,.25);
      max-width: 90%; text-align: center;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.ok { background: var(--green); }
    .toast.err { background: var(--red); }

    /* ───────── LOGIN ───────── */
    .login-screen {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 60px 24px; gap: 20px; min-height: 80vh;
    }
    .login-screen .icon { font-size: 72px; }
    .login-screen h2 { font-size: 26px; font-weight: 800; color: var(--purple); }
    .login-screen p { color: var(--sub); text-align: center; }
    .login-screen input {
      width: 220px; padding: 18px; font-size: 32px; text-align: center;
      letter-spacing: 12px; border: 2px solid var(--border); border-radius: var(--radius);
      font-weight: 700;
    }
    .login-screen input:focus { border-color: var(--purple); outline: none; }

    /* ───────── MAIN LAYOUT ───────── */
    .main {
      max-width: 800px; margin: 20px auto;
      padding: 0 16px; display: flex; flex-direction: column; gap: 16px;
    }

    .card {
      background: var(--card); border-radius: var(--radius); padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .card h2 {
      font-size: 18px; font-weight: 800; margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .card h2.pontaj { color: var(--blue); }
    .card h2.dispozitii { color: var(--purple); }

    /* ───────── PONTAJ ───────── */
    .pontaj-pin-wrap {
      display: flex; gap: 10px; align-items: center; margin-bottom: 12px;
    }
    .pontaj-pin-wrap label {
      font-size: 13px; font-weight: 700; color: var(--sub); min-width: 110px;
    }
    .pontaj-pin-wrap input {
      flex: 1; padding: 14px; font-size: 22px; text-align: center; letter-spacing: 8px;
      border: 2px solid var(--border); border-radius: 8px; font-weight: 700;
    }
    .pontaj-pin-wrap input:focus { border-color: var(--blue); outline: none; }
    .pontaj-info { display: none; padding: 14px; background: var(--blue-light); border-radius: 10px; margin-bottom: 12px; }
    .pontaj-info.visible { display: block; }
    .pontaj-info .salut { font-weight: 700; color: var(--navy); margin-bottom: 4px; font-size: 15px; }
    .pontaj-info .status { font-size: 13px; color: var(--sub); white-space: pre-line; }
    .pontaj-buttons { display: none; gap: 10px; flex-wrap: wrap; }
    .pontaj-buttons.visible { display: flex; }
    .btn-pontaj {
      flex: 1; min-width: 140px; padding: 14px; font-size: 15px; font-weight: 700;
      border: none; border-radius: 10px; cursor: pointer; color: white;
    }
    .btn-pontaj-in { background: var(--green); }
    .btn-pontaj-out { background: var(--red); }
    .btn-pontaj:disabled { opacity: .4; cursor: not-allowed; }

    /* ───────── DISPOZIȚII ───────── */
    .btn-deschide-disp {
      width: 100%; padding: 16px; font-size: 17px; font-weight: 800;
      background: linear-gradient(135deg, #fb923c, var(--orange));
      color: white; border: none; border-radius: 12px; cursor: pointer;
      box-shadow: 0 3px 10px rgba(234,88,12,.3); margin-bottom: 14px;
      letter-spacing: .3px;
    }
    .btn-deschide-disp:active { transform: scale(0.98); }

    .lista-dispozitii { display: flex; flex-direction: column; gap: 10px; }
    .empty-state { text-align: center; padding: 24px; color: var(--sub); font-size: 14px; }

    .disp-card {
      padding: 14px; border-radius: 10px; background: #fff7ed;
      border-left: 3px solid #fb923c;
    }
    .disp-card.predat { background: var(--green-light); border-left-color: var(--green); }
    .disp-card .top {
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 10px; margin-bottom: 10px;
    }
    .disp-card .label-tip {
      font-weight: 800; font-size: 14px; color: var(--navy);
    }
    .disp-card .badge-predat {
      background: var(--green); color: white; padding: 3px 10px;
      border-radius: 4px; font-size: 11px; font-weight: 800;
    }
    .disp-card .meta {
      font-size: 11px; color: var(--sub); margin-top: 3px;
    }
    .disp-card .obs { font-size: 12px; color: var(--sub); margin-top: 2px; font-style: italic; }
    .disp-card .suma {
      font-weight: 800; font-size: 24px;
      font-variant-numeric: tabular-nums;
    }
    .disp-card .suma.in { color: var(--green); }
    .disp-card .suma.out { color: var(--red); }
    .disp-card .actiuni { display: flex; gap: 8px; flex-wrap: wrap; }
    .disp-card .actiuni button {
      flex: 1; min-width: 130px; padding: 10px 14px; font-size: 13px; font-weight: 700;
      border: none; border-radius: 8px; cursor: pointer; color: white;
    }
    .disp-card .actiuni button:disabled { opacity: .5; cursor: not-allowed; }
    .btn-preda { background: var(--blue); }
    .btn-confirma { background: var(--green); }
    .btn-anuleaza { background: var(--red); flex: 0 0 auto !important; min-width: 110px !important; }
    .waiting {
      flex: 1; padding: 10px 14px; background: #fef3c7; color: #92400e;
      border-radius: 8px; font-weight: 700; text-align: center; font-size: 12px;
    }

    /* ───────── MODAL ───────── */
    .modal-bg {
      display: none; position: fixed; inset: 0; background: rgba(15,23,42,.6);
      z-index: 300; align-items: center; justify-content: center; padding: 16px;
    }
    .modal-bg.visible { display: flex; }
    .modal-card {
      background: white; border-radius: 14px; max-width: 460px; width: 100%; padding: 22px;
    }
    .modal-card h3 { color: var(--purple); margin-bottom: 14px; font-size: 18px; }
    .form-group { margin-bottom: 12px; }
    .form-group label {
      display: block; font-size: 12px; font-weight: 700; color: var(--sub);
      margin-bottom: 4px;
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 12px; font-size: 15px;
      border: 1px solid var(--border); border-radius: 8px;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: var(--purple); outline: none;
    }
    .modal-actiuni {
      display: flex; gap: 10px; margin-top: 16px;
    }
    .modal-actiuni button {
      flex: 1; padding: 12px; border: none; border-radius: 8px;
      font-weight: 700; cursor: pointer; font-size: 14px;
    }
    .btn-anuleaza-modal { background: #e2e8f0; color: var(--text); }
    .btn-salveaza { background: var(--green); color: white; flex: 2 !important; }

    /* WEEKEND badge */
    .weekend-badge {
      background: var(--orange); color: white; padding: 3px 10px;
      border-radius: 4px; font-size: 11px; font-weight: 700; margin-left: 8px;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>📋 ARAFURA — Dispoziții</h1>
    <span class="header-user" id="header-user"></span>
  </div>
  <button id="btn-logout" onclick="logout()" style="display:none;">Ieși</button>
</div>

<div class="toast" id="toast"></div>

<!-- ─── LOGIN ─── -->
<div id="screen-login" class="login-screen">
  <div class="icon">🔐</div>
  <h2>Autentificare magazin</h2>
  <p>Introdu PIN-ul magazinului (4 cifre)</p>
  <input type="password" id="login-pin" inputmode="numeric" maxlength="4" placeholder="****" autocomplete="off" oninput="onLoginPin()">
</div>

<!-- ─── MAIN ─── -->
<div id="screen-main" class="main" style="display:none;">

  <!-- PONTAJ -->
  <div class="card">
    <h2 class="pontaj">👋 Pontaj angajat</h2>
    <div class="pontaj-pin-wrap">
      <label>PIN angajat</label>
      <input type="password" id="pontaj-pin" inputmode="numeric" maxlength="4" placeholder="****" oninput="onPontajPin()">
    </div>
    <div class="pontaj-info" id="pontaj-info">
      <div class="salut" id="pontaj-salut"></div>
      <div class="status" id="pontaj-status"></div>
    </div>
    <div class="pontaj-buttons" id="pontaj-buttons">
      <button class="btn-pontaj btn-pontaj-in" id="btn-intrare" onclick="pontareIntrare()">✅ Am venit</button>
      <button class="btn-pontaj btn-pontaj-out" id="btn-iesire" onclick="pontareIesire()">🚪 Am plecat</button>
    </div>
  </div>

  <!-- DISPOZIȚII -->
  <div class="card">
    <h2 class="dispozitii">📋 Dispoziții plată / încasare</h2>
    <button class="btn-deschide-disp" onclick="deschideDispForm()">+ DISPOZIȚIE NOUĂ (DP / DI)</button>
    <div class="lista-dispozitii" id="lista-dispozitii">
      <div class="empty-state">Se încarcă...</div>
    </div>
  </div>

</div>

<!-- ─── MODAL CREARE DISPOZIȚIE ─── -->
<div class="modal-bg" id="modal-disp">
  <div class="modal-card">
    <h3>📋 Dispoziție nouă pe teren</h3>
    <div class="form-group">
      <label>Tip operațiune</label>
      <select id="d-tip">
        <option value="">— Alege —</option>
        <option value="DP AMANET">DP AMANET (predați bani la birou)</option>
        <option value="DI AMANET">DI AMANET (primiți bani de la birou)</option>
      </select>
    </div>
    <div class="form-group">
      <label>Magazin / amanet</label>
      <input type="text" id="d-magazin" readonly style="background:#f8fafc; font-weight:700;">
    </div>
    <div class="form-group">
      <label>Sumă (RON)</label>
      <input type="number" id="d-suma" step="0.01" placeholder="0.00">
    </div>
    <div class="form-group">
      <label>Observații (opțional)</label>
      <input type="text" id="d-obs" placeholder="ex: bani pentru x, achiziție y...">
    </div>
    <div class="modal-actiuni">
      <button class="btn-anuleaza-modal" onclick="inchideDispForm()">Anulează</button>
      <button class="btn-salveaza" onclick="salveazaDisp()">Salvează dispoziție</button>
    </div>
  </div>
</div>

<script>
// ──────────────────────────────────────────────────────────
// CONFIG
// ──────────────────────────────────────────────────────────
const HEADERS = { 'apikey': window.SUPABASE_KEY, 'Authorization': `Bearer ${window.SUPABASE_KEY}` };
const API = window.SUPABASE_URL + '/rest/v1';

const MAGAZINE_PERMISE = ['KOGALNICEANU', 'POPORULUI', 'CUMPANA'];

// ──────────────────────────────────────────────────────────
// SESSION (8h localStorage)
// ──────────────────────────────────────────────────────────
const SESSION_KEY = 'dispozitii_session';
function saveSession(user) {
  localStorage.setItem(SESSION_KEY, JSON.stringify({ user, expires: Date.now() + 8*60*60*1000 }));
}
function loadSession() {
  try {
    const raw = localStorage.getItem(SESSION_KEY);
    if (!raw) return null;
    const { user, expires } = JSON.parse(raw);
    if (!user || !expires || Date.now() > expires) { localStorage.removeItem(SESSION_KEY); return null; }
    return user;
  } catch { return null; }
}
function clearSession() { try { localStorage.removeItem(SESSION_KEY); } catch {} }

let currentUser = null;

// ──────────────────────────────────────────────────────────
// UTIL
// ──────────────────────────────────────────────────────────
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  setTimeout(() => t.classList.remove('show'), 3000);
}
function escHtml(s) {
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fmtData(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('ro-RO', {day:'2-digit', month:'2-digit'});
}
function fmtDataTime(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleString('ro-RO', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'});
}
function fmtOra(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleTimeString('ro-RO', {hour:'2-digit', minute:'2-digit'});
}

// ──────────────────────────────────────────────────────────
// LOGIN MAGAZIN
// ──────────────────────────────────────────────────────────
async function onLoginPin() {
  const pin = document.getElementById('login-pin').value;
  if (pin.length < 4) return;
  try {
    const resp = await fetch(`${API}/caiet_utilizatori?pin=eq.${pin}&select=id,nume`, { headers: HEADERS });
    const data = await resp.json();
    if (!Array.isArray(data) || data.length === 0) {
      showToast('PIN incorect', 'err');
      document.getElementById('login-pin').value = '';
      return;
    }
    const user = data[0];
    if (!MAGAZINE_PERMISE.includes(user.nume)) {
      showToast('Această pagină e doar pentru KOGĂLNICEANU, POPORULUI, CUMPĂNA', 'err');
      document.getElementById('login-pin').value = '';
      return;
    }
    saveSession(user);
    await completeLogin(user);
  } catch {
    showToast('Eroare conexiune', 'err');
  }
}

async function completeLogin(user) {
  currentUser = user;
  document.getElementById('header-user').textContent = user.nume;
  document.getElementById('btn-logout').style.display = '';
  document.getElementById('screen-login').style.display = 'none';
  document.getElementById('screen-main').style.display = '';
  document.getElementById('login-pin').value = '';
  await incarcaDispozitii();
}

function logout() {
  if (!confirm('Te deloghezi?')) return;
  clearSession();
  currentUser = null;
  pontajAngajat = null;
  pontajRecords = [];
  pontajUltimul = null;
  document.getElementById('header-user').textContent = '';
  document.getElementById('btn-logout').style.display = 'none';
  document.getElementById('screen-main').style.display = 'none';
  document.getElementById('screen-login').style.display = '';
  document.getElementById('pontaj-info').classList.remove('visible');
  document.getElementById('pontaj-buttons').classList.remove('visible');
  document.getElementById('pontaj-pin').value = '';
}

// ──────────────────────────────────────────────────────────
// DISPOZIȚII
// ──────────────────────────────────────────────────────────
function deschideDispForm() {
  if (!currentUser) return;
  document.getElementById('d-tip').value = '';
  document.getElementById('d-magazin').value = currentUser.nume;
  document.getElementById('d-suma').value = '';
  document.getElementById('d-obs').value = '';
  document.getElementById('modal-disp').classList.add('visible');
}

function inchideDispForm() {
  document.getElementById('modal-disp').classList.remove('visible');
}

async function salveazaDisp() {
  if (!currentUser || !currentUser.nume) {
    showToast('Sesiune expirată — re-loghează-te', 'err');
    setTimeout(() => { try { logout(); } catch {} }, 1500);
    return;
  }
  const tip = document.getElementById('d-tip').value;
  const suma = parseFloat(document.getElementById('d-suma').value) || 0;
  const obs = document.getElementById('d-obs').value.trim();

  if (!tip) { showToast('Alege tipul', 'err'); return; }
  if (suma <= 0) { showToast('Sumă invalidă', 'err'); return; }

  const isIntrare = tip === 'DP AMANET';

  // Verifică duplicate (PENDING TEREN deja deschis pe acest amanet de acest user)
  try {
    const resp = await fetch(`${API}/caiet?tip=like.${encodeURIComponent(tip + ' (PENDING TEREN%')}&beneficiar=eq.${encodeURIComponent(currentUser.nume)}&utilizator=eq.${encodeURIComponent(currentUser.nume)}&select=id,completat_la`, { headers: HEADERS });
    const existing = await resp.json();
    if (Array.isArray(existing) && existing.length > 0) {
      const cand = existing[0].completat_la ? fmtDataTime(existing[0].completat_la) : '?';
      const proceed = confirm(`⚠ Există deja ${tip} deschis pentru ${currentUser.nume} (din ${cand}).\n\nVrei să creezi încă unul?\n\n[OK] = creez nou\n[Cancel] = mă întorc`);
      if (!proceed) return;
    }
  } catch {}

  try {
    const resp = await fetch(`${API}/caiet`, {
      method: 'POST',
      headers: { ...HEADERS, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({
        data: todayISO(),
        tip: `${tip} (PENDING TEREN)`,
        beneficiar: currentUser.nume,
        firma: 'PERFECTA INVEST',
        intrare: isIntrare ? suma : 0,
        iesire: isIntrare ? 0 : suma,
        observatii: obs || null,
        utilizator: currentUser.nume,
        completat_la: new Date().toISOString()
      })
    });
    if (!resp.ok) { showToast('Eroare: ' + await resp.text(), 'err'); return; }
    showToast('✓ Dispoziție deschisă', 'ok');
    inchideDispForm();
    await incarcaDispozitii();
  } catch (e) {
    showToast('Eroare: ' + e.message, 'err');
  }
}

async function incarcaDispozitii() {
  if (!currentUser) return;
  const container = document.getElementById('lista-dispozitii');
  try {
    // Doar dispozitiile acestui magazin (utilizator=magazin curent)
    const resp = await fetch(`${API}/caiet?tip=like.*(PENDING%20TEREN*&utilizator=eq.${encodeURIComponent(currentUser.nume)}&order=completat_la.desc`, { headers: HEADERS });
    const data = await resp.json();
    if (!Array.isArray(data) || data.length === 0) {
      container.innerHTML = '<div class="empty-state">Nicio dispoziție deschisă</div>';
      return;
    }
    let html = '';
    for (const d of data) {
      const tipBaza = (d.tip || '').replace(/ \(PENDING TEREN(?: PREDAT)?\)/, '');
      const estePredat = (d.tip||'').includes('PREDAT');
      const isIntrareAmanet = tipBaza === 'DI AMANET';
      const val = parseFloat(d.intrare||0) + parseFloat(d.iesire||0);
      const deschisLa = fmtDataTime(d.completat_la);

      let actiuni;
      if (tipBaza === 'DP AMANET') {
        if (!estePredat) {
          actiuni = `<button class="btn-preda" onclick="predaDisp(${d.id})">🚚 Predă banii la șofer</button>
                     <button class="btn-anuleaza" onclick="anuleazaDisp(${d.id})">Anulează</button>`;
        } else {
          actiuni = `<div class="waiting">⏳ Așteaptă confirmare la birou</div>
                     <button class="btn-anuleaza" onclick="anuleazaDisp(${d.id})">Anulează</button>`;
        }
      } else { // DI AMANET
        if (!estePredat) {
          actiuni = `<div class="waiting">⏳ Așteaptă predarea la șofer (birou)</div>
                     <button class="btn-anuleaza" onclick="anuleazaDisp(${d.id})">Anulează</button>`;
        } else {
          actiuni = `<button class="btn-confirma" onclick="confirmaDisp(${d.id})">✓ Confirmă (banii au ajuns)</button>
                     <button class="btn-anuleaza" onclick="anuleazaDisp(${d.id})">Anulează</button>`;
        }
      }

      const badgePredat = estePredat ? '<span class="badge-predat">🚚 PREDAT</span>' : '';
      html += `<div class="disp-card${estePredat?' predat':''}">
        <div class="top">
          <div>
            <div class="label-tip">${escHtml(tipBaza)} ${badgePredat}</div>
            <div class="meta">Deschis: <b>${deschisLa}</b></div>
            ${d.observatii ? `<div class="obs">${escHtml(d.observatii)}</div>` : ''}
          </div>
          <div class="suma ${isIntrareAmanet?'in':'out'}">${isIntrareAmanet?'+':'−'}${val.toLocaleString('ro-RO',{minimumFractionDigits:2})}</div>
        </div>
        <div class="actiuni">${actiuni}</div>
      </div>`;
    }
    container.innerHTML = html;
  } catch (e) {
    container.innerHTML = '<div class="empty-state" style="color:var(--red);">Eroare conexiune</div>';
  }
}

async function predaDisp(id) {
  if (!confirm('Marchezi că ai dat banii la șofer? Biroul va putea confirma când i-au ajuns.')) return;
  try {
    const respGet = await fetch(`${API}/caiet?id=eq.${id}&select=tip`, { headers: HEADERS });
    const arr = await respGet.json();
    if (!Array.isArray(arr) || arr.length === 0) return;
    const oldTip = arr[0].tip || '';
    if (oldTip.includes('PREDAT')) return;
    const newTip = oldTip.replace(' (PENDING TEREN)', ' (PENDING TEREN PREDAT)');
    await fetch(`${API}/caiet?id=eq.${id}`, {
      method: 'PATCH',
      headers: { ...HEADERS, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ tip: newTip })
    });
    showToast('✓ Predat — așteaptă confirmare birou', 'ok');
    await incarcaDispozitii();
  } catch (e) { showToast('Eroare: ' + e.message, 'err'); }
}

async function confirmaDisp(id) {
  if (!confirm('Confirmi că banii au ajuns? Devine operațiune reală.')) return;
  try {
    const respGet = await fetch(`${API}/caiet?id=eq.${id}&select=tip`, { headers: HEADERS });
    const arr = await respGet.json();
    if (!Array.isArray(arr) || arr.length === 0) return;
    const newTip = (arr[0].tip || '').replace(/ \(PENDING TEREN(?: PREDAT)?\)/, '');
    await fetch(`${API}/caiet?id=eq.${id}`, {
      method: 'PATCH',
      headers: { ...HEADERS, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ tip: newTip })
    });
    showToast('✓ Confirmat', 'ok');
    await incarcaDispozitii();
  } catch (e) { showToast('Eroare: ' + e.message, 'err'); }
}

async function anuleazaDisp(id) {
  if (!confirm('Anulezi dispoziția?')) return;
  try {
    await fetch(`${API}/caiet?id=eq.${id}`, { method: 'DELETE', headers: HEADERS });
    showToast('Anulat', 'ok');
    await incarcaDispozitii();
  } catch (e) { showToast('Eroare: ' + e.message, 'err'); }
}

// ──────────────────────────────────────────────────────────
// PONTAJ
// ──────────────────────────────────────────────────────────
let pontajAngajat = null;
let pontajRecords = [];
let pontajUltimul = null;

async function onPontajPin() {
  const pin = document.getElementById('pontaj-pin').value;
  if (pin.length < 4) return;
  try {
    const resp = await fetch(`${API}/angajati?pin=eq.${pin}&activ=eq.true&select=id,nume`, { headers: HEADERS });
    const data = await resp.json();
    if (!Array.isArray(data) || data.length === 0) {
      showToast('PIN incorect', 'err');
      document.getElementById('pontaj-pin').value = '';
      return;
    }
    pontajAngajat = data[0];
    const today = todayISO();
    const respP = await fetch(`${API}/pontaj?angajat_id=eq.${pontajAngajat.id}&data=eq.${today}&select=*&order=created_at.asc`, { headers: HEADERS });
    const pontaje = await respP.json();
    pontajRecords = Array.isArray(pontaje) ? pontaje : [];
    pontajUltimul = pontajRecords.length > 0 ? pontajRecords[pontajRecords.length - 1] : null;

    const now = new Date();
    const azi = now.toLocaleDateString('ro-RO', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
    const esteWeekend = (now.getDay() === 0 || now.getDay() === 6);
    document.getElementById('pontaj-salut').textContent = `Bună, ${pontajAngajat.nume}!`;
    document.getElementById('pontaj-salut').innerHTML += esteWeekend ? '<span class="weekend-badge">⭐ WEEKEND</span>' : '';
    actualizeazaStatusPontaj(azi);
    document.getElementById('pontaj-info').classList.add('visible');
    document.getElementById('pontaj-buttons').classList.add('visible');
    document.getElementById('pontaj-pin').value = '';
  } catch {
    showToast('Eroare conexiune', 'err');
  }
}

function actualizeazaStatusPontaj(azi) {
  let status = `${azi}\n`;
  if (pontajRecords.length === 0) {
    status += '⏳ Nu te-ai pontat azi';
    document.getElementById('btn-intrare').disabled = false;
    document.getElementById('btn-iesire').disabled = true;
  } else {
    for (const r of pontajRecords) {
      if (r.ora_intrare && r.ora_iesire) {
        status += `✅ ${fmtOra(r.ora_intrare)} → ${fmtOra(r.ora_iesire)}\n`;
      } else if (r.ora_intrare) {
        status += `▶ Intrat la ${fmtOra(r.ora_intrare)} (încă în magazin)\n`;
      }
    }
    const ultimul = pontajUltimul;
    if (ultimul && ultimul.ora_intrare && !ultimul.ora_iesire) {
      // încă in magazin
      document.getElementById('btn-intrare').disabled = true;
      document.getElementById('btn-iesire').disabled = false;
    } else {
      // ultima sesiune închisă, poate face intrare nouă
      document.getElementById('btn-intrare').disabled = false;
      document.getElementById('btn-iesire').disabled = true;
    }
  }
  document.getElementById('pontaj-status').textContent = status.trim();
}

async function pontareIntrare() {
  if (!pontajAngajat) return;
  try {
    const resp = await fetch(`${API}/pontaj`, {
      method: 'POST',
      headers: { ...HEADERS, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
      body: JSON.stringify({
        angajat_id: pontajAngajat.id,
        angajat_nume: pontajAngajat.nume,
        magazin: currentUser ? currentUser.nume : null,
        data: todayISO(),
        ora_intrare: new Date().toISOString(),
        weekend: (new Date().getDay() === 0 || new Date().getDay() === 6)
      })
    });
    if (!resp.ok) { showToast('Eroare: ' + await resp.text(), 'err'); return; }
    showToast('✅ Intrare înregistrată', 'ok');
    await refreshPontajCurent();
  } catch (e) { showToast('Eroare: ' + e.message, 'err'); }
}

async function pontareIesire() {
  if (!pontajAngajat || !pontajUltimul) return;
  try {
    const resp = await fetch(`${API}/pontaj?id=eq.${pontajUltimul.id}`, {
      method: 'PATCH',
      headers: { ...HEADERS, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ ora_iesire: new Date().toISOString() })
    });
    if (!resp.ok) { showToast('Eroare: ' + await resp.text(), 'err'); return; }
    showToast('🚪 Ieșire înregistrată', 'ok');
    await refreshPontajCurent();
  } catch (e) { showToast('Eroare: ' + e.message, 'err'); }
}

async function refreshPontajCurent() {
  if (!pontajAngajat) return;
  const today = todayISO();
  const respP = await fetch(`${API}/pontaj?angajat_id=eq.${pontajAngajat.id}&data=eq.${today}&select=*&order=created_at.asc`, { headers: HEADERS });
  const pontaje = await respP.json();
  pontajRecords = Array.isArray(pontaje) ? pontaje : [];
  pontajUltimul = pontajRecords.length > 0 ? pontajRecords[pontajRecords.length - 1] : null;
  const now = new Date();
  const azi = now.toLocaleDateString('ro-RO', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
  actualizeazaStatusPontaj(azi);
}

(async function init() {
  const u = loadSession();
  if (u && MAGAZINE_PERMISE.includes(u.nume)) {
    await completeLogin(u);
  }
})();

// Auto-refresh dispoziții la 30 sec (când vizibil)
setInterval(() => {
  if (currentUser && !document.hidden) incarcaDispozitii();
}, 30000);

document.addEventListener('visibilitychange', () => {
  if (!document.hidden && currentUser) incarcaDispozitii();
});

if ('serviceWorker' in navigator) {
