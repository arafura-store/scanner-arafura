<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rapoarte Caiet — ARAFURA</title>
  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #1a73e8; --green: #1e8449; --red: #c0392b;
      --orange: #e67e22; --purple: #7c3aed;
      --bg: #f4f6f9; --card: #ffffff; --text: #1a1a2e;
      --sub: #6b7280; --border: #e5e7eb;
    }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
    .header {
      background: #2c3e50; color: white; padding: 20px 30px; border-radius: 14px;
      margin-bottom: 20px; display: flex; align-items: center;
      justify-content: space-between; flex-wrap: wrap; gap: 14px;
    }
    .header h1 { font-size: 22px; font-weight: 800; }
    .header-controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .header select, .header button {
      padding: 10px 16px; font-size: 15px; border: none; border-radius: 8px; cursor: pointer;
    }
    .header select { background: rgba(255,255,255,.15); color: white; }
    .header select option { color: #333; }
    .header button { background: white; color: #2c3e50; font-weight: 700; }

    .tabs { display: flex; gap: 0; margin-bottom: 20px; background: var(--card); border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.06); flex-wrap: wrap; }
    .tab {
      flex: 1; min-width: 120px; padding: 14px 8px; text-align: center; font-size: 14px; font-weight: 700;
      cursor: pointer; border: none; background: var(--card); color: var(--sub);
      border-bottom: 3px solid transparent; transition: all .15s;
    }
    .tab:hover { background: var(--bg); }
    .tab.active { color: var(--blue); border-bottom-color: var(--blue); }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .summary {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 14px; margin-bottom: 20px;
    }
    .summary-card {
      background: var(--card); border-radius: 12px; padding: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .summary-card .label { font-size: 12px; color: var(--sub); }
    .summary-card .value { font-size: 22px; font-weight: 800; margin-top: 4px; }

    table {
      width: 100%; border-collapse: separate; border-spacing: 0;
      background: var(--card); border-radius: 12px; overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,.08); font-size: 13px; margin-bottom: 20px;
    }
    th {
      background: #2c3e50; color: white; padding: 12px 10px;
      text-align: right; font-size: 11px; white-space: nowrap;
      text-transform: uppercase; letter-spacing: .3px;
    }
    th:first-child { text-align: left; }
    td { padding: 10px; border-bottom: 1px solid #f0f0f0; text-align: right; }
    td:first-child { text-align: left; font-weight: 600; }
    tr:nth-child(even) td { background: #fafbfc; }
    tr:hover td { background: #edf2fb; }
    tr:last-child td { border-bottom: none; }
    .total-row td { background: #e8f0fe !important; font-weight: 700; border-top: 2px solid var(--blue); }
    .num { font-variant-numeric: tabular-nums; }
    .green { color: var(--green); }
    .red { color: var(--red); }

    .loading { text-align: center; padding: 40px; color: var(--sub); }

    @media print {
      .header select, .header button, .tabs { display: none; }
      body { padding: 0; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>ARAFURA — Rapoarte</h1>
  <div class="header-controls">
    <select id="sel-luna">
      <option value="">Tot anul</option>
      <option value="0">Ianuarie</option>
      <option value="1">Februarie</option>
      <option value="2">Martie</option>
      <option value="3">Aprilie</option>
      <option value="4">Mai</option>
      <option value="5">Iunie</option>
      <option value="6">Iulie</option>
      <option value="7">August</option>
      <option value="8">Septembrie</option>
      <option value="9">Octombrie</option>
      <option value="10">Noiembrie</option>
      <option value="11">Decembrie</option>
    </select>
    <select id="sel-an"></select>
    <button onclick="genereazaRapoarte()">Generează</button>
    <button id="btn-import-excel" style="background:var(--orange); color:white; display:none;" onclick="document.getElementById('file-excel').click()">Import Excel Lunar</button>
    <input type="file" id="file-excel" accept=".xlsx,.xls" style="display:none;" onchange="importExcel(event)">
    <button id="btn-admin" style="background:rgba(255,255,255,.15); color:white; padding:10px 12px;" onclick="toggleAdmin()" title="Admin">🔒</button>
    <button style="background:var(--green); color:white;" onclick="window.print()">Printează</button>
  </div>
</div>

<div id="import-preview" style="display:none; background:var(--card); border-radius:12px; padding:20px; margin-bottom:20px; box-shadow:0 2px 8px rgba(0,0,0,.08);"></div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('vanzari')">Vânzări</button>
  <button class="tab" onclick="switchTab('amanet')">Amanet</button>
  <button class="tab" onclick="switchTab('banca')">Bancă</button>
  <button class="tab" onclick="switchTab('combustibil')">Combustibil</button>
  <button class="tab" onclick="switchTab('personal')">Personal (LIVIA / BEBE / L+B)</button>
  <button class="tab" onclick="switchTab('rezumat')">Rezumat</button>
</div>

<div id="tab-vanzari" class="tab-content active"><div class="loading">Apasă Generează</div></div>
<div id="tab-amanet" class="tab-content"><div class="loading">Apasă Generează</div></div>
<div id="tab-banca" class="tab-content"><div class="loading">Apasă Generează</div></div>
<div id="tab-combustibil" class="tab-content"><div class="loading">Apasă Generează</div></div>
<div id="tab-personal" class="tab-content"><div class="loading">Apasă Generează</div></div>
<div id="tab-rezumat" class="tab-content"><div class="loading">Apasă Generează</div></div>

<script>
const HEADERS = { 'apikey': window.SUPABASE_KEY, 'Authorization': `Bearer ${window.SUPABASE_KEY}` };
const API = window.SUPABASE_URL + '/rest/v1';

const LUNI = ['ianuarie','februarie','martie','aprilie','mai','iunie','iulie','august','septembrie','octombrie','noiembrie','decembrie'];
const MAGAZINE = ['TOMIS 3','SERVICII','BABADAG','MEDGIDIA','NAVODARI','MARVIMEX','POARTA 6','SHOWROOM','BROTACEI','KOGALNICEANU','CUMPANA','POPORULUI'];
const MAGAZINE_VANZARI = ['TOMIS 3','SERVICII','BABADAG','MEDGIDIA','NAVODARI','MARVIMEX','POARTA 6','KOGALNICEANU','SHOWROOM'];
const EXCEL_MAGAZIN_MAP = {
  'MAGAZIN TOMIS 3': 'TOMIS 3',
  'MAGAZIN SERVICII': 'SERVICII',
  'MAGAZIN BABADAG': 'BABADAG',
  'MAGAZIN MEDGIDIA': 'MEDGIDIA',
  'MAGAZIN NAVODARI': 'NAVODARI',
  'MAGAZIN MARVIMEX': 'MARVIMEX',
  'MAGAZIN POARTA 6': 'POARTA 6',
  'MAGAZIN KOGALNICEANU': 'KOGALNICEANU',
  'SHOWROOM': 'SHOWROOM',
  'VZ CU AMANUNTUL': 'SHOWROOM'
};
const BANCI = ['LIBRA BANK','VISTA BANK','BANORIENT','TRANSILVANIA'];
const FIRME_BANCA = ['ARAFURA','PERFECTA','DOMADAMI','ROCO','VIENEZ','FLOROM','IMONDIS'];
const MAGAZINE_AMANET = ['CASIERIE CENTRALA','BABADAG','CUMPANA','POPORULUI','TOMIS 3','MARVIMEX','POARTA 6','MEDGIDIA','NAVODARI'];

let allData = [];
let allProgram = [];

// ── Admin mode: deblochează butonul Import Excel cu PIN 6969 ──────
const ADMIN_PIN = '6969';
function isAdmin() { return localStorage.getItem('rapoarte_admin') === '1'; }
function toggleAdmin() {
  if (isAdmin()) {
    if (confirm('Ieși din modul admin?')) {
      localStorage.removeItem('rapoarte_admin');
      applyAdminMode();
    }
    return;
  }
  const pin = prompt('PIN admin:');
  if (pin === ADMIN_PIN) {
    localStorage.setItem('rapoarte_admin', '1');
    applyAdminMode();
  } else if (pin !== null) {
    alert('PIN incorect');
  }
}
function applyAdminMode() {
  const btn = document.getElementById('btn-import-excel');
  const lock = document.getElementById('btn-admin');
  if (isAdmin()) {
    btn.style.display = '';
    lock.textContent = '🔓';
    lock.title = 'Admin activ — click pentru ieșire';
  } else {
    btn.style.display = 'none';
    lock.textContent = '🔒';
    lock.title = 'Admin';
  }
}
applyAdminMode();

// Populare an
const selAn = document.getElementById('sel-an');
for (let y = 2026; y >= 2024; y--) {
  const opt = document.createElement('option');
  opt.value = y; opt.textContent = y;
  if (y === new Date().getFullYear()) opt.selected = true;
  selAn.appendChild(opt);
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  event.target.classList.add('active');
}

function fmt(n) {
  if (!n || n === 0) return '';
  return n.toLocaleString('ro-RO', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

async function genereazaRapoarte() {
  const an = parseInt(selAn.value);
  const lunaFilter = document.getElementById('sel-luna').value;
  document.querySelectorAll('.tab-content').forEach(t => t.innerHTML = '<div class="loading">Se generează...</div>');

  try {
    // Determine date range
    let dataStart, dataEnd;
    if (lunaFilter !== '') {
      const luna = parseInt(lunaFilter);
      dataStart = `${an}-${String(luna+1).padStart(2,'0')}-01`;
      const ultimaZi = new Date(an, luna+1, 0).getDate();
      dataEnd = `${an}-${String(luna+1).padStart(2,'0')}-${String(ultimaZi).padStart(2,'0')}`;
    } else {
      dataStart = `${an}-01-01`;
      dataEnd = `${an}-12-31`;
      // Dacă e anul curent, nu afișăm date viitoare
      const azi = new Date();
      if (an === azi.getFullYear()) {
        dataEnd = azi.toISOString().slice(0, 10);
      }
    }

    // Fetch all data (paginate per 1000)
    allData = [];
    let offset = 0;
    while (true) {
      const resp = await fetch(
        `${API}/caiet?select=*&data=gte.${dataStart}&data=lte.${dataEnd}&order=data.asc,created_at.asc&limit=1000&offset=${offset}`,
        { headers: HEADERS }
      );
      const data = await resp.json();
      if (!Array.isArray(data) || data.length === 0) break;
      allData.push(...data);
      offset += 1000;
      if (data.length < 1000) break;
    }

    // Fetch incasari_program for the year
    const lunaFilterProg = lunaFilter !== '' ? `&luna=eq.${parseInt(lunaFilter)}` : '';
    const respProg = await fetch(
      `${API}/incasari_program?select=*&an=eq.${an}${lunaFilterProg}`,
      { headers: HEADERS }
    );
    allProgram = await respProg.json();
    if (!Array.isArray(allProgram)) allProgram = [];

    renderVanzari(an);
    renderAmanet(an);
    renderBanca(an);
    renderCombustibil(an);
    renderPersonal(an);
    renderRezumat(an);

  } catch (e) {
    document.querySelectorAll('.tab-content').forEach(t =>
      t.innerHTML = `<div class="loading" style="color:var(--red);">Eroare: ${e.message}</div>`
    );
  }
}

// ══ VANZARI ══════════════════════════════════════════════════════
function renderVanzari(an) {
  const container = document.getElementById('tab-vanzari');

  // Matrix cash caiet: luna -> magazin -> cash
  const cashCaiet = {};
  for (let m = 0; m < 12; m++) cashCaiet[m] = {};
  for (const d of allData.filter(d => d.tip === 'INCASARE')) {
    const luna = new Date(d.data).getMonth();
    const mag = (d.beneficiar || '').trim().toUpperCase();
    if (!cashCaiet[luna][mag]) cashCaiet[luna][mag] = 0;
    cashCaiet[luna][mag] += parseFloat(d.intrare || 0);
  }

  // Matrix program: luna -> magazin -> {cash, card, voucher}
  const prog = {};
  for (let m = 0; m < 12; m++) prog[m] = {};
  for (const p of allProgram) {
    if (!prog[p.luna][p.magazin]) prog[p.luna][p.magazin] = { cash: 0, card: 0, voucher: 0 };
    prog[p.luna][p.magazin].cash += parseFloat(p.cash || 0);
    prog[p.luna][p.magazin].card += parseFloat(p.card || 0);
    prog[p.luna][p.magazin].voucher += parseFloat(p.voucher || 0);
  }

  // Active magazine: those with any data (caiet sau program)
  const magActive = MAGAZINE_VANZARI.filter(mag => {
    for (let m = 0; m < 12; m++) {
      if (cashCaiet[m][mag]) return true;
      if (prog[m][mag]) return true;
    }
    return false;
  });

  if (magActive.length === 0) {
    container.innerHTML = '<div class="loading">Nu sunt date pentru anul selectat. Importă Excel sau verifică caietul.</div>';
    return;
  }

  let html = `<table><thead><tr><th>LUNA</th><th>TIP</th>`;
  for (const mag of magActive) html += `<th>${mag}</th>`;
  html += `<th style="background:var(--blue);">TOTAL</th></tr></thead><tbody>`;

  // Totale pe coloane (per-magazin, per-tip)
  const tot = { cashCaiet: {}, cashProg: {}, card: {}, voucher: {} };
  for (const mag of magActive) { tot.cashCaiet[mag] = 0; tot.cashProg[mag] = 0; tot.card[mag] = 0; tot.voucher[mag] = 0; }

  const PRAG_DIFF = 50; // RON

  for (let m = 0; m < 12; m++) {
    let hasData = false;
    for (const mag of magActive) {
      if (cashCaiet[m][mag] || prog[m][mag]) { hasData = true; break; }
    }
    if (!hasData) continue;

    // Row 1: CASH CAIET
    let rowCashCaiet = 0;
    html += `<tr><td rowspan="4" style="vertical-align:middle; background:#f4f6f9; font-weight:800;">${LUNI[m]}</td>`;
    html += `<td style="color:var(--green); font-weight:600;">CASH CAIET</td>`;
    for (const mag of magActive) {
      const v = cashCaiet[m][mag] || 0;
      rowCashCaiet += v;
      tot.cashCaiet[mag] += v;
      html += `<td class="num" style="color:var(--green);">${fmt(v)}</td>`;
    }
    html += `<td class="num green" style="font-weight:700;">${fmt(rowCashCaiet)}</td></tr>`;

    // Row 2: CASH PROGRAM (cu marcaj roșu la diferențe)
    let rowCashProg = 0;
    html += `<tr><td style="color:#0b5d34; font-weight:600;">CASH PROGRAM</td>`;
    for (const mag of magActive) {
      const v = prog[m][mag]?.cash || 0;
      const vCaiet = cashCaiet[m][mag] || 0;
      const diff = Math.abs(v - vCaiet);
      rowCashProg += v;
      tot.cashProg[mag] += v;
      const warn = (v > 0 && vCaiet > 0 && diff > PRAG_DIFF);
      const style = warn ? 'color:var(--red); font-weight:700; background:#fee;' : 'color:#0b5d34;';
      const title = warn ? ` title="Diferență ${fmt(diff)} RON față de caiet"` : '';
      html += `<td class="num" style="${style}"${title}>${fmt(v)}</td>`;
    }
    html += `<td class="num" style="color:#0b5d34; font-weight:700;">${fmt(rowCashProg)}</td></tr>`;

    // Row 3: CARD
    let rowCard = 0;
    html += `<tr><td style="color:var(--blue); font-weight:600;">CARD</td>`;
    for (const mag of magActive) {
      const v = prog[m][mag]?.card || 0;
      rowCard += v;
      tot.card[mag] += v;
      html += `<td class="num" style="color:var(--blue);">${fmt(v)}</td>`;
    }
    html += `<td class="num" style="color:var(--blue); font-weight:700;">${fmt(rowCard)}</td></tr>`;

    // Row 4: VOUCHER
    let rowVch = 0;
    html += `<tr style="border-bottom:2px solid var(--border);"><td style="color:var(--orange); font-weight:600;">VOUCHER</td>`;
    for (const mag of magActive) {
      const v = prog[m][mag]?.voucher || 0;
      rowVch += v;
      tot.voucher[mag] += v;
      html += `<td class="num" style="color:var(--orange);">${fmt(v)}</td>`;
    }
    html += `<td class="num" style="color:var(--orange); font-weight:700;">${fmt(rowVch)}</td></tr>`;
  }

  // Totaluri anuale per-magazin
  let gCashCaiet=0, gCashProg=0, gCard=0, gVch=0;
  for (const mag of magActive) {
    gCashCaiet += tot.cashCaiet[mag];
    gCashProg += tot.cashProg[mag];
    gCard += tot.card[mag];
    gVch += tot.voucher[mag];
  }

  html += `<tr class="total-row"><td rowspan="4" style="vertical-align:middle; background:#e8f0fe;">TOTAL ${an}</td>`;
  html += `<td style="color:var(--green);">CASH CAIET</td>`;
  for (const mag of magActive) html += `<td class="num green">${fmt(tot.cashCaiet[mag])}</td>`;
  html += `<td class="num green">${fmt(gCashCaiet)}</td></tr>`;

  html += `<tr class="total-row"><td style="color:#0b5d34;">CASH PROGRAM</td>`;
  for (const mag of magActive) html += `<td class="num" style="color:#0b5d34;">${fmt(tot.cashProg[mag])}</td>`;
  html += `<td class="num" style="color:#0b5d34;">${fmt(gCashProg)}</td></tr>`;

  html += `<tr class="total-row"><td style="color:var(--blue);">CARD</td>`;
  for (const mag of magActive) html += `<td class="num" style="color:var(--blue);">${fmt(tot.card[mag])}</td>`;
  html += `<td class="num" style="color:var(--blue);">${fmt(gCard)}</td></tr>`;

  html += `<tr class="total-row"><td style="color:var(--orange);">VOUCHER</td>`;
  for (const mag of magActive) html += `<td class="num" style="color:var(--orange);">${fmt(tot.voucher[mag])}</td>`;
  html += `<td class="num" style="color:var(--orange);">${fmt(gVch)}</td></tr>`;

  // Rând cu TOTAL GENERAL per magazin (cash program + card + voucher)
  html += `<tr class="total-row" style="border-top:3px double var(--blue);"><td colspan="2" style="background:var(--blue); color:white;">TOTAL GENERAL (program)</td>`;
  let gTotal = 0;
  for (const mag of magActive) {
    const t = tot.cashProg[mag] + tot.card[mag] + tot.voucher[mag];
    gTotal += t;
    html += `<td class="num" style="background:var(--blue); color:white; font-weight:800;">${fmt(t)}</td>`;
  }
  html += `<td class="num" style="background:var(--blue); color:white; font-weight:800;">${fmt(gTotal)}</td></tr>`;

  html += '</tbody></table>';

  // Summary cards
  const diff = gCashCaiet - gCashProg;
  const diffColor = Math.abs(diff) < 50 ? 'var(--green)' : 'var(--red)';
  const sumHtml = `<div class="summary">
    <div class="summary-card"><div class="label">Cash caiet</div><div class="value green">${fmt(gCashCaiet)}</div></div>
    <div class="summary-card"><div class="label">Cash program</div><div class="value" style="color:#0b5d34;">${fmt(gCashProg)}</div></div>
    <div class="summary-card"><div class="label">Diferență cash</div><div class="value" style="color:${diffColor}; font-size:18px;">${fmt(diff)} RON</div></div>
    <div class="summary-card"><div class="label">Card</div><div class="value" style="color:var(--blue);">${fmt(gCard)}</div></div>
    <div class="summary-card"><div class="label">Voucher</div><div class="value" style="color:var(--orange);">${fmt(gVch)}</div></div>
    <div class="summary-card" style="border:2px solid var(--blue);"><div class="label" style="font-weight:700;">TOTAL GENERAL (program)</div><div class="value" style="color:var(--blue);">${fmt(gTotal)}</div></div>
  </div>`;

  container.innerHTML = sumHtml + html;
}

// ══ IMPORT EXCEL ═════════════════════════════════════════════════
async function importExcel(ev) {
  const file = ev.target.files[0];
  if (!file) return;

  const preview = document.getElementById('import-preview');
  preview.style.display = 'block';
  preview.innerHTML = '<div class="loading">Se citește fișierul...</div>';

  try {
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, { type: 'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });

    // Găsim rândul cu headerele (căutăm "Nume Depozit")
    let headerIdx = -1;
    for (let i = 0; i < Math.min(rows.length, 10); i++) {
      if (rows[i] && rows[i].some(c => (c || '').toString().trim() === 'Nume Depozit')) {
        headerIdx = i; break;
      }
    }
    if (headerIdx === -1) throw new Error('Nu găsesc coloana "Nume Depozit" în fișier');

    const headers = rows[headerIdx].map(h => (h || '').toString().trim());
    const idxDepo = headers.indexOf('Nume Depozit');
    const idxCash = headers.indexOf('Incasare numerar');
    const idxCard = headers.indexOf('Incasare card');
    const idxVch = headers.indexOf('Incasare voucher');
    if (idxDepo === -1 || idxCash === -1 || idxCard === -1) {
      throw new Error('Lipsesc coloanele obligatorii (Nume Depozit / Incasare numerar / Incasare card)');
    }

    // Detectăm perioada din rândul 2 ("De la data = 01/03/2026, La data = 31/03/2026 ...")
    let an = null, luna = null;
    for (let i = 0; i < Math.min(rows.length, 5); i++) {
      const txt = (rows[i] || []).map(c => c || '').join(' ');
      const m = txt.match(/De la data\s*=\s*(\d{2})\/(\d{2})\/(\d{4})/i);
      if (m) { luna = parseInt(m[2]) - 1; an = parseInt(m[3]); break; }
    }
    if (an === null || luna === null) {
      // Fallback: extragem din numele fișierului
      const m = file.name.match(/(\d{2})\.(\d{2})\.(\d{4})/);
      if (m) { luna = parseInt(m[2]) - 1; an = parseInt(m[3]); }
    }
    if (an === null || luna === null) throw new Error('Nu pot detecta luna/anul din fișier');

    // Agregăm pe magazin (doar cele din MAGAZINE_VANZARI)
    const agg = {};
    for (let i = headerIdx + 1; i < rows.length; i++) {
      const r = rows[i];
      if (!r || !r[idxDepo]) continue;
      const depo = r[idxDepo].toString().trim().toUpperCase();
      const mag = EXCEL_MAGAZIN_MAP[depo];
      if (!mag) continue; // filtrăm B2B (Depozit Papetarie, etc.)
      if (!agg[mag]) agg[mag] = { cash: 0, card: 0, voucher: 0 };
      agg[mag].cash += parseFloat(r[idxCash] || 0);
      agg[mag].card += parseFloat(r[idxCard] || 0);
      agg[mag].voucher += idxVch >= 0 ? parseFloat(r[idxVch] || 0) : 0;
    }

    const magazine = Object.keys(agg).sort();
    if (magazine.length === 0) throw new Error('Niciun magazin retail recunoscut în fișier');

    // Preview + confirmare
    let sumCash=0, sumCard=0, sumVch=0;
    let html = `<h3 style="margin-bottom:12px; color:var(--blue);">Previzualizare import — ${LUNI[luna]} ${an}</h3>`;
    html += '<table><thead><tr><th>MAGAZIN</th><th>CASH</th><th>CARD</th><th>VOUCHER</th><th>TOTAL</th></tr></thead><tbody>';
    for (const mag of magazine) {
      const v = agg[mag];
      sumCash += v.cash; sumCard += v.card; sumVch += v.voucher;
      html += `<tr><td>${mag}</td><td class="num green">${fmt(v.cash)}</td><td class="num" style="color:var(--blue);">${fmt(v.card)}</td><td class="num" style="color:var(--orange);">${fmt(v.voucher)}</td><td class="num" style="font-weight:700;">${fmt(v.cash + v.card + v.voucher)}</td></tr>`;
    }
    html += `<tr class="total-row"><td>TOTAL</td><td class="num green">${fmt(sumCash)}</td><td class="num" style="color:var(--blue);">${fmt(sumCard)}</td><td class="num" style="color:var(--orange);">${fmt(sumVch)}</td><td class="num" style="color:var(--blue);">${fmt(sumCash+sumCard+sumVch)}</td></tr>`;
    html += '</tbody></table>';
    html += `<div style="margin-top:16px; display:flex; gap:10px;">
      <button onclick="confirmaImport()" style="background:var(--green); color:white; padding:12px 20px; border:none; border-radius:8px; font-weight:700; cursor:pointer;">Confirmă și salvează</button>
      <button onclick="document.getElementById('import-preview').style.display='none'" style="background:#e5e7eb; color:#333; padding:12px 20px; border:none; border-radius:8px; cursor:pointer;">Anulează</button>
    </div>
    <div style="margin-top:10px; color:var(--sub); font-size:13px;">Datele vor fi salvate pentru <b>${LUNI[luna]} ${an}</b>. Valorile existente vor fi suprascrise.</div>`;
    window._pendingImport = { agg, an, luna };
    preview.innerHTML = html;
  } catch (e) {
    preview.innerHTML = `<div style="color:var(--red); padding:20px;">Eroare: ${e.message}</div>`;
  }

  ev.target.value = ''; // reset file input
}

async function confirmaImport() {
  if (!window._pendingImport) return;
  const { agg, an, luna } = window._pendingImport;
  const preview = document.getElementById('import-preview');
  preview.innerHTML = '<div class="loading">Se salvează...</div>';

  try {
    const records = Object.entries(agg).map(([mag, v]) => ({
      an, luna, magazin: mag,
      cash: Math.round(v.cash * 100) / 100,
      card: Math.round(v.card * 100) / 100,
      voucher: Math.round(v.voucher * 100) / 100,
      updated_at: new Date().toISOString()
    }));

    // Upsert prin header Prefer: resolution=merge-duplicates
    const resp = await fetch(`${API}/incasari_program?on_conflict=an,luna,magazin`, {
      method: 'POST',
      headers: {
        ...HEADERS,
        'Content-Type': 'application/json',
        'Prefer': 'resolution=merge-duplicates,return=minimal'
      },
      body: JSON.stringify(records)
    });

    if (!resp.ok) {
      const txt = await resp.text();
      throw new Error(`HTTP ${resp.status}: ${txt}`);
    }

    preview.innerHTML = `<div style="color:var(--green); padding:20px; font-weight:700;">✓ Salvat ${records.length} magazine pentru ${LUNI[luna]} ${an}. Apasă Generează pentru a vedea datele actualizate.</div>`;
    setTimeout(() => { preview.style.display = 'none'; }, 4000);
  } catch (e) {
    preview.innerHTML = `<div style="color:var(--red); padding:20px;">Eroare la salvare: ${e.message}</div>`;
  }
}

// ══ AMANET ═══════════════════════════════════════════════════════
function renderAmanet(an) {
  const container = document.getElementById('tab-amanet');
  const amanet = allData.filter(d => d.tip === 'AMANET' || d.tip === 'FOND AMANET');

  const matrix = {}; // luna -> magazin -> {incasare, plata}
  for (let m = 0; m < 12; m++) matrix[m] = {};

  for (const d of amanet) {
    const luna = new Date(d.data).getMonth();
    const mag = d.beneficiar.trim();
    if (!matrix[luna][mag]) matrix[luna][mag] = { incasare: 0, plata: 0 };
    matrix[luna][mag].incasare += parseFloat(d.intrare || 0);
    matrix[luna][mag].plata += parseFloat(d.iesire || 0);
  }

  const magActive = MAGAZINE_AMANET.filter(mag => {
    for (let m = 0; m < 12; m++) if (matrix[m][mag]) return true;
    return false;
  });

  let html = '<table><thead><tr><th>LUNA</th><th>TIP</th>';
  for (const mag of magActive) html += `<th>${mag}</th>`;
  html += '<th style="background:var(--blue);">TOTAL</th></tr></thead><tbody>';

  let totalIncasare = 0, totalPlata = 0;

  for (let m = 0; m < 12; m++) {
    let hasData = false;
    for (const mag of magActive) if (matrix[m][mag]) { hasData = true; break; }
    if (!hasData) continue;

    // Incasare row
    let rowInc = 0;
    html += `<tr><td rowspan="2" style="vertical-align:middle;">${LUNI[m]}</td><td class="green" style="font-weight:600;">ÎNCASARE</td>`;
    for (const mag of magActive) {
      const val = matrix[m][mag]?.incasare || 0;
      rowInc += val;
      html += `<td class="num green">${fmt(val)}</td>`;
    }
    totalIncasare += rowInc;
    html += `<td class="num green" style="font-weight:700;">${fmt(rowInc)}</td></tr>`;

    // Plata row
    let rowPlata = 0;
    html += `<tr><td class="red" style="font-weight:600;">PLATĂ</td>`;
    for (const mag of magActive) {
      const val = matrix[m][mag]?.plata || 0;
      rowPlata += val;
      html += `<td class="num red">${fmt(val)}</td>`;
    }
    totalPlata += rowPlata;
    html += `<td class="num red" style="font-weight:700;">${fmt(rowPlata)}</td></tr>`;
  }

  html += '</tbody></table>';

  const sumHtml = `<div class="summary">
    <div class="summary-card"><div class="label">Total încasări amanet</div><div class="value green">${fmt(totalIncasare)} RON</div></div>
    <div class="summary-card"><div class="label">Total plăți amanet</div><div class="value red">${fmt(totalPlata)} RON</div></div>
    <div class="summary-card" style="border:2px solid var(--border);">
      <div class="label" style="font-size:14px; font-weight:700; color:var(--text); margin-bottom:8px;">DIFERENȚE</div>
      <div class="label">Încasați din amanet</div>
      <div class="value green" style="font-size:20px;">${totalIncasare > totalPlata ? fmt(totalIncasare - totalPlata) : '0,00'} RON</div>
      <div class="label" style="margin-top:10px;">Plătiți către amanet</div>
      <div class="value red" style="font-size:20px;">${totalPlata > totalIncasare ? fmt(totalPlata - totalIncasare) : '0,00'} RON</div>
    </div>
  </div>`;

  container.innerHTML = sumHtml + html;
}

// ══ BANCA ════════════════════════════════════════════════════════
function detectBanca(d) {
  const all = ((d.beneficiar || '') + ' ' + (d.observatii || '')).toUpperCase();
  if (all.includes('LIBRA')) return 'LIBRA BANK';
  if (all.includes('VISTA')) return 'VISTA BANK';
  if (all.includes('BANORIENT') || all.includes('ORIENT')) return 'BANORIENT';
  if (all.includes('TRANSILVANIA') || all.includes('BT ')) return 'TRANSILVANIA';
  return 'ALTĂ BANCĂ';
}

function renderBanca(an) {
  const container = document.getElementById('tab-banca');
  const lunaFilter = document.getElementById('sel-luna').value;
  const depuneri = allData.filter(d => d.tip === 'DEPUNERE');
  const retrageri = allData.filter(d => d.tip === 'RETRAGERE');

  // Dacă e filtru pe o lună → vedere detaliată zi cu zi
  if (lunaFilter !== '') {
    return renderBancaDetaliat(an, parseInt(lunaFilter), depuneri, retrageri);
  }

  // Altfel → pivot pe luni
  return renderBancaPivot(an, depuneri, retrageri);
}

function renderBancaPivot(an, depuneri, retrageri) {
  const container = document.getElementById('tab-banca');

  const matrix = {};
  for (let m = 0; m < 12; m++) matrix[m] = {};

  for (const d of depuneri) {
    const luna = new Date(d.data).getMonth();
    const banca = detectBanca(d);
    if (!matrix[luna][banca]) matrix[luna][banca] = { dep: 0, ret: 0 };
    matrix[luna][banca].dep += parseFloat(d.intrare || 0) + parseFloat(d.iesire || 0);
  }
  for (const d of retrageri) {
    const luna = new Date(d.data).getMonth();
    const banca = detectBanca(d);
    if (!matrix[luna][banca]) matrix[luna][banca] = { dep: 0, ret: 0 };
    matrix[luna][banca].ret += parseFloat(d.intrare || 0) + parseFloat(d.iesire || 0);
  }

  const banciActive = [...BANCI, 'ALTĂ BANCĂ'].filter(b => {
    for (let m = 0; m < 12; m++) if (matrix[m][b]) return true;
    return false;
  });

  if (banciActive.length === 0) {
    container.innerHTML = '<div class="loading">Nu sunt operațiuni bancare pentru anul selectat.</div>';
    return;
  }

  // Header simplu pe un singur rând: "LIBRA DEP" / "LIBRA RET"
  let html = '<table><thead><tr><th>LUNA</th>';
  for (const b of banciActive) {
    html += `<th style="background:#1e3a5f;">${b}<br><span style="font-size:10px; color:#a7f3d0;">DEPUNERE</span></th>`;
    html += `<th style="background:#3d1e1e;">${b}<br><span style="font-size:10px; color:#fecaca;">RETRAGERE</span></th>`;
  }
  html += '<th style="background:var(--blue);">TOTAL LUNA</th></tr></thead><tbody>';

  const totalBanca = {};
  for (const b of banciActive) totalBanca[b] = { dep: 0, ret: 0 };
  let grandDep = 0, grandRet = 0;

  for (let m = 0; m < 12; m++) {
    let hasData = false;
    for (const b of banciActive) if (matrix[m][b]) { hasData = true; break; }
    if (!hasData) continue;

    let rowDep = 0, rowRet = 0;
    html += `<tr><td>${LUNI[m]}</td>`;
    for (const b of banciActive) {
      const dep = matrix[m][b]?.dep || 0;
      const ret = matrix[m][b]?.ret || 0;
      totalBanca[b].dep += dep;
      totalBanca[b].ret += ret;
      rowDep += dep; rowRet += ret;
      html += `<td class="num green">${fmt(dep)}</td><td class="num red">${fmt(ret)}</td>`;
    }
    grandDep += rowDep; grandRet += rowRet;
    html += `<td class="num" style="font-weight:700;"><span class="green">${fmt(rowDep)}</span> / <span class="red">${fmt(rowRet)}</span></td></tr>`;
  }

  html += '<tr class="total-row"><td>TOTAL</td>';
  for (const b of banciActive) {
    html += `<td class="num green">${fmt(totalBanca[b].dep)}</td><td class="num red">${fmt(totalBanca[b].ret)}</td>`;
  }
  html += `<td class="num" style="font-weight:800;"><span class="green">${fmt(grandDep)}</span> / <span class="red">${fmt(grandRet)}</span></td></tr>`;
  html += '</tbody></table>';

  const sumHtml = `<div class="summary">
    <div class="summary-card"><div class="label">Total depuneri ${an}</div><div class="value green">${fmt(grandDep)} RON</div></div>
    <div class="summary-card"><div class="label">Total retrageri ${an}</div><div class="value red">${fmt(grandRet)} RON</div></div>
    <div class="summary-card"><div class="label">Flux net</div><div class="value" style="color:${grandDep-grandRet>=0?'var(--green)':'var(--red)'};">${fmt(grandDep - grandRet)} RON</div></div>
  </div>`;

  container.innerHTML = sumHtml + html;
}

function renderBancaDetaliat(an, luna, depuneri, retrageri) {
  const container = document.getElementById('tab-banca');

  // Filtrează doar tranzacțiile din luna aleasă
  const tranzactii = [...depuneri, ...retrageri]
    .filter(d => new Date(d.data).getMonth() === luna)
    .sort((a, b) => new Date(a.data) - new Date(b.data) || (a.created_at || '').localeCompare(b.created_at || ''));

  if (tranzactii.length === 0) {
    container.innerHTML = `<div class="loading">Nu sunt operațiuni bancare în ${LUNI[luna]} ${an}.</div>`;
    return;
  }

  let totalDep = 0, totalRet = 0;
  const perBanca = {};

  let html = `<table><thead><tr>
    <th>DATA</th><th>TIP</th><th>BANCA</th><th>BENEFICIAR / FIRMĂ</th>
    <th>DEPUNERE</th><th>RETRAGERE</th><th>OBSERVAȚII</th>
  </tr></thead><tbody>`;

  for (const d of tranzactii) {
    const banca = detectBanca(d);
    const suma = parseFloat(d.intrare || 0) + parseFloat(d.iesire || 0);
    const isDep = d.tip === 'DEPUNERE';
    const data = new Date(d.data).toLocaleDateString('ro-RO', { day: '2-digit', month: '2-digit', year: 'numeric' });

    if (!perBanca[banca]) perBanca[banca] = { dep: 0, ret: 0 };
    if (isDep) { totalDep += suma; perBanca[banca].dep += suma; }
    else { totalRet += suma; perBanca[banca].ret += suma; }

    html += `<tr>
      <td>${data}</td>
      <td style="font-weight:700; color:${isDep?'var(--green)':'var(--red)'};">${d.tip}</td>
      <td>${banca}</td>
      <td>${d.beneficiar || ''}</td>
      <td class="num green">${isDep ? fmt(suma) : ''}</td>
      <td class="num red">${isDep ? '' : fmt(suma)}</td>
      <td style="font-size:12px; color:var(--sub);">${d.observatii || ''}</td>
    </tr>`;
  }

  html += `<tr class="total-row">
    <td colspan="4">TOTAL ${LUNI[luna].toUpperCase()} ${an}</td>
    <td class="num green">${fmt(totalDep)}</td>
    <td class="num red">${fmt(totalRet)}</td>
    <td></td>
  </tr>`;
  html += '</tbody></table>';

  // Totaluri per bancă
  const banciCuDate = Object.keys(perBanca).sort();
  let perBancaHtml = '<h3 style="margin:20px 0 12px;">Totaluri per bancă</h3>';
  perBancaHtml += '<table><thead><tr><th>BANCA</th><th>DEPUNERI</th><th>RETRAGERI</th><th>FLUX NET</th></tr></thead><tbody>';
  for (const b of banciCuDate) {
    const v = perBanca[b];
    const net = v.dep - v.ret;
    perBancaHtml += `<tr>
      <td>${b}</td>
      <td class="num green">${fmt(v.dep)}</td>
      <td class="num red">${fmt(v.ret)}</td>
      <td class="num" style="font-weight:700; color:${net>=0?'var(--green)':'var(--red)'};">${fmt(net)}</td>
    </tr>`;
  }
  perBancaHtml += `<tr class="total-row"><td>TOTAL</td><td class="num green">${fmt(totalDep)}</td><td class="num red">${fmt(totalRet)}</td><td class="num" style="color:${totalDep-totalRet>=0?'var(--green)':'var(--red)'};">${fmt(totalDep - totalRet)}</td></tr>`;
  perBancaHtml += '</tbody></table>';

  const sumHtml = `<div class="summary">
    <div class="summary-card"><div class="label">Total depuneri ${LUNI[luna]}</div><div class="value green">${fmt(totalDep)} RON</div></div>
    <div class="summary-card"><div class="label">Total retrageri ${LUNI[luna]}</div><div class="value red">${fmt(totalRet)} RON</div></div>
    <div class="summary-card"><div class="label">Nr. operațiuni</div><div class="value">${tranzactii.length}</div></div>
    <div class="summary-card"><div class="label">Flux net</div><div class="value" style="color:${totalDep-totalRet>=0?'var(--green)':'var(--red)'}; font-size:20px;">${fmt(totalDep - totalRet)} RON</div></div>
  </div>`;

  container.innerHTML = sumHtml + html + perBancaHtml;
}

// ══ COMBUSTIBIL ══════════════════════════════════════════════════
function renderCombustibil(an) {
  const container = document.getElementById('tab-combustibil');
  const combustibil = allData.filter(d => d.tip === 'COMBUSTIBIL');

  // Per luna si per vehicul/beneficiar
  const perLuna = {};
  const perVehicul = {};

  for (const d of combustibil) {
    const luna = new Date(d.data).getMonth();
    const vehicul = d.beneficiar.trim();
    const suma = parseFloat(d.iesire || 0) || parseFloat(d.intrare || 0);

    if (!perLuna[luna]) perLuna[luna] = 0;
    perLuna[luna] += suma;

    if (!perVehicul[vehicul]) perVehicul[vehicul] = 0;
    perVehicul[vehicul] += suma;
  }

  let totalComb = 0;

  // Tabel per luna
  let html = '<h3 style="margin-bottom:12px;">Combustibil pe luni</h3><table><thead><tr><th>LUNA</th><th>SUMĂ</th></tr></thead><tbody>';
  for (let m = 0; m < 12; m++) {
    if (!perLuna[m]) continue;
    totalComb += perLuna[m];
    html += `<tr><td>${LUNI[m]}</td><td class="num red">${fmt(perLuna[m])}</td></tr>`;
  }
  html += `<tr class="total-row"><td>TOTAL</td><td class="num red">${fmt(totalComb)}</td></tr>`;
  html += '</tbody></table>';

  // Tabel per vehicul
  const vehiculeSorted = Object.entries(perVehicul).sort((a, b) => b[1] - a[1]);

  for (const [v, suma] of vehiculeSorted) {
    html += `<tr><td>${v}</td><td class="num red">${fmt(suma)}</td></tr>`;
  }
  html += `<tr class="total-row"><td>TOTAL</td><td class="num red">${fmt(totalComb)}</td></tr>`;

  const sumHtml = `<div class="summary">

    <div class="summary-card"><div class="label">Medie/lună</div><div class="value" style="font-size:18px;">${fmt(totalComb / (Object.keys(perLuna).length || 1))}</div></div>
  </div>`;

  container.innerHTML = sumHtml + html;

// ══ PERSONAL (LIVIA / BEBE / L+B) ════════════════════════════════
function renderPersonal(an) {
  const container = document.getElementById('tab-personal');
  const PERSOANE = ['LIVIA', 'BEBE', 'L+B'];

  // Filtrăm operațiunile unde beneficiarul e unul din cele 3 persoane
  const personale = allData.filter(d => {
    const ben = (d.beneficiar || '').trim().toUpperCase();
    return PERSOANE.includes(ben);
  });

  if (personale.length === 0) {
    container.innerHTML = '<div class="loading">Nu sunt operațiuni pentru LIVIA / BEBE / L+B în anul selectat.</div>';
    return;
  }

  // Matrix: luna x persoana -> { intrare, iesire }
  const matrix = {};
  for (let m = 0; m < 12; m++) matrix[m] = {};
  for (const d of personale) {
    const luna = new Date(d.data).getMonth();
    const ben = (d.beneficiar || '').trim().toUpperCase();
    if (!matrix[luna][ben]) matrix[luna][ben] = { intrare: 0, iesire: 0 };
    matrix[luna][ben].intrare += parseFloat(d.intrare || 0);
    matrix[luna][ben].iesire += parseFloat(d.iesire || 0);
  }

  // Tabel luni x persoane
  const persoaneActive = PERSOANE.filter(p => personale.some(d => (d.beneficiar || '').trim().toUpperCase() === p));

  let html = '<h3 style="margin-bottom:12px;">Sumar lunar — sume primite de fiecare persoană</h3>';
  html += '<table><thead><tr><th>LUNA</th>';
  for (const p of persoaneActive) html += `<th>${p}</th>`;
  html += '<th style="background:var(--blue);">TOTAL LUNA</th></tr></thead><tbody>';

  const totalPers = {};
  for (const p of persoaneActive) totalPers[p] = 0;
  let grandTotal = 0;

  for (let m = 0; m < 12; m++) {
    let hasData = false;
    for (const p of persoaneActive) {
      if (matrix[m][p] && matrix[m][p].iesire) { hasData = true; break; }
    }
    if (!hasData) continue;

    let rowTotal = 0;
    html += `<tr><td>${LUNI[m]}</td>`;
    for (const p of persoaneActive) {
      const val = matrix[m][p]?.iesire || 0;
      totalPers[p] += val;
      rowTotal += val;
      html += `<td class="num red">${fmt(val)}</td>`;
    }
    grandTotal += rowTotal;
    html += `<td class="num" style="font-weight:700; color:var(--blue);">${fmt(rowTotal)}</td></tr>`;
  }

  html += '<tr class="total-row"><td>TOTAL ' + an + '</td>';
  for (const p of persoaneActive) html += `<td class="num red">${fmt(totalPers[p])}</td>`;
  html += `<td class="num" style="color:var(--blue);">${fmt(grandTotal)}</td></tr>`;
  html += '</tbody></table>';

  // Detaliu operațiuni
  html += '<h3 style="margin:24px 0 12px;">Detaliu operațiuni</h3>';
  html += '<table><thead><tr><th>DATA</th><th>PERSOANĂ</th><th>TIP</th><th class="num">INTRARE</th><th class="num">IEȘIRE</th><th>OBSERVAȚII</th><th>UTILIZATOR</th></tr></thead><tbody>';

  const sortate = [...personale].sort((a, b) => (b.data || '').localeCompare(a.data || ''));
  for (const d of sortate) {
    const data = new Date(d.data).toLocaleDateString('ro-RO', { day: '2-digit', month: '2-digit', year: 'numeric' });
    const ben = (d.beneficiar || '').trim().toUpperCase();
    const intrareStr = d.intrare > 0 ? fmt(d.intrare) : '';
    const iesireStr = d.iesire > 0 ? fmt(d.iesire) : '';
    html += `<tr>
      <td>${data}</td>
      <td style="font-weight:700; color:var(--purple);">${ben}</td>
      <td>${d.tip || ''}</td>
      <td class="num green">${intrareStr}</td>
      <td class="num red">${iesireStr}</td>
      <td style="font-size:12px; color:var(--sub);">${d.observatii || ''}</td>
      <td style="font-size:11px; color:#aaa;">${d.utilizator || ''}</td>
    </tr>`;
  }
  html += '</tbody></table>';

  // Summary cards
  let totalGeneral = 0;
  for (const p of persoaneActive) totalGeneral += totalPers[p];
  const sumHtml = '<div class="summary">' +
    persoaneActive.map(p =>
      `<div class="summary-card"><div class="label">${p}</div><div class="value red">${fmt(totalPers[p])} RON</div></div>`
    ).join('') +
    `<div class="summary-card" style="border:2px solid var(--border);">
      <div class="label" style="font-size:14px; font-weight:700;">TOTAL ${an}</div>
      <div class="value" style="color:var(--blue);">${fmt(totalGeneral)} RON</div>
    </div>
    <div class="summary-card">
      <div class="label">Nr. operațiuni</div>
      <div class="value">${personale.length}</div>
    </div>` +
    '</div>';

  container.innerHTML = sumHtml + html;
}

// ══ REZUMAT ═════════════════════════════════════════════════════
function renderRezumat(an) {
  const container = document.getElementById('tab-rezumat');

  // Grupare per tip
  const perTip = {};
  for (const d of allData) {
    const tip = d.tip.trim();
    if (!perTip[tip]) perTip[tip] = { intrare: 0, iesire: 0, count: 0 };
    perTip[tip].intrare += parseFloat(d.intrare || 0);
    perTip[tip].iesire += parseFloat(d.iesire || 0);
    perTip[tip].count++;
  }

  const tipuriSorted = Object.entries(perTip).sort((a, b) => (b[1].intrare + b[1].iesire) - (a[1].intrare + a[1].iesire));

  let totalIntrare = 0, totalIesire = 0;

  let html = '<h3 style="margin-bottom:12px;">Rezumat pe tipuri de operațiuni</h3>';
  html += '<table><thead><tr><th>TIP OPERAȚIUNE</th><th>NR.</th><th>INTRĂRI</th><th>IEȘIRI</th><th>DIFERENȚĂ</th></tr></thead><tbody>';

  for (const [tip, val] of tipuriSorted) {
    const dif = val.intrare - val.iesire;
    totalIntrare += val.intrare;
    totalIesire += val.iesire;
    html += `<tr>
      <td>${tip}</td>
      <td class="num">${val.count}</td>
      <td class="num green">${fmt(val.intrare)}</td>
      <td class="num red">${fmt(val.iesire)}</td>
      <td class="num" style="font-weight:700; color:${dif >= 0 ? 'var(--green)' : 'var(--red)'};">${fmt(dif)}</td>
    </tr>`;
  }

  html += `<tr class="total-row">
    <td>TOTAL</td><td class="num">${allData.length}</td>
    <td class="num green">${fmt(totalIntrare)}</td>
    <td class="num red">${fmt(totalIesire)}</td>
    <td class="num" style="color:${totalIntrare - totalIesire >= 0 ? 'var(--green)' : 'var(--red)'};">${fmt(totalIntrare - totalIesire)}</td>
  </tr>`;
  html += '</tbody></table>';

  // Per luna
  html += '<h3 style="margin:20px 0 12px;">Rezumat pe luni</h3>';
  html += '<table><thead><tr><th>LUNA</th><th>INTRĂRI</th><th>IEȘIRI</th><th>DIFERENȚĂ</th><th>SOLD CUMULAT</th></tr></thead><tbody>';

  let soldCumulat = 0;
  for (let m = 0; m < 12; m++) {
    const lunaData = allData.filter(d => new Date(d.data).getMonth() === m);
    if (lunaData.length === 0) continue;
    let intr = 0, ies = 0;
    for (const d of lunaData) {
      intr += parseFloat(d.intrare || 0);
      ies += parseFloat(d.iesire || 0);
    }
    const dif = intr - ies;
    soldCumulat += dif;
    html += `<tr>
      <td>${LUNI[m]}</td>
      <td class="num green">${fmt(intr)}</td>
      <td class="num red">${fmt(ies)}</td>
      <td class="num" style="font-weight:700; color:${dif >= 0 ? 'var(--green)' : 'var(--red)'};">${fmt(dif)}</td>
      <td class="num" style="font-weight:700; color:var(--blue);">${fmt(soldCumulat)}</td>
    </tr>`;
  }
  html += '</tbody></table>';

  const sumHtml = `<div class="summary">
    <div class="summary-card"><div class="label">Total intrări ${an}</div><div class="value green">${fmt(totalIntrare)} RON</div></div>
    <div class="summary-card"><div class="label">Total ieșiri ${an}</div><div class="value red">${fmt(totalIesire)} RON</div></div>
    <div class="summary-card"><div class="label">Diferență</div><div class="value" style="color:${totalIntrare-totalIesire>=0?'var(--green)':'var(--red)'};">${fmt(totalIntrare - totalIesire)} RON</div></div>
    <div class="summary-card"><div class="label">Nr. operațiuni</div><div class="value">${allData.length}</div></div>
  </div>`;

  container.innerHTML = sumHtml + html;
}
</script>
</body>
</html>
