<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raport Pontaj — ARAFURA</title>
  <script src="config.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #1a73e8;
      --green: #1e8449;
      --red: #c0392b;
      --orange: #e67e22;
      --bg: #f4f6f9;
      --card: #ffffff;
      --text: #1a1a2e;
      --sub: #6b7280;
      --border: #e5e7eb;
    }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 20px;
    }
    .header {
      background: var(--blue);
      color: white;
      padding: 20px 30px;
      border-radius: 14px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 14px;
    }
    .header h1 { font-size: 22px; font-weight: 800; }
    .header-controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .header select, .header button {
      padding: 10px 16px;
      font-size: 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .header select { background: rgba(255,255,255,.2); color: white; }
    .header select option { color: #333; }
    .header button { background: white; color: var(--blue); font-weight: 700; }

    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 20px;
    }
    .summary-card {
      background: var(--card);
      border-radius: 12px;
      padding: 18px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .summary-card .label { font-size: 13px; color: var(--sub); }
    .summary-card .value { font-size: 26px; font-weight: 800; margin-top: 4px; }
    .summary-card .value.blue { color: var(--blue); }
    .summary-card .value.green { color: var(--green); }
    .summary-card .value.red { color: var(--red); }
    .summary-card .value.orange { color: var(--orange); }

    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--card);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      font-size: 13px;
    }
    th {
      background: var(--blue);
      color: white;
      padding: 10px 8px;
      text-align: left;
      font-size: 12px;
      white-space: nowrap;
    }
    td {
      padding: 8px;
      border-bottom: 1px solid var(--border);
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f0f4ff; }
    .num { text-align: right; font-variant-numeric: tabular-nums; }
    .bold { font-weight: 700; }
    .weekend-badge {
      background: #fef3c7;
      color: #92400e;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }
    .total-row td {
      background: #e8f0fe;
      font-weight: 700;
      border-top: 2px solid var(--blue);
    }
    .rest-plata { color: var(--green); font-weight: 700; }
    .rest-negativ { color: var(--red); font-weight: 700; }

    .detail-table { margin-bottom: 30px; }
    .day-sat { background: #fef9c3; }
    .day-sun { background: #fee2e2; }
    .day-co { background: #dbeafe; font-style: italic; }

    .loading {
      text-align: center;
      padding: 60px;
      color: var(--sub);
      font-size: 18px;
    }

    .btn-export {
      padding: 10px 20px;
      background: var(--green);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-export:hover { background: #166a3a; }

    .manager-stores {
      display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px;
    }
    .store-badge {
      background: var(--bg);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
    }
    .store-badge strong { color: var(--blue); }

    /* Tranzactii panel */
    .tranz-panel {
      padding: 16px;
      background: #fafbfc;
    }
    .tranz-section {
      margin-bottom: 16px;
    }
    .tranz-section h4 {
      font-size: 14px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .tranz-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 10px;
    }
    .tranz-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: white;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 13px;
    }
    .tranz-item .tranz-data { color: var(--sub); min-width: 80px; }
    .tranz-item .tranz-suma { font-weight: 700; min-width: 80px; text-align: right; }
    .tranz-item .tranz-desc { flex: 1; color: #555; }
    .tranz-item.avans .tranz-suma { color: var(--orange); }
    .tranz-item.imprumut .tranz-suma { color: var(--red); }
    .tranz-item .tranz-del {
      background: none; border: none; color: #ccc; cursor: pointer; font-size: 16px;
    }
    .tranz-item .tranz-del:hover { color: var(--red); }

    .tranz-add {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .tranz-add input, .tranz-add select {
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
    }
    .tranz-add input[type=number] { width: 90px; text-align: right; }
    .tranz-add input[type=date] { width: 130px; }
    .tranz-add input[type=text] { width: 160px; }
    .tranz-add button {
      padding: 8px 14px;
      background: var(--blue);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    .tranz-total {
      display: flex;
      gap: 20px;
      padding: 10px 12px;
      background: white;
      border-radius: 8px;
      border: 2px solid var(--border);
      font-size: 14px;
      font-weight: 600;
      flex-wrap: wrap;
    }

    @media print {
      body { padding: 0; font-size: 11px; }
      .header button, .header select { display: none; }
      .no-print, .tranz-add, .tranz-del { display: none !important; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>ARAFURA — Raport Pontaj</h1>
  <div class="header-controls">
    <select id="sel-luna"></select>
    <select id="sel-an"></select>
    <button onclick="genereazaRaport()">Generează</button>
    <button class="btn-export" onclick="window.print()">Printează</button>
  </div>
</div>

<div id="content"><div class="loading">Selectează luna și apasă Generează</div></div>

<script>
const HEADERS = { 'apikey': window.SUPABASE_KEY, 'Authorization': `Bearer ${window.SUPABASE_KEY}` };
const API = window.SUPABASE_URL + '/rest/v1';

let raportCurent = null;
let tranzactiiCurent = {};  // angajat_id -> [tranzactii]
let concediiCurent = {};    // angajat_id -> [concedii]
let angajatiCurent = [];
let lunaSelectata = 0;
let anSelectat = 0;

const luni = ['Ianuarie','Februarie','Martie','Aprilie','Mai','Iunie','Iulie','August','Septembrie','Octombrie','Noiembrie','Decembrie'];
const selLuna = document.getElementById('sel-luna');
const selAn = document.getElementById('sel-an');
const now = new Date();

luni.forEach((l, i) => {
  const opt = document.createElement('option');
  opt.value = i; opt.textContent = l;
  if (i === now.getMonth()) opt.selected = true;
  selLuna.appendChild(opt);
});

for (let y = 2026; y >= 2024; y--) {
  const opt = document.createElement('option');
  opt.value = y; opt.textContent = y;
  if (y === now.getFullYear()) opt.selected = true;
  selAn.appendChild(opt);
}

async function fetchAll(url) {
  const all = [];
  let offset = 0;
  while (true) {
    const resp = await fetch(`${url}&limit=1000&offset=${offset}`, { headers: HEADERS });
    const data = await resp.json();
    if (!Array.isArray(data) || data.length === 0) break;
    all.push(...data);
    offset += 1000;
    if (data.length < 1000) break;
  }
  return all;
}

async function genereazaRaport() {
  lunaSelectata = parseInt(selLuna.value);
  anSelectat = parseInt(selAn.value);
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading">Se generează raportul...</div>';

  try {
    angajatiCurent = await fetchAll(`${API}/angajati?select=*&activ=eq.true&order=nume.asc`);
    const angajati = angajatiCurent;

    const primaZi = `${anSelectat}-${String(lunaSelectata+1).padStart(2,'0')}-01`;
    const ultimaZiDate = new Date(anSelectat, lunaSelectata+1, 0);
    const ultimaZi = `${anSelectat}-${String(lunaSelectata+1).padStart(2,'0')}-${String(ultimaZiDate.getDate()).padStart(2,'0')}`;

    const pontaje = await fetchAll(`${API}/pontaj?select=*&data=gte.${primaZi}&data=lte.${ultimaZi}&order=data.asc,created_at.asc`);
    const concedii = await fetchAll(`${API}/concedii?select=*&data_start=lte.${ultimaZi}&data_end=gte.${primaZi}&aprobat=not.eq.false`);

    // Stocheaza concedii per angajat
    concediiCurent = {};
    for (const c of concedii) {
      if (!concediiCurent[c.angajat_id]) concediiCurent[c.angajat_id] = [];
      concediiCurent[c.angajat_id].push(c);
    }

    // Fetch tranzactii luna curenta
    const tranzactii = await fetchAll(`${API}/tranzactii?select=*&luna=eq.${lunaSelectata+1}&an=eq.${anSelectat}&order=data.asc`);
    tranzactiiCurent = {};
    for (const t of tranzactii) {
      if (!tranzactiiCurent[t.angajat_id]) tranzactiiCurent[t.angajat_id] = [];
      tranzactiiCurent[t.angajat_id].push(t);
    }

    raportCurent = calculeazaRaport(angajati, pontaje, concedii, anSelectat, lunaSelectata);
    afiseazaRaport(raportCurent, anSelectat, lunaSelectata);

  } catch (e) {
    content.innerHTML = `<div class="loading">Eroare: ${e.message}</div>`;
  }
}

function calcTranzactii(angId) {
  const lista = tranzactiiCurent[angId] || [];
  let avans = 0, imprumut = 0;
  for (const t of lista) {
    if (t.tip === 'avans') avans += parseFloat(t.suma) || 0;
    else if (t.tip === 'imprumut') imprumut += parseFloat(t.suma) || 0;
  }
  return { avans, imprumut };
}

function calculeazaRaport(angajati, pontaje, concedii, an, luna) {
  const rezultate = [];
  const nrZile = new Date(an, luna + 1, 0).getDate();

  for (const ang of angajati) {
    const pontajeAng = pontaje.filter(p => p.angajat_id === ang.id);
    const concediiAng = concedii.filter(c => c.angajat_id === ang.id);

    const zileConcediu = new Set();
    for (const c of concediiAng) {
      const start = new Date(c.data_start);
      const end = new Date(c.data_end);
      for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
        const ds = d.toISOString().slice(0, 10);
        if (d.getFullYear() === an && d.getMonth() === luna) {
          zileConcediu.add(ds);
        }
      }
    }

    let oreLucrateLV = 0, oreLucrateWE = 0;
    let zileLucrateLV = 0, zileLucrateWE = 0;
    let oreConcediu = 0, zileConcediuNr = 0;
    const detaliiZile = [];
    const orePeMagazin = {};

    const pontajePeZi = {};
    for (const p of pontajeAng) {
      if (!pontajePeZi[p.data]) pontajePeZi[p.data] = [];
      pontajePeZi[p.data].push(p);
    }

    for (let z = 1; z <= nrZile; z++) {
      const data = new Date(an, luna, z);
      const dataStr = data.toISOString().slice(0, 10);
      const ziSapt = data.getDay();
      const esteWE = (ziSapt === 0 || ziSapt === 6);
      const esteSam = ziSapt === 6;
      const esteDum = ziSapt === 0;

      if (zileConcediu.has(dataStr)) {
        let oreCO = 0;
        if (esteSam) oreCO = ang.ore_sambata || 0;
        else if (esteDum) oreCO = ang.ore_duminica || 0;
        else oreCO = ang.ore_luni_vineri || 0;
        oreConcediu += oreCO;
        zileConcediuNr++;
        detaliiZile.push({
          data: dataStr, zi: ziSapt, tip: 'concediu',
          ore: oreCO, tarif: ang.tarif_ora || 0,
          multiplicator: 1, suma: oreCO * (ang.tarif_ora || 0)
        });
      } else if (pontajePeZi[dataStr]) {
        let oreZi = 0;
        for (const p of pontajePeZi[dataStr]) {
          if (p.ora_intrare && p.ora_iesire) {
            const ore = (new Date(p.ora_iesire) - new Date(p.ora_intrare)) / 3600000;
            oreZi += ore;
            const mag = p.magazin || 'Necunoscut';
            orePeMagazin[mag] = (orePeMagazin[mag] || 0) + ore;
          }
        }
        oreZi = Math.round(oreZi * 100) / 100;
        const mult = esteWE ? 2 : 1;
        if (esteWE) { oreLucrateWE += oreZi; zileLucrateWE++; }
        else { oreLucrateLV += oreZi; zileLucrateLV++; }
        detaliiZile.push({
          data: dataStr, zi: ziSapt, tip: esteWE ? 'weekend' : 'lucru',
          ore: oreZi, tarif: ang.tarif_ora || 0,
          multiplicator: mult, suma: oreZi * (ang.tarif_ora || 0) * mult,
          pontaje: pontajePeZi[dataStr]
        });
      }
    }

    const esteFix = !!ang.salariu_fix;
    const sumLV = esteFix ? 0 : oreLucrateLV * (ang.tarif_ora || 0);
    const sumWE = esteFix ? 0 : oreLucrateWE * (ang.tarif_ora || 0) * 2;
    const sumCO = esteFix ? 0 : oreConcediu * (ang.tarif_ora || 0);
    const totalSuma = esteFix ? ang.salariu_fix : (sumLV + sumWE + sumCO);

    const { avans, imprumut } = calcTranzactii(ang.id);
    const restPlata = totalSuma - avans - imprumut;

    rezultate.push({
      angajat: ang,
      oreLucrateLV: Math.round(oreLucrateLV * 100) / 100,
      oreLucrateWE: Math.round(oreLucrateWE * 100) / 100,
      zileLucrateLV, zileLucrateWE, oreConcediu, zileConcediuNr,
      sumLV: Math.round(sumLV * 100) / 100,
      sumWE: Math.round(sumWE * 100) / 100,
      sumCO: Math.round(sumCO * 100) / 100,
      totalSuma: Math.round(totalSuma * 100) / 100,
      avans, imprumut,
      restPlata: Math.round(restPlata * 100) / 100,
      detaliiZile, orePeMagazin
    });
  }
  return rezultate;
}

function numeZi(zi) {
  return ['Dum','Lun','Mar','Mie','Joi','Vin','Sam'][zi];
}

function afiseazaRaport(raport, an, luna) {
  const content = document.getElementById('content');
  const totalSalarii = raport.reduce((s, r) => s + r.totalSuma, 0);
  const totalAvans = raport.reduce((s, r) => s + r.avans, 0);
  const totalImprumut = raport.reduce((s, r) => s + r.imprumut, 0);
  const totalRest = raport.reduce((s, r) => s + r.restPlata, 0);
  const totalOreLV = raport.reduce((s, r) => s + r.oreLucrateLV, 0);
  const totalOreWE = raport.reduce((s, r) => s + r.oreLucrateWE, 0);

  let html = `
    <div class="summary">
      <div class="summary-card">
        <div class="label">Total salarii brut</div>
        <div class="value blue">${totalSalarii.toLocaleString('ro-RO', {minimumFractionDigits:2})} RON</div>
      </div>
      <div class="summary-card">
        <div class="label">Total avansuri</div>
        <div class="value orange">${totalAvans.toLocaleString('ro-RO', {minimumFractionDigits:2})} RON</div>
      </div>
      <div class="summary-card">
        <div class="label">Total împrumuturi</div>
        <div class="value red">${totalImprumut.toLocaleString('ro-RO', {minimumFractionDigits:2})} RON</div>
      </div>
      <div class="summary-card">
        <div class="label">Rest de plată (lichidare)</div>
        <div class="value green">${totalRest.toLocaleString('ro-RO', {minimumFractionDigits:2})} RON</div>
      </div>
      <div class="summary-card">
        <div class="label">Ore L-V / Weekend</div>
        <div class="value">${totalOreLV.toFixed(1)}h / ${totalOreWE.toFixed(1)}h</div>
      </div>
    </div>

    <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Angajat</th>
          <th>Tarif/h</th>
          <th class="num">Ore L-V</th>
          <th class="num">Suma L-V</th>
          <th class="num">Ore WE</th>
          <th class="num">Suma WE (x2)</th>
          <th class="num">Zile CO</th>
          <th class="num">Suma CO</th>
          <th class="num bold">TOTAL</th>
          <th class="num">Avans</th>
          <th class="num">Împrumut</th>
          <th class="num bold">REST PLATĂ</th>
        </tr>
      </thead>
      <tbody>`;

  for (const r of raport) {
    const isManager = r.angajat.nume === 'BARABULEA MADALINA';
    const isFix = !!r.angajat.salariu_fix;
    const tipLabel = isManager ? ' <span style="color:#999; font-size:11px;">MANAGER</span>' :
                     isFix ? ' <span style="color:#1a73e8; font-size:11px;">FIX</span>' : '';
    const restCls = r.restPlata < 0 ? 'rest-negativ' : 'rest-plata';

    html += `
        <tr style="cursor:pointer" onclick="toggleDetalii('det-${r.angajat.id}')">
          <td class="bold">${r.angajat.nume}${tipLabel}</td>
          <td class="num">${isFix ? 'FIX' : (r.angajat.tarif_ora || '—')}</td>
          <td class="num">${r.oreLucrateLV || '—'}</td>
          <td class="num">${isFix ? '—' : (r.sumLV ? r.sumLV.toFixed(2) : '—')}</td>
          <td class="num">${r.oreLucrateWE || '—'}</td>
          <td class="num">${isFix ? '—' : (r.sumWE ? r.sumWE.toFixed(2) : '—')}</td>
          <td class="num">${r.zileConcediuNr || '—'}</td>
          <td class="num">${isFix ? '—' : (r.sumCO ? r.sumCO.toFixed(2) : '—')}</td>
          <td class="num bold">${r.totalSuma.toFixed(2)}</td>
          <td class="num" style="color:var(--orange)">${r.avans ? r.avans.toFixed(2) : '—'}</td>
          <td class="num" style="color:var(--red)">${r.imprumut ? r.imprumut.toFixed(2) : '—'}</td>
          <td class="num ${restCls}">${r.restPlata.toFixed(2)} RON</td>
        </tr>
        <tr id="det-${r.angajat.id}" style="display:none">
          <td colspan="12" style="padding:0;">
            ${renderDetaliiComplet(r, isManager)}
          </td>
        </tr>`;
  }

  html += `
        <tr class="total-row">
          <td class="bold" colspan="2">TOTAL</td>
          <td class="num">${totalOreLV.toFixed(1)}</td>
          <td class="num">${raport.filter(r=>!r.angajat.salariu_fix).reduce((s,r)=>s+r.sumLV,0).toFixed(2)}</td>
          <td class="num">${totalOreWE.toFixed(1)}</td>
          <td class="num">${raport.filter(r=>!r.angajat.salariu_fix).reduce((s,r)=>s+r.sumWE,0).toFixed(2)}</td>
          <td class="num">${raport.reduce((s,r)=>s+r.zileConcediuNr,0)}</td>
          <td class="num">${raport.filter(r=>!r.angajat.salariu_fix).reduce((s,r)=>s+r.sumCO,0).toFixed(2)}</td>
          <td class="num bold">${totalSalarii.toFixed(2)}</td>
          <td class="num bold">${totalAvans.toFixed(2)}</td>
          <td class="num bold">${totalImprumut.toFixed(2)}</td>
          <td class="num bold rest-plata">${totalRest.toFixed(2)} RON</td>
        </tr>`;

  html += '</tbody></table></div>';
  content.innerHTML = html;
}

function renderDetaliiComplet(r, isManager) {
  let html = '<div class="tranz-panel">';

  // Manager: ore pe magazine
  if (isManager) {
    html += '<div class="tranz-section"><h4>Ore pe magazine:</h4>';
    html += '<div class="manager-stores">';
    const stores = Object.entries(r.orePeMagazin).sort((a,b) => b[1] - a[1]);
    const totalOre = stores.reduce((s, [,h]) => s + h, 0);
    if (stores.length === 0) {
      html += '<span style="color:#999;">Nicio activitate</span>';
    } else {
      for (const [mag, ore] of stores) {
        html += `<div class="store-badge"><strong>${mag}</strong>: ${ore.toFixed(1)}h</div>`;
      }
      html += `<div class="store-badge" style="background:#e8f0fe;"><strong>TOTAL</strong>: ${totalOre.toFixed(1)}h</div>`;
    }
    html += '</div></div>';
  }

  // Tranzactii financiare
  const tranz = tranzactiiCurent[r.angajat.id] || [];
  const avansuri = tranz.filter(t => t.tip === 'avans');
  const imprumuturi = tranz.filter(t => t.tip === 'imprumut');

  html += '<div class="tranz-section"><h4>Avansuri <span style="color:var(--orange);">(${r.avans.toFixed(2)} RON)</span></h4>';
  html += '<div class="tranz-list" id="tranz-avans-${r.angajat.id}">';
  if (avansuri.length === 0) {
    html += '<div style="color:#999; font-size:13px; padding:4px;">Niciun avans</div>';
  } else {
    for (const t of avansuri) {
      html += renderTranzItem(t);
    }
  }
  html += '</div>';
  html += renderAddForm(r.angajat.id, r.angajat.nume, 'avans');
  html += '</div>';

  html += '<div class="tranz-section"><h4>Împrumuturi <span style="color:var(--red);">(${r.imprumut.toFixed(2)} RON)</span></h4>';
  html += '<div class="tranz-list" id="tranz-imprumut-${r.angajat.id}">';
  if (imprumuturi.length === 0) {
    html += '<div style="color:#999; font-size:13px; padding:4px;">Niciun împrumut</div>';
  } else {
    for (const t of imprumuturi) {
      html += renderTranzItem(t);
    }
  }
  html += '</div>';
  html += renderAddForm(r.angajat.id, r.angajat.nume, 'imprumut');
  html += '</div>';

  // Concedii
  const concediiAng = concediiCurent[r.angajat.id] || [];
  html += `<div class="tranz-section"><h4>Concedii (${r.zileConcediuNr} zile)</h4>`;
  html += `<div class="tranz-list">`;
  if (concediiAng.length === 0) {
    html += '<div style="color:#999; font-size:13px; padding:4px;">Niciun concediu</div>';
  } else {
    for (const c of concediiAng) {
      const tipLabel = c.tip === 'medical' ? 'Medical' : 'Odihnă';
      const tipColor = c.tip === 'medical' ? 'var(--red)' : 'var(--blue)';
      html += `<div class="tranz-item">
        <span class="tranz-data">${c.data_start} → ${c.data_end}</span>
        <span class="tranz-suma" style="color:${tipColor}">${tipLabel}</span>
        <span class="tranz-desc">${c.tip === 'medical' ? 'Concediu medical' : 'Concediu de odihnă'}</span>
        <button class="tranz-del no-print" onclick="event.stopPropagation(); stergeConcediu(${c.id})" title="Șterge">✕</button>
      </div>`;
    }
  }
  html += '</div>';
  // Formular adaugare concediu
  const today = new Date().toISOString().slice(0, 10);
  html += `<div class="tranz-add no-print">
    <select id="co-tip-${r.angajat.id}">
      <option value="concediu">Odihnă</option>
      <option value="medical">Medical</option>
    </select>
    <input type="date" value="${today}" id="co-start-${r.angajat.id}">
    <span style="font-size:13px;">→</span>
    <input type="date" value="${today}" id="co-end-${r.angajat.id}">
    <button onclick="event.stopPropagation(); adaugaConcediu(${r.angajat.id}, '${r.angajat.nume}')">Adaugă concediu</button>
  </div>`;
  html += '</div>';

  // Sumar financiar
  html += `<div class="tranz-total">
    <span>Salariu: <strong>${r.totalSuma.toFixed(2)} RON</strong></span>
    <span>- Avansuri: <strong style="color:var(--orange)">${r.avans.toFixed(2)}</strong></span>
    <span>- Împrumuturi: <strong style="color:var(--red)">${r.imprumut.toFixed(2)}</strong></span>
    <span>= <strong class="${r.restPlata < 0 ? 'rest-negativ' : 'rest-plata'}">${r.restPlata.toFixed(2)} RON REST PLATĂ</strong></span>
  </div>`;

  // Detalii zilnice
  if (r.detaliiZile.length > 0) {
    html += '<div style="margin-top:16px;">' + renderDetaliiTable(r) + '</div>';
  }

  html += '</div>';

  // Fix template literals inside template literals
  return html
    .replace(/\$\{r\.avans\.toFixed\(2\)\}/g, r.avans.toFixed(2))
    .replace(/\$\{r\.imprumut\.toFixed\(2\)\}/g, r.imprumut.toFixed(2))
    .replace(/\$\{r\.angajat\.id\}/g, r.angajat.id);
}

function renderTranzItem(t) {
  return `<div class="tranz-item ${t.tip}">
    <span class="tranz-data">${t.data}</span>
    <span class="tranz-suma">${parseFloat(t.suma).toFixed(2)} RON</span>
    <span class="tranz-desc">${t.descriere || '—'}</span>
    <button class="tranz-del no-print" onclick="event.stopPropagation(); stergeTranzactie(${t.id})" title="Șterge">✕</button>
  </div>`;
}

function renderAddForm(angId, angNume, tip) {
  const today = new Date().toISOString().slice(0, 10);
  const label = tip === 'avans' ? 'Adaugă avans' : 'Adaugă împrumut';
  return `<div class="tranz-add no-print">
    <input type="number" step="0.01" placeholder="Suma" id="tranz-suma-${tip}-${angId}">
    <input type="date" value="${today}" id="tranz-data-${tip}-${angId}">
    <input type="text" placeholder="Descriere" id="tranz-desc-${tip}-${angId}">
    <button onclick="event.stopPropagation(); adaugaTranzactie(${angId}, '${angNume}', '${tip}')">${label}</button>
  </div>`;
}

async function adaugaTranzactie(angId, angNume, tip) {
  const suma = parseFloat(document.getElementById(`tranz-suma-${tip}-${angId}`).value);
  const data = document.getElementById(`tranz-data-${tip}-${angId}`).value;
  const descriere = document.getElementById(`tranz-desc-${tip}-${angId}`).value;

  if (!suma || suma <= 0) { alert('Introdu o sumă validă'); return; }
  if (!data) { alert('Selectează data'); return; }

  try {
    const resp = await fetch(`${API}/tranzactii`, {
      method: 'POST',
      headers: { ...HEADERS, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
      body: JSON.stringify({
        angajat_id: angId,
        angajat_nume: angNume,
        tip, suma, data, descriere,
        luna: lunaSelectata + 1,
        an: anSelectat
      })
    });
    const result = await resp.json();
    if (Array.isArray(result) && result.length > 0) {
      // Regenereaza raportul
      genereazaRaport();
    }
  } catch (e) {
    alert('Eroare: ' + e.message);
  }
}

async function adaugaConcediu(angId, angNume) {
  const tip = document.getElementById(`co-tip-${angId}`).value;
  const dataStart = document.getElementById(`co-start-${angId}`).value;
  const dataEnd = document.getElementById(`co-end-${angId}`).value;

  if (!dataStart || !dataEnd) { alert('Completează datele'); return; }
  if (dataEnd < dataStart) { alert('Data de sfârșit trebuie să fie după cea de început'); return; }

  try {
    await fetch(`${API}/concedii`, {
      method: 'POST',
      headers: { ...HEADERS, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({
        angajat_id: angId,
        angajat_nume: angNume,
        data_start: dataStart,
        data_end: dataEnd,
        tip: tip,
        aprobat: true
      })
    });
    genereazaRaport();
  } catch (e) {
    alert('Eroare: ' + e.message);
  }
}

async function stergeConcediu(id) {
  if (!confirm('Sigur vrei să ștergi acest concediu?')) return;
  try {
    await fetch(`${API}/concedii?id=eq.${id}`, {
      method: 'DELETE',
      headers: HEADERS
    });
    genereazaRaport();
  } catch (e) {
    alert('Eroare: ' + e.message);
  }
}

async function stergeTranzactie(id) {
  if (!confirm('Sigur vrei să ștergi această tranzacție?')) return;
  try {
    await fetch(`${API}/tranzactii?id=eq.${id}`, {
      method: 'DELETE',
      headers: HEADERS
    });
    genereazaRaport();
  } catch (e) {
    alert('Eroare: ' + e.message);
  }
}

function renderDetaliiTable(r) {
  let html = `<table class="detail-table" style="margin:0; box-shadow:none; font-size:13px;">
    <thead><tr>
      <th>Data</th><th>Zi</th><th>Tip</th><th class="num">Ore</th>
      <th class="num">Tarif</th><th class="num">Mult.</th><th class="num">Suma</th><th>Detalii</th>
    </tr></thead><tbody>`;

  for (const z of r.detaliiZile) {
    const cls = z.tip === 'weekend' ? 'day-sat' : (z.tip === 'concediu' ? 'day-co' : '');
    const tipLabel = z.tip === 'weekend' ? '<span class="weekend-badge">WEEKEND x2</span>' :
                     z.tip === 'concediu' ? 'CONCEDIU' : 'Lucru';

    let detalii = '';
    if (z.pontaje) {
      detalii = z.pontaje.map(p => {
        const mag = p.magazin ? `[${p.magazin}] ` : '';
        const i = p.ora_intrare ? new Date(p.ora_intrare).toLocaleTimeString('ro-RO',{hour:'2-digit',minute:'2-digit'}) : '?';
        const o = p.ora_iesire ? new Date(p.ora_iesire).toLocaleTimeString('ro-RO',{hour:'2-digit',minute:'2-digit'}) : 'in curs';
        return `${mag}${i}→${o}`;
      }).join(', ');
    }

    html += `<tr class="${cls}">
      <td>${z.data}</td>
      <td>${numeZi(z.zi)}</td>
      <td>${tipLabel}</td>
      <td class="num">${z.ore.toFixed(1)}</td>
      <td class="num">${z.tarif || '—'}</td>
      <td class="num">${z.tarif ? 'x' + z.multiplicator : '—'}</td>
      <td class="num bold">${z.suma ? z.suma.toFixed(2) : '—'}</td>
      <td style="font-size:12px; color:#666;">${detalii}</td>
    </tr>`;
  }

  html += '</tbody></table>';
  return html;
}

function toggleDetalii(id) {
  const el = document.getElementById(id);
  el.style.display = el.style.display === 'none' ? '' : 'none';
}
</script>
