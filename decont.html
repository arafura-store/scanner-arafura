<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Decont — ARAFURA</title>
  <script src="config.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #1a73e8; --green: #1e8449; --red: #c0392b;
      --orange: #e67e22; --bg: #f4f6f9; --card: #ffffff;
      --text: #1a1a2e; --sub: #6b7280; --border: #e5e7eb; --radius: 14px;
    }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; }
    .header {
      background: var(--orange); color: white; padding: 14px 20px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,.2); position: sticky; top: 0; z-index: 100;
    }
    .header h1 { font-size: 20px; font-weight: 800; }
    .header-user { font-size: 14px; opacity: .8; }
    .header button {
      padding: 8px 16px; font-size: 14px; font-weight: 600;
      border: none; border-radius: 8px; cursor: pointer;
      background: rgba(255,255,255,.2); color: white;
    }
    .login-screen {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 60px 24px; gap: 20px;
    }
    .login-screen .icon { font-size: 64px; }
    .login-screen h2 { font-size: 24px; font-weight: 700; }
    .login-screen input {
      width: 200px; padding: 18px; font-size: 32px; text-align: center;
      letter-spacing: 12px; border: 2px solid var(--border); border-radius: var(--radius);
    }
    .login-screen input:focus { border-color: var(--orange); outline: none; }
    .main { max-width: 600px; margin: 20px auto; padding: 0 16px; }
    .fond-bar {
      background: var(--card); border-radius: var(--radius); padding: 16px 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06); margin-bottom: 16px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .fond-label { font-size: 14px; color: var(--sub); }
    .fond-value { font-size: 28px; font-weight: 800; }
    .fond-green { color: var(--green); }
    .fond-red { color: var(--red); }
    .form-card {
      background: var(--card); border-radius: var(--radius); padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06); margin-bottom: 16px;
    }
    .form-card h3 { font-size: 16px; margin-bottom: 14px; color: var(--orange); }
    .form-row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
    .form-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 140px; }
    .form-group label { font-size: 12px; font-weight: 600; color: var(--sub); }
    .form-group input, .form-group select {
      padding: 12px; font-size: 15px; border: 1px solid var(--border); border-radius: 8px;
    }
    .form-group input:focus, .form-group select:focus { border-color: var(--orange); outline: none; }
    .btn-submit {
      width: 100%; padding: 16px; font-size: 18px; font-weight: 700;
      background: var(--orange); color: white; border: none;
      border-radius: var(--radius); cursor: pointer; margin-top: 10px;
    }
    .btn-submit:active { background: #d35400; }
    .btn-trimite-decont {
      width: 100%; padding: 16px; font-size: 18px; font-weight: 700;
      background: var(--blue); color: white; border: none;
      border-radius: var(--radius); cursor: pointer; margin-top: 6px;
    }
    table {
      width: 100%; border-collapse: separate; border-spacing: 0;
      background: var(--card); border-radius: 12px; overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,.08); font-size: 13px; margin-bottom: 16px;
    }
    th {
      background: #2c3e50; color: white; padding: 12px 10px;
      text-align: left; font-size: 12px; text-transform: uppercase;
    }
    td { padding: 10px; border-bottom: 1px solid #f0f0f0; }
    tr:nth-child(even) td { background: #fafbfc; }
    tr:last-child td { border-bottom: none; }
    .total-row td { background: #e8f0fe !important; font-weight: 700; border-top: 2px solid var(--blue); }
    .num { text-align: right; font-variant-numeric: tabular-nums; }
    .btn-del { background: none; border: none; color: #ccc; cursor: pointer; font-size: 14px; }
    .btn-del:hover { color: var(--red); }
    .retur-banner {
      background: #fee2e2; border: 2px solid var(--red); border-radius: var(--radius);
      padding: 16px; margin-bottom: 16px; text-align: center;
    }
    .retur-banner .retur-icon { font-size: 36px; }
    .retur-banner .retur-text { font-size: 16px; font-weight: 700; color: var(--red); margin-top: 8px; }
    .retur-banner .retur-motiv { font-size: 14px; color: #666; margin-top: 6px; }
    .status-badge {
      display: inline-block; padding: 4px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 700;
    }
    .status-trimis { background: #dbeafe; color: #1e40af; }
    .status-confirmat { background: #d1fae5; color: #065f46; }
    .status-returnat { background: #fee2e2; color: #991b1b; }
    .toast {
      position: fixed; bottom: 30px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1a2e; color: white;
      padding: 12px 22px; border-radius: 24px;
      font-size: 15px; z-index: 200; transition: transform .3s ease;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="header">
  <div>
    <h1>ARAFURA — Decont</h1>
    <span class="header-user" id="header-user"></span>
  </div>
  <button onclick="logout()" id="btn-logout" style="display:none">Ieși</button>
</div>
<div class="toast" id="toast"></div>

<div id="screen-login" class="login-screen">
  <div class="icon">🧾</div>
  <h2>Decont cheltuieli</h2>
  <p style="color:var(--sub);">Introdu PIN-ul tău</p>
  <input type="password" inputmode="numeric" maxlength="4" placeholder="****"
    id="login-pin" oninput="onLoginPin()" autocomplete="off">
</div>

<div id="screen-main" style="display:none;">
  <div class="main">
    <div class="fond-bar">
      <div>
        <div class="fond-label">Fond disponibil</div>
        <div class="fond-value fond-green" id="fond-disponibil">—</div>
      </div>
      <div style="text-align:right;">
        <div class="fond-label">Cheltuit</div>
        <div class="fond-value fond-red" id="fond-cheltuit">—</div>
      </div>
    </div>

    <div id="retur-zone"></div>

    <div id="form-zone">
      <div class="form-card">
        <h3>Operațiune nouă</h3>
        <div class="form-row">
          <div class="form-group" style="max-width:160px;">
            <label>Data</label>
            <input type="date" id="f-data">
          </div>
          <div class="form-group" style="max-width:160px;">
            <label>Tip</label>
            <select id="f-tip" style="padding:12px; font-size:15px; border:1px solid var(--border); border-radius:8px;">
              <option value="cheltuiala">Cheltuială</option>
              <option value="incasare">Încasare</option>
            </select>
          </div>
          <div class="form-group">
            <label>Suma (RON)</label>
            <input type="number" step="0.01" id="f-suma" placeholder="0.00">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Beneficiar / Ce ai cumpărat</label>
            <input type="text" id="f-beneficiar" placeholder="ex: BENZINĂ, BUTELII, MATERIALE">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Observații</label>
            <input type="text" id="f-obs" placeholder="opțional">
          </div>
        </div>
        <button class="btn-submit" onclick="adaugaCheltuiala()">Adaugă cheltuială</button>
      </div>
    </div>

    <h3 style="font-size:16px; margin-bottom:12px;">Cheltuielile curente</h3>
    <div id="tabel-cheltuieli"></div>
    <button class="btn-trimite-decont" id="btn-trimite" style="display:none;" onclick="trimiteDecont()">
      📤 Trimite decontul pentru verificare
    </button>

    <div id="istoric-deconturi" style="margin-top:30px;"></div>
  </div>
</div>

<script>
const HEADERS = { 'apikey': window.SUPABASE_KEY, 'Authorization': `Bearer ${window.SUPABASE_KEY}` };
const API = window.SUPABASE_URL + '/rest/v1';
let currentUser = null;
let fondTotal = 0;
let cheltuieliCurente = [];

async function onLoginPin() {
  const pin = document.getElementById('login-pin').value;
  if (pin.length < 4) return;
  try {
    const resp = await fetch(`${API}/caiet_utilizatori?pin=eq.${pin}&activ=eq.true&select=id,nume`, { headers: HEADERS });
    const data = await resp.json();
    if (!Array.isArray(data) || data.length === 0) {
      showToast('PIN incorect');
      document.getElementById('login-pin').value = '';
      return;
    }
    currentUser = data[0];
    document.getElementById('header-user').textContent = currentUser.nume;
    document.getElementById('btn-logout').style.display = '';
    document.getElementById('screen-login').style.display = 'none';
    document.getElementById('screen-main').style.display = '';
    document.getElementById('login-pin').value = '';
    document.getElementById('f-data').value = new Date().toISOString().slice(0, 10);
    await incarcaDate();
  } catch (e) {
    showToast('Eroare conexiune');
  }
}

function logout() {
  currentUser = null;
  document.getElementById('screen-login').style.display = '';
  document.getElementById('screen-main').style.display = 'none';
  document.getElementById('btn-logout').style.display = 'none';
}

async function incarcaDate() {
  try {
    // Fetch fond
    const respFond = await fetch(`${API}/fonduri?utilizator=eq.${encodeURIComponent(currentUser.nume)}&select=suma`, { headers: HEADERS });
    const fondData = await respFond.json();
    fondTotal = (Array.isArray(fondData) && fondData.length > 0) ? parseFloat(fondData[0].suma || 0) : 0;

    // Fetch cheltuieli curente (status=nou, netrimise sau trimise dar neconfirmate)
    const resp = await fetch(
      `${API}/deconturi?select=*&utilizator=eq.${encodeURIComponent(currentUser.nume)}&status=in.(nou,trimis)&confirmat=not.eq.true&returnat=not.eq.true&order=data.desc,created_at.desc`,
      { headers: HEADERS }
    );
    cheltuieliCurente = await resp.json();
    if (!Array.isArray(cheltuieliCurente)) cheltuieliCurente = [];

    // Check for returned deconts
    const respRetur = await fetch(
      `${API}/deconturi?select=*&utilizator=eq.${encodeURIComponent(currentUser.nume)}&returnat=eq.true&confirmat=not.eq.true&order=created_at.desc&limit=10`,
      { headers: HEADERS }
    );
    const returnate = await respRetur.json();

    // Calcule
    let totalCheltuit = 0, totalIncasat = 0;
    for (const d of cheltuieliCurente) {
      const s = parseFloat(d.suma || 0);
      if (s >= 0) totalCheltuit += s;
      else totalIncasat += Math.abs(s);
    }

    const disponibil = fondTotal - totalCheltuit + totalIncasat;
    const fondEl = document.getElementById('fond-disponibil');
    fondEl.textContent = disponibil.toLocaleString('ro-RO', { minimumFractionDigits: 2 }) + ' RON';
    fondEl.className = disponibil >= 0 ? 'fond-value fond-green' : 'fond-value fond-red';
    document.getElementById('fond-cheltuit').textContent = totalCheltuit.toLocaleString('ro-RO', { minimumFractionDigits: 2 }) + ' RON';

    // Check if decont was returned
    const returZone = document.getElementById('retur-zone');
    if (Array.isArray(returnate) && returnate.length > 0) {
      const motiv = returnate[0].motiv_retur || 'Verifică și retrimite';
      returZone.innerHTML = `<div class="retur-banner">
        <div class="retur-icon">🔄</div>
        <div class="retur-text">Decontul a fost returnat!</div>
        <div class="retur-motiv">${escHtml(motiv)}</div>
        <button onclick="acceptaRetur()" style="margin-top:12px; padding:10px 24px; background:var(--blue); color:white; border:none; border-radius:8px; font-weight:700; cursor:pointer;">Am înțeles, refac decontul</button>
      </div>`;
    } else {
      returZone.innerHTML = '';
    }

    // Check if any items are "trimis" (waiting confirmation)
    const esteTrimis = cheltuieliCurente.some(d => d.status === 'trimis');
    const formZone = document.getElementById('form-zone');
    formZone.style.display = esteTrimis ? 'none' : '';

    // Render tabel
    renderTabel(totalCheltuit, esteTrimis);

    // Istoric ultimele 5 deconturi confirmate
    await incarcaIstoric();

  } catch (e) {
    showToast('Eroare la încărcare');
  }
}

async function incarcaIstoric() {
  const container = document.getElementById('istoric-deconturi');
  try {
    const resp = await fetch(
      `${API}/deconturi?select=*&utilizator=eq.${encodeURIComponent(currentUser.nume)}&status=eq.confirmat&order=created_at.desc&limit=50`,
      { headers: HEADERS }
    );
    const data = await resp.json();
    if (!Array.isArray(data) || data.length === 0) {
      container.innerHTML = '';
      return;
    }

    // Grupeaza pe data confirmarii (aproximativ pe deconturi)
    const deconturi = [];
    let currentGroup = null;
    for (const d of data) {
      if (!currentGroup || Math.abs(new Date(d.created_at) - new Date(currentGroup.items[0].created_at)) > 60000) {
        if (deconturi.length >= 5) break;
        currentGroup = { items: [d], total: 0 };
        deconturi.push(currentGroup);
      } else {
        currentGroup.items.push(d);
      }
      const s = parseFloat(d.suma || 0);
      if (s >= 0) currentGroup.total += s;
    }

    if (deconturi.length === 0) { container.innerHTML = ''; return; }

    let html = '<h3 style="font-size:16px; margin-bottom:12px; color:var(--sub);">Ultimele deconturi</h3>';

    for (let i = 0; i < deconturi.length; i++) {
      const dec = deconturi[i];
      const dt = new Date(dec.items[0].created_at).toLocaleDateString('ro-RO', {day:'2-digit', month:'2-digit', year:'numeric'});
      html += `<details style="margin-bottom:10px; background:var(--card); border-radius:12px; box-shadow:0 1px 4px rgba(0,0,0,.06); overflow:hidden;">
        <summary style="padding:14px 16px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; font-weight:600;">
          <span>Decont ${dt} — ${dec.items.length} cheltuieli</span>
          <span style="color:var(--green); font-weight:700;">${dec.total.toLocaleString('ro-RO', {minimumFractionDigits:2})} RON — CONFIRMAT</span>
        </summary>
        <table style="box-shadow:none; border-radius:0;">
          <thead><tr><th>Data</th><th>Beneficiar</th><th class="num">Suma</th><th>Obs</th></tr></thead>
          <tbody>`;
      for (const d of dec.items) {
        const dtItem = new Date(d.data).toLocaleDateString('ro-RO', {day:'2-digit', month:'2-digit'});
        const s = parseFloat(d.suma);
        html += `<tr>
          <td>${dtItem}</td><td>${escHtml(d.beneficiar)}</td>
          <td class="num" style="color:${s<0?'var(--green)':'var(--red)'}; font-weight:700;">${Math.abs(s).toLocaleString('ro-RO',{minimumFractionDigits:2})}</td>
          <td style="font-size:12px; color:#888;">${escHtml(d.observatii||'')}</td>
        </tr>`;
      }
      html += '</tbody></table></details>';
    }

    container.innerHTML = html;
  } catch(e) {
    container.innerHTML = '';
  }
}

function renderTabel(totalCheltuit, esteTrimis) {
  const container = document.getElementById('tabel-cheltuieli');
  const btnTrimite = document.getElementById('btn-trimite');

  if (cheltuieliCurente.length === 0) {
    container.innerHTML = '<div style="text-align:center; padding:30px; color:var(--sub);">Nicio cheltuială încă</div>';
    btnTrimite.style.display = 'none';
    return;
  }

  let html = `<table><thead><tr>
    <th>Data</th><th>Beneficiar</th><th class="num">Suma</th><th>Obs</th><th>Status</th>${!esteTrimis ? '<th></th>' : ''}
  </tr></thead><tbody>`;

  for (const d of cheltuieliCurente) {
    const dt = new Date(d.data).toLocaleDateString('ro-RO', { day: '2-digit', month: '2-digit', year: 'numeric' });
    const sumaVal = parseFloat(d.suma);
    const esteInc = sumaVal < 0;
    const statusBadge = d.status === 'trimis'
      ? '<span class="status-badge status-trimis">TRIMIS</span>'
      : '<span class="status-badge" style="background:#fef3c7; color:#92400e;">DRAFT</span>';

    html += `<tr>
      <td style="white-space:nowrap;">${dt}</td>
      <td style="font-weight:600;">${escHtml(d.beneficiar)}</td>
      <td class="num" style="font-weight:700; color:${esteInc ? 'var(--green)' : 'var(--red)'};">
        ${esteInc ? '+' : '-'}${Math.abs(sumaVal).toLocaleString('ro-RO', { minimumFractionDigits: 2 })}
      </td>
      <td style="color:#888; font-size:12px;">${escHtml(d.observatii || '')}</td>
      <td>${statusBadge}</td>
      ${!esteTrimis ? `<td style="white-space:nowrap;">
        <button class="btn-del" onclick="editCheltuiala(${d.id})" title="Editează" style="color:#1a73e8;">✎</button>
        <button class="btn-del" onclick="stergeCheltuiala(${d.id})" title="Șterge">✕</button>
      </td>` : `<td></td>`}
    </tr>`;
  }

  html += `<tr class="total-row">
    <td colspan="2">TOTAL CHELTUIT</td>
    <td class="num" style="color:var(--red);">${totalCheltuit.toLocaleString('ro-RO', { minimumFractionDigits: 2 })}</td>
    <td colspan="${esteTrimis ? '2' : '3'}"></td>
  </tr>`;
  html += '</tbody></table>';
  container.innerHTML = html;

  // Buton trimite - doar daca are cheltuieli si nu sunt deja trimise
  if (!esteTrimis && cheltuieliCurente.length > 0) {
    btnTrimite.style.display = '';
  } else {
    btnTrimite.style.display = 'none';
  }
}

async function adaugaCheltuiala() {
  const data = document.getElementById('f-data').value;
  const suma = parseFloat(document.getElementById('f-suma').value) || 0;
  const beneficiar = document.getElementById('f-beneficiar').value.trim().toUpperCase();
  const obs = document.getElementById('f-obs').value.trim();
  const tipOp = document.getElementById('f-tip').value;
  const esteIncasare = tipOp === 'incasare';

  if (!data) { showToast('Selectează data'); return; }
  if (!suma || suma <= 0) { showToast('Introdu suma'); return; }
  if (!beneficiar) { showToast('Completează beneficiarul'); return; }

  try {
    const resp = await fetch(`${API}/deconturi`, {
      method: 'POST',
      headers: { ...HEADERS, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({
        utilizator: currentUser.nume,
        data, beneficiar,
        suma: esteIncasare ? -Math.round(suma * 100) / 100 : Math.round(suma * 100) / 100,
        observatii: obs, status: 'nou'
      })
    });
    if (resp.ok) {
      showToast('Cheltuială adăugată!');
      document.getElementById('f-suma').value = '';
      document.getElementById('f-beneficiar').value = '';
      document.getElementById('f-obs').value = '';
      await incarcaDate();
    }
  } catch (e) { showToast('Eroare'); }
}

async function editCheltuiala(id) {
  const item = cheltuieliCurente.find(d => d.id === id);
  if (!item) return;
  // Pre-completeaza formularul cu datele existente
  document.getElementById('f-data').value = item.data;
  document.getElementById('f-tip').value = parseFloat(item.suma) < 0 ? 'incasare' : 'cheltuiala';
  document.getElementById('f-suma').value = Math.abs(parseFloat(item.suma));
  document.getElementById('f-beneficiar').value = item.beneficiar;
  document.getElementById('f-obs').value = item.observatii || '';
  // Stergem randul vechi
  await fetch(`${API}/deconturi?id=eq.${id}`, { method: 'DELETE', headers: HEADERS });
  await incarcaDate();
  showToast('Editează și salvează din nou');
  document.getElementById('f-beneficiar').focus();
}

async function stergeCheltuiala(id) {
  if (!confirm('Sigur vrei să ștergi?')) return;
  try {
    await fetch(`${API}/deconturi?id=eq.${id}`, { method: 'DELETE', headers: HEADERS });
    await incarcaDate();
  } catch (e) { showToast('Eroare'); }
}

async function trimiteDecont() {
  if (!confirm('Trimiți decontul pentru verificare?\n\nNu vei mai putea modifica cheltuielile până la confirmare.')) return;
  try {
    // Marcheaza toate cheltuielile curente ca "trimis"
    for (const d of cheltuieliCurente) {
      if (d.status === 'nou') {
        await fetch(`${API}/deconturi?id=eq.${d.id}`, {
          method: 'PATCH',
          headers: { ...HEADERS, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
          body: JSON.stringify({ status: 'trimis' })
        });
      }
    }

    // Scrie cheltuielile in caiet ca PENDING (nu afecteaza soldul)
    for (const d of cheltuieliCurente) {
      const sumaVal = parseFloat(d.suma);
      await fetch(`${API}/caiet`, {
        method: 'POST',
        headers: { ...HEADERS, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
        body: JSON.stringify({
          data: d.data,
          tip: 'DECONT ' + currentUser.nume + ' (PENDING)',
          beneficiar: d.beneficiar,
          intrare: sumaVal < 0 ? Math.abs(sumaVal) : 0,
          iesire: sumaVal >= 0 ? sumaVal : 0,
          observatii: d.observatii || '',
          utilizator: currentUser.nume,
          completat_la: new Date().toISOString()
        })
      });
    }

    showToast('Decont trimis pentru verificare!');
    await incarcaDate();
    // Scroll sus
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } catch (e) { showToast('Eroare: ' + e.message); }
}

async function acceptaRetur() {
  try {
    // Marcheaza returnatele ca nou (le pune inapoi in draft)
    await fetch(`${API}/deconturi?utilizator=eq.${encodeURIComponent(currentUser.nume)}&returnat=eq.true&confirmat=eq.false`, {
      method: 'PATCH',
      headers: { ...HEADERS, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ returnat: false, status: 'nou' })
    });
    await incarcaDate();
  } catch (e) { showToast('Eroare'); }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function escHtml(str) {
  return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
</script>
