<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Decont — ARAFURA</title>
  <script src="config.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #1a73e8; --green: #1e8449; --red: #c0392b;
      --orange: #e67e22; --bg: #f4f6f9; --card: #ffffff;
      --text: #1a1a2e; --sub: #6b7280; --border: #e5e7eb; --radius: 14px;
    }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; }
    .header {
      background: var(--orange); color: white; padding: 14px 20px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,.2); position: sticky; top: 0; z-index: 100;
    }
    .header h1 { font-size: 20px; font-weight: 800; }
    .header-user { font-size: 14px; opacity: .8; }
    .header button {
      padding: 8px 16px; font-size: 14px; font-weight: 600;
      border: none; border-radius: 8px; cursor: pointer;
      background: rgba(255,255,255,.2); color: white;
    }
    .login-screen {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 60px 24px; gap: 20px;
    }
    .login-screen .icon { font-size: 64px; }
    .login-screen h2 { font-size: 24px; font-weight: 700; }
    .login-screen input {
      width: 200px; padding: 18px; font-size: 32px; text-align: center;
      letter-spacing: 12px; border: 2px solid var(--border); border-radius: var(--radius);
    }
    .login-screen input:focus { border-color: var(--orange); outline: none; }
    .main { max-width: 600px; margin: 20px auto; padding: 0 16px; }
    .fond-bar {
      background: var(--card); border-radius: var(--radius); padding: 16px 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06); margin-bottom: 16px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .fond-label { font-size: 14px; color: var(--sub); }
    .fond-value { font-size: 28px; font-weight: 800; }
    .fond-green { color: var(--green); }
    .fond-red { color: var(--red); }
    .form-card {
      background: var(--card); border-radius: var(--radius); padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06); margin-bottom: 16px;
    }
    .form-card h3 { font-size: 16px; margin-bottom: 14px; color: var(--orange); }
    .form-row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
    .form-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 140px; }
    .form-group label { font-size: 12px; font-weight: 600; color: var(--sub); }
    .form-group input, .form-group select {
      padding: 12px; font-size: 15px; border: 1px solid var(--border); border-radius: 8px;
    }
    .form-group input:focus, .form-group select:focus { border-color: var(--orange); outline: none; }
    .btn-submit {
      width: 100%; padding: 16px; font-size: 18px; font-weight: 700;
      background: var(--orange); color: white; border: none;
      border-radius: var(--radius); cursor: pointer; margin-top: 10px;
    }
    .btn-submit:active { background: #d35400; }
    .btn-trimite-decont {
      width: 100%; padding: 16px; font-size: 18px; font-weight: 700;
      background: var(--blue); color: white; border: none;
      border-radius: var(--radius); cursor: pointer; margin-top: 6px;
    }
    table {
      width: 100%; border-collapse: separate; border-spacing: 0;
      background: var(--card); border-radius: 12px; overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,.08); font-size: 13px; margin-bottom: 16px;
    }
    th {
      background: #2c3e50; color: white; padding: 12px 10px;
      text-align: left; font-size: 12px; text-transform: uppercase;
    }
    td { padding: 10px; border-bottom: 1px solid #f0f0f0; }
    tr:nth-child(even) td { background: #fafbfc; }
    tr:last-child td { border-bottom: none; }
    .total-row td { background: #e8f0fe !important; font-weight: 700; border-top: 2px solid var(--blue); }
    .num { text-align: right; font-variant-numeric: tabular-nums; }
    .btn-del { background: none; border: none; color: #ccc; cursor: pointer; font-size: 14px; }
    .btn-del:hover { color: var(--red); }
    .retur-banner {
      background: #fee2e2; border: 2px solid var(--red); border-radius: var(--radius);
      padding: 16px; margin-bottom: 16px; text-align: center;
    }
    .retur-banner .retur-icon { font-size: 36px; }
    .retur-banner .retur-text { font-size: 16px; font-weight: 700; color: var(--red); margin-top: 8px; }
    .retur-banner .retur-motiv { font-size: 14px; color: #666; margin-top: 6px; }
    .status-badge {
      display: inline-block; padding: 4px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 700;
    }
    .status-trimis { background: #dbeafe; color: #1e40af; }
    .status-confirmat { background: #d1fae5; color: #065f46; }
    .status-returnat { background: #fee2e2; color: #991b1b; }
    .toast {
      position: fixed; bottom: 30px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1a2e; color: white;
      padding: 12px 22px; border-radius: 24px;
      font-size: 15px; z-index: 200; transition: transform .3s ease;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .suggestions {
      position: absolute; background: white; border: 1px solid var(--border);
      border-radius: 8px; max-height: 240px; overflow-y: auto;
      box-shadow: 0 4px 12px rgba(0,0,0,.1); z-index: 50; width: 100%; top: 100%;
    }
    .suggestions div { padding: 10px 12px; cursor: pointer; font-size: 14px; }
    .suggestions div:hover { background: #f4f6f9; }
    .cat-chip { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 700; color: white; margin-left: 6px; }
    .cat-MAGAZIN   { background: #1a56a8; }
    .cat-FURNIZOR  { background: #c2410c; }
    .cat-VEHICUL   { background: #6d28d9; }
    .cat-PERSOANA  { background: #047857; }
    .cat-SPATIU    { background: #7c3aed; }
    .cat-UTILITATE { background: #0f766e; }
    .cat-ALTUL     { background: #6b7280; }
  </style>
</head>
<body>

<div class="header">
  <div>
    <h1>ARAFURA — Decont</h1>
    <span class="header-user" id="header-user"></span>
  </div>
  <button onclick="logout()" id="btn-logout" style="display:none">Ieși</button>
</div>
<div class="toast" id="toast"></div>

<div id="screen-login" class="login-screen">
  <div class="icon">🧾</div>
  <h2>Decont cheltuieli</h2>
  <p style="color:var(--sub);">Introdu PIN-ul tău</p>
  <input type="password" inputmode="numeric" maxlength="4" placeholder="****"
    id="login-pin" oninput="onLoginPin()" autocomplete="off" autofocus>
</div>

<div id="screen-main" style="display:none;">
  <div class="main">
    <div class="fond-bar">
      <div>
        <div class="fond-label">Fond disponibil</div>
        <div class="fond-value fond-green" id="fond-disponibil">—</div>
      </div>
      <div style="text-align:right;">
        <div class="fond-label">Cheltuit</div>
        <div class="fond-value fond-red" id="fond-cheltuit">—</div>
      </div>
    </div>

    <div id="retur-zone"></div>

    <div id="form-zone">
      <div class="form-card">
        <h3>Operațiune nouă</h3>
        <div class="form-row">
          <div class="form-group" style="max-width:160px;">
            <label>Data</label>
            <input type="date" id="f-data">
          </div>
          <div class="form-group">
            <label>Tip operațiune</label>
            <select id="f-tip" onchange="onTipChange()" style="padding:12px; font-size:15px; border:1px solid var(--border); border-radius:8px;">
              <option value="">— Alege tipul —</option>
              <optgroup label="↓ Cheltuieli">
                <option value="COMBUSTIBIL">COMBUSTIBIL</option>
                <option value="MATERIALE">MATERIALE</option>
                <option value="TRANSPORT">TRANSPORT</option>
                <option value="SERVICII">SERVICII</option>
                <option value="REPARATII">REPARATII</option>
                <option value="PROTOCOL">PROTOCOL</option>
                <option value="UTILITATI">UTILITATI</option>
                <option value="TAXE">TAXE</option>
                <option value="ASIGURARI">ASIGURARI</option>
                <option value="ALTE PLATI">ALTE PLATI</option>
              </optgroup>
              <optgroup label="↑ Încasare (rar)">
                <option value="ALTE INCASARI">ALTE INCASARI</option>
              </optgroup>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Beneficiar</label>
            <div style="position:relative;">
              <input type="text" id="f-beneficiar" placeholder="Caută beneficiar (2-3 litere)" autocomplete="off"
                oninput="showSuggestions(this.value); checkBeneficiarValid();" onfocus="showSuggestions(this.value)">
              <div class="suggestions" id="sug-beneficiar" style="display:none;"></div>
            </div>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label id="f-suma-label">Sumă (RON)</label>
            <input type="number" step="0.01" id="f-suma" placeholder="Completează întâi tipul și beneficiarul"
              disabled style="opacity:0.4; background:#f1f5f9;">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Observații (ex: furnizor, detalii)</label>
            <input type="text" id="f-obs" placeholder="opțional — ex: Petrom, Brico Depot">
          </div>
        </div>
        <button class="btn-submit" onclick="adaugaCheltuiala()">Adaugă cheltuială</button>
      </div>
    </div>

    <h3 style="font-size:16px; margin-bottom:12px;">Cheltuielile curente</h3>
    <div id="tabel-cheltuieli"></div>
    <button class="btn-trimite-decont" id="btn-trimite" style="display:none;" onclick="trimiteDecont()">
      📤 Trimite decontul pentru verificare
    </button>

    <div id="istoric-deconturi" style="margin-top:30px;"></div>
  </div>
</div>

<script>
const HEADERS = { 'apikey': window.SUPABASE_KEY, 'Authorization': `Bearer ${window.SUPABASE_KEY}` };
const API = window.SUPABASE_URL + '/rest/v1';
let currentUser = null;
let fondTotal = 0;
let cheltuieliCurente = [];

// ── Sesiune persistentă 7 zile (nu cere PIN la refresh) ──────────
const SESSION_KEY = 'decont_session';
const SESSION_DURATION_MS = 7 * 24 * 60 * 60 * 1000;
function saveSession(user) {
  try { localStorage.setItem(SESSION_KEY, JSON.stringify({ user, expires: Date.now() + SESSION_DURATION_MS })); } catch {}
}
function loadSession() {
  try {
    const raw = localStorage.getItem(SESSION_KEY);
    if (!raw) return null;
    const { user, expires } = JSON.parse(raw);
    if (!user || !expires || Date.now() > expires) { localStorage.removeItem(SESSION_KEY); return null; }
    return user;
  } catch { return null; }
}
function clearSession() { try { localStorage.removeItem(SESSION_KEY); } catch {} }

// Beneficiari permiși pentru Nicu (categorii filtrate)
const CATEGORII_PERMISE = ['VEHICUL','MAGAZIN','PERSOANA','SPATIU','FURNIZOR','UTILITATE','ALTUL'];
let beneficiariCunoscuti = [];
let beneficiariCategorii = {};

// Tipuri cu direcție (pentru convertire în caiet)
const TIPURI_IESIRE = ['COMBUSTIBIL','MATERIALE','TRANSPORT','SERVICII','REPARATII','PROTOCOL','UTILITATI','TAXE','ASIGURARI','ALTE PLATI'];
const TIPURI_INTRARE = ['ALTE INCASARI'];

async function incarcaBeneficiari() {
  try {
    const cats = CATEGORII_PERMISE.map(c => `"${c}"`).join(',');
    const resp = await fetch(`${API}/beneficiari?select=nume,categorie&activ=eq.true&categorie=in.(${cats})&order=nume.asc`, { headers: HEADERS });
    const data = await resp.json();
    if (!Array.isArray(data)) return;
    beneficiariCunoscuti = data.map(b => b.nume);
    beneficiariCategorii = {};
    for (const b of data) beneficiariCategorii[b.nume] = b.categorie;
  } catch (e) {}
}

function showSuggestions(value) {
  const container = document.getElementById('sug-beneficiar');
  const val = (value || '').trim().toUpperCase();
  if (!val || val.length < 1) { container.style.display = 'none'; return; }

  const matches = beneficiariCunoscuti.filter(item => item.includes(val)).slice(0, 10);
  if (matches.length === 0) {
    container.innerHTML = `<div style="padding:12px; color:#c0392b; font-size:13px;">Beneficiarul "${val}" nu există în listă. Roagă EUGEN să-l adauge.</div>`;
    container.style.display = '';
    return;
  }
  container.innerHTML = matches.map(m => {
    const cat = beneficiariCategorii[m] || 'ALTUL';
    return `<div onclick="selectBeneficiar('${m.replace(/'/g, "\\'")}')">${m} <span class="cat-chip cat-${cat}">${cat}</span></div>`;
  }).join('');
  container.style.display = '';
}

function selectBeneficiar(val) {
  document.getElementById('f-beneficiar').value = val;
  document.getElementById('sug-beneficiar').style.display = 'none';
  checkBeneficiarValid();
}

function onTipChange() { checkBeneficiarValid(); }

function checkBeneficiarValid() {
  const tip = document.getElementById('f-tip').value;
  const ben = (document.getElementById('f-beneficiar').value || '').trim().toUpperCase();
  const sumaEl = document.getElementById('f-suma');
  const sumaLabel = document.getElementById('f-suma-label');

  const tipValid = !!tip;
  const benValid = ben && beneficiariCunoscuti.includes(ben);
  const isIncasare = TIPURI_INTRARE.includes(tip);

  if (tipValid) {
    if (isIncasare) {
      sumaLabel.textContent = 'Sumă ÎNCASARE (RON)';
      sumaLabel.style.color = 'var(--green)';
      sumaEl.style.borderColor = 'var(--green)';
    } else {
      sumaLabel.textContent = 'Sumă CHELTUIALĂ (RON)';
      sumaLabel.style.color = 'var(--red)';
      sumaEl.style.borderColor = 'var(--red)';
    }
  } else {
    sumaLabel.textContent = 'Sumă (RON)';
    sumaLabel.style.color = '';
    sumaEl.style.borderColor = '';
  }

  if (tipValid && benValid) {
    sumaEl.disabled = false;
    sumaEl.style.opacity = '';
    sumaEl.style.background = '';
    sumaEl.placeholder = '0.00';
    sumaEl.focus();
  } else {
    sumaEl.disabled = true;
    sumaEl.style.opacity = '0.4';
    sumaEl.style.background = '#f1f5f9';
    if (!tipValid) sumaEl.placeholder = 'Alege TIP întâi';
    else if (!benValid) sumaEl.placeholder = 'Completează beneficiarul din listă';
    sumaEl.value = '';
  }
}

// Hide suggestions on outside click
document.addEventListener('click', (e) => {
  if (!e.target.closest('.form-group')) {
    document.querySelectorAll('.suggestions').forEach(s => s.style.display = 'none');
  }
});

async function onLoginPin() {
  const pin = document.getElementById('login-pin').value;
  if (pin.length < 4) return;
  try {
    const resp = await fetch(`${API}/caiet_utilizatori?pin=eq.${pin}&activ=eq.true&select=id,nume`, { headers: HEADERS });
    const data = await resp.json();
    if (!Array.isArray(data) || data.length === 0) {
      showToast('PIN incorect');
      document.getElementById('login-pin').value = '';
      return;
    }
    saveSession(data[0]);
    await completeLogin(data[0]);
  } catch (e) {
    showToast('Eroare conexiune');
  }
}

async function completeLogin(user) {
  currentUser = user;
  const esteNicu = user.nume === 'NICU';
  const esteEugen = user.nume === 'EUGEN';
  const esteViewOnly = ['LIVIA','ELA'].includes(user.nume);
  const esteAdmin = esteEugen || esteViewOnly;

  let label = '';
  if (esteEugen) label = ' (admin — edit/delete pentru NICU)';
  else if (esteViewOnly) label = ' (vizualizare doar)';
  document.getElementById('header-user').textContent = currentUser.nume + label;

  document.getElementById('btn-logout').style.display = '';
  document.getElementById('screen-login').style.display = 'none';
  document.getElementById('screen-main').style.display = '';
  document.getElementById('login-pin').value = '';
  document.getElementById('f-data').value = new Date().toISOString().slice(0, 10);

  // Form-zone:
  // - NICU: vizibil (face propriul decont)
  // - EUGEN: vizibil (editează pe contul lui NICU)
  // - LIVIA/ELA: ASCUNS (doar vizualizare)
  const formZone = document.getElementById('form-zone');
  formZone.style.display = esteViewOnly ? 'none' : '';

  // Banner informativ DOAR pentru EUGEN (LIVIA/ELA/NICU nu-l văd)
  let banner = document.getElementById('admin-banner');
  if (esteEugen) {
    if (!banner) {
      banner = document.createElement('div');
      banner.id = 'admin-banner';
      banner.style.cssText = 'background:#dbeafe; border-left:3px solid var(--blue); padding:12px 16px; border-radius:8px; margin-bottom:14px; color:#1e3a8a; font-size:14px;';
      document.getElementById('screen-main').insertBefore(banner, document.getElementById('screen-main').firstChild);
    }
    banner.innerHTML = '<b>Mod admin — vezi deconturile lui NICU.</b> Poți edita (✎), șterge (✕) și șterge decontul întreg din istoric.';
  } else if (banner) {
    banner.remove();
  }

  await incarcaBeneficiari();
  await incarcaDate();
}

function logout() {
  clearSession();
  currentUser = null;
  document.getElementById('screen-login').style.display = '';
  document.getElementById('screen-main').style.display = 'none';
  document.getElementById('btn-logout').style.display = 'none';
  setTimeout(() => document.getElementById('login-pin').focus(), 50);
}

// ── Auto-login dupa refresh + focus pe PIN daca nu e logat ────────
(function init() {
  const saved = loadSession();
  if (saved) {
    completeLogin(saved);
  } else {
    // focus pe PIN input
    setTimeout(() => {
      const el = document.getElementById('login-pin');
      if (el) el.focus();
    }, 100);
  }
})();

async function incarcaDate() {
  try {
    // Pentru admin (EUGEN/LIVIA/ELA) afișăm datele lui NICU; altfel datele utilizatorului curent
    const esteAdmin = ['EUGEN','LIVIA','ELA'].includes(currentUser.nume);
    const userCaut = esteAdmin ? 'NICU' : currentUser.nume;

    // Fetch fond
    const respFond = await fetch(`${API}/fonduri?utilizator=eq.${encodeURIComponent(userCaut)}&select=suma`, { headers: HEADERS });
    const fondData = await respFond.json();
    fondTotal = (Array.isArray(fondData) && fondData.length > 0) ? parseFloat(fondData[0].suma || 0) : 0;

    // Fetch cheltuieli curente (status=nou, netrimise sau trimise dar neconfirmate)
    const resp = await fetch(
      `${API}/deconturi?select=*&utilizator=eq.${encodeURIComponent(userCaut)}&status=in.(nou,trimis)&confirmat=not.eq.true&returnat=not.eq.true&order=data.desc,created_at.desc`,
      { headers: HEADERS }
    );
    cheltuieliCurente = await resp.json();
    if (!Array.isArray(cheltuieliCurente)) cheltuieliCurente = [];

    // Check for returned deconts
    const respRetur = await fetch(
      `${API}/deconturi?select=*&utilizator=eq.${encodeURIComponent(userCaut)}&returnat=eq.true&confirmat=not.eq.true&order=created_at.desc&limit=10`,
      { headers: HEADERS }
    );
    const returnate = await respRetur.json();

    // Calcule
    let totalCheltuit = 0, totalIncasat = 0;
    for (const d of cheltuieliCurente) {
      const s = parseFloat(d.suma || 0);
      if (s >= 0) totalCheltuit += s;
      else totalIncasat += Math.abs(s);
    }

    const disponibil = fondTotal - totalCheltuit + totalIncasat;
    const fondEl = document.getElementById('fond-disponibil');
    fondEl.textContent = disponibil.toLocaleString('ro-RO', { minimumFractionDigits: 2 }) + ' RON';
    fondEl.className = disponibil >= 0 ? 'fond-value fond-green' : 'fond-value fond-red';
    document.getElementById('fond-cheltuit').textContent = totalCheltuit.toLocaleString('ro-RO', { minimumFractionDigits: 2 }) + ' RON';

    // Check if decont was returned
    const returZone = document.getElementById('retur-zone');
    if (Array.isArray(returnate) && returnate.length > 0) {
      const motiv = returnate[0].motiv_retur || 'Verifică și retrimite';
      returZone.innerHTML = `<div class="retur-banner">
        <div class="retur-icon">🔄</div>
        <div class="retur-text">Decontul a fost returnat!</div>
        <div class="retur-motiv">${escHtml(motiv)}</div>
        <button onclick="acceptaRetur()" style="margin-top:12px; padding:10px 24px; background:var(--blue); color:white; border:none; border-radius:8px; font-weight:700; cursor:pointer;">Am înțeles, refac decontul</button>
      </div>`;
    } else {
      returZone.innerHTML = '';
    }

    // Formularul rămâne VIZIBIL mereu — Nicu poate adăuga operațiuni noi
    // pentru următorul decont, chiar dacă unele sunt deja trimise
    document.getElementById('form-zone').style.display = '';

    // Render tabel
    renderTabel(totalCheltuit, false);

    // Istoric ultimele 5 deconturi confirmate
    await incarcaIstoric();

  } catch (e) {
    showToast('Eroare la încărcare');
  }
}

async function incarcaIstoric() {
  const container = document.getElementById('istoric-deconturi');
  try {
    const esteAdmin = ['EUGEN','LIVIA','ELA'].includes(currentUser.nume);
    const userCaut = esteAdmin ? 'NICU' : currentUser.nume;
    const resp = await fetch(
      `${API}/deconturi?select=*&utilizator=eq.${encodeURIComponent(userCaut)}&status=eq.confirmat&order=created_at.desc&limit=50`,
      { headers: HEADERS }
    );
    const data = await resp.json();
    if (!Array.isArray(data) || data.length === 0) {
      container.innerHTML = '';
      return;
    }

    // Grupeaza pe data confirmarii (aproximativ pe deconturi)
    const deconturi = [];
    let currentGroup = null;
    for (const d of data) {
      if (!currentGroup || Math.abs(new Date(d.created_at) - new Date(currentGroup.items[0].created_at)) > 60000) {
        if (deconturi.length >= 5) break;
        currentGroup = { items: [d], total: 0 };
        deconturi.push(currentGroup);
      } else {
        currentGroup.items.push(d);
      }
      const s = parseFloat(d.suma || 0);
      if (s >= 0) currentGroup.total += s;
    }

    if (deconturi.length === 0) { container.innerHTML = ''; return; }

    const esteEugen = currentUser && currentUser.nume === 'EUGEN';
    let html = '<h3 style="font-size:16px; margin-bottom:12px; color:var(--sub);">Ultimele deconturi</h3>';

    for (let i = 0; i < deconturi.length; i++) {
      const dec = deconturi[i];
      const dt = new Date(dec.items[0].created_at).toLocaleDateString('ro-RO', {day:'2-digit', month:'2-digit', year:'numeric'});
      const ids = dec.items.map(d => d.id).join(',');
      const btnDel = esteEugen
        ? `<button onclick="event.preventDefault(); event.stopPropagation(); stergeIstoricDecont('${ids}', '${dt}')" style="background:var(--red); color:white; border:none; border-radius:6px; padding:4px 10px; font-size:11px; font-weight:700; cursor:pointer; margin-left:10px;" title="Șterge acest decont din istoric (doar EUGEN)">🗑 Șterge</button>`
        : '';
      html += `<details style="margin-bottom:10px; background:var(--card); border-radius:12px; box-shadow:0 1px 4px rgba(0,0,0,.06); overflow:hidden;">
        <summary style="padding:14px 16px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; font-weight:600;">
          <span>Decont ${dt} — ${dec.items.length} cheltuieli</span>
          <span style="display:flex; align-items:center;">
            <span style="color:var(--green); font-weight:700;">${dec.total.toLocaleString('ro-RO', {minimumFractionDigits:2})} RON — CONFIRMAT</span>
            ${btnDel}
          </span>
        </summary>
        <table style="box-shadow:none; border-radius:0;">
          <thead><tr><th>Data</th><th>Beneficiar</th><th class="num">Suma</th><th>Obs</th></tr></thead>
          <tbody>`;
      for (const d of dec.items) {
        const dtItem = new Date(d.data).toLocaleDateString('ro-RO', {day:'2-digit', month:'2-digit'});
        const s = parseFloat(d.suma);
        html += `<tr>
          <td>${dtItem}</td><td>${escHtml(d.beneficiar)}</td>
          <td class="num" style="color:${s<0?'var(--green)':'var(--red)'}; font-weight:700;">${Math.abs(s).toLocaleString('ro-RO',{minimumFractionDigits:2})}</td>
          <td style="font-size:12px; color:#888;">${escHtml(d.observatii||'')}</td>
        </tr>`;
      }
      html += '</tbody></table></details>';
    }

    container.innerHTML = html;
  } catch(e) {
    container.innerHTML = '';
  }
}

function renderTabel(totalCheltuit, esteTrimis) {
  const container = document.getElementById('tabel-cheltuieli');
  const btnTrimite = document.getElementById('btn-trimite');

  if (cheltuieliCurente.length === 0) {
    container.innerHTML = '<div style="text-align:center; padding:30px; color:var(--sub);">Nicio cheltuială încă</div>';
    btnTrimite.style.display = 'none';
    return;
  }

  let html = `<table><thead><tr>
    <th>Data</th><th>Beneficiar</th><th class="num">Suma</th><th>Obs</th><th>Status</th><th></th>
  </tr></thead><tbody>`;

  const esteNicu = currentUser && currentUser.nume === 'NICU';
  const esteEugen = currentUser && currentUser.nume === 'EUGEN';
  for (const d of cheltuieliCurente) {
    const dt = new Date(d.data).toLocaleDateString('ro-RO', { day: '2-digit', month: '2-digit', year: 'numeric' });
    const sumaVal = parseFloat(d.suma);
    const esteInc = sumaVal < 0;
    const esteTrimisRow = d.status === 'trimis';
    const statusBadge = esteTrimisRow
      ? '<span class="status-badge status-trimis">TRIMIS</span>'
      : '<span class="status-badge" style="background:#fef3c7; color:#92400e;">DRAFT</span>';
    // NICU poate edita; EUGEN edit+delete; restul doar văd. TRIMIS nu se mai modifică.
    const poateEdita = (esteNicu || esteEugen) && !esteTrimisRow;
    const poateSterge = esteEugen && !esteTrimisRow;

    let actiuni = '';
    if (poateEdita) actiuni += `<button class="btn-del" onclick="editCheltuiala(${d.id})" title="Editează" style="color:#1a73e8;">✎</button>`;
    if (poateSterge) actiuni += `<button class="btn-del" onclick="stergeCheltuiala(${d.id})" title="Șterge">✕</button>`;

    html += `<tr style="${esteTrimisRow ? 'opacity:0.7;' : ''}">
      <td style="white-space:nowrap;">${dt}</td>
      <td style="font-weight:600;">${escHtml(d.beneficiar)}</td>
      <td class="num" style="font-weight:700; color:${esteInc ? 'var(--green)' : 'var(--red)'};">
        ${esteInc ? '+' : '-'}${Math.abs(sumaVal).toLocaleString('ro-RO', { minimumFractionDigits: 2 })}
      </td>
      <td style="color:#888; font-size:12px;">${escHtml(d.observatii || '')}</td>
      <td>${statusBadge}</td>
      <td style="white-space:nowrap;">${actiuni}</td>
    </tr>`;
  }

  html += `<tr class="total-row">
    <td colspan="2">TOTAL CHELTUIT</td>
    <td class="num" style="color:var(--red);">${totalCheltuit.toLocaleString('ro-RO', { minimumFractionDigits: 2 })}</td>
    <td colspan="3"></td>
  </tr>`;
  html += '</tbody></table>';
  container.innerHTML = html;

  // Buton trimite - doar NICU, doar dacă există operațiuni DRAFT
  const areDraft = cheltuieliCurente.some(d => d.status === 'nou');
  const poateTrimite = esteNicu && areDraft;
  btnTrimite.style.display = poateTrimite ? '' : 'none';
  if (poateTrimite) {
    const nrDraft = cheltuieliCurente.filter(d => d.status === 'nou').length;
    btnTrimite.textContent = `Trimite decont (${nrDraft} operațiuni draft)`;
  }
}

async function adaugaCheltuiala() {
  const data = document.getElementById('f-data').value;
  const suma = parseFloat(document.getElementById('f-suma').value) || 0;
  const beneficiar = document.getElementById('f-beneficiar').value.trim().toUpperCase();
  const obs = document.getElementById('f-obs').value.trim();
  const tipOp = document.getElementById('f-tip').value;
  const esteIncasare = TIPURI_INTRARE.includes(tipOp);

  if (!data) { showToast('Selectează data'); return; }
  if (!tipOp) { showToast('Alege tipul operațiunii'); return; }
  if (!beneficiar) { showToast('Completează beneficiarul'); return; }
  if (!beneficiariCunoscuti.includes(beneficiar)) {
    showToast(`Beneficiar necunoscut: "${beneficiar}". Roagă EUGEN să-l adauge.`);
    return;
  }
  if (!suma || suma <= 0) { showToast('Introdu suma'); return; }

  // Dacă admin (EUGEN) editează, salvează tot pe contul lui NICU
  const targetUser = ['EUGEN','LIVIA','ELA'].includes(currentUser.nume) ? 'NICU' : currentUser.nume;

  try {
    const resp = await fetch(`${API}/deconturi`, {
      method: 'POST',
      headers: { ...HEADERS, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({
        utilizator: targetUser,
        data, beneficiar,
        suma: esteIncasare ? -Math.round(suma * 100) / 100 : Math.round(suma * 100) / 100,
        observatii: obs,
        status: 'nou',
        tip_subcategorie: tipOp
      })
    });
    if (resp.ok) {
      showToast('Cheltuială adăugată!');
      document.getElementById('f-tip').value = '';
      document.getElementById('f-suma').value = '';
      document.getElementById('f-beneficiar').value = '';
      document.getElementById('f-obs').value = '';
      checkBeneficiarValid();
      await incarcaDate();
    } else {
      const txt = await resp.text();
      showToast('Eroare: ' + txt);
    }
  } catch (e) { showToast('Eroare'); }
}

async function editCheltuiala(id) {
  const item = cheltuieliCurente.find(d => d.id === id);
  if (!item) return;
  // Pre-completeaza formularul cu datele existente
  document.getElementById('f-data').value = item.data;
  document.getElementById('f-tip').value = item.tip_subcategorie || '';
  document.getElementById('f-beneficiar').value = item.beneficiar;
  document.getElementById('f-obs').value = item.observatii || '';
  // Stergem randul vechi (suma se recompletează)
  await fetch(`${API}/deconturi?id=eq.${id}`, { method: 'DELETE', headers: HEADERS });
  await incarcaDate();
  checkBeneficiarValid();
  // Re-populează suma dupa checkBeneficiarValid (care o resetează)
  setTimeout(() => { document.getElementById('f-suma').value = Math.abs(parseFloat(item.suma)); }, 100);
  showToast('Editează și salvează din nou');
}

async function stergeCheltuiala(id) {
  if (!confirm('Sigur vrei să ștergi?')) return;
  try {
    await fetch(`${API}/deconturi?id=eq.${id}`, { method: 'DELETE', headers: HEADERS });
    await incarcaDate();
  } catch (e) { showToast('Eroare'); }
}

async function trimiteDecont() {
  const drafturi = cheltuieliCurente.filter(d => d.status === 'nou');
  if (drafturi.length === 0) { showToast('Nicio cheltuială draft de trimis'); return; }
  if (!confirm(`Trimiți ${drafturi.length} operațiuni pentru verificare?\n\nNu vei mai putea modifica aceste operațiuni până la confirmare. Poți adăuga în continuare noi operațiuni.`)) return;
  try {
    // Marcheaza DOAR draft-urile ca "trimis"
    for (const d of drafturi) {
      await fetch(`${API}/deconturi?id=eq.${d.id}`, {
        method: 'PATCH',
        headers: { ...HEADERS, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
        body: JSON.stringify({ status: 'trimis' })
      });
    }

    // Scrie DOAR draft-urile in caiet ca PENDING (nu afecteaza soldul)
    for (const d of drafturi) {
      const sumaVal = parseFloat(d.suma);
      const subtip = d.tip_subcategorie || 'ALTE PLATI';
      await fetch(`${API}/caiet`, {
        method: 'POST',
        headers: { ...HEADERS, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
        body: JSON.stringify({
          data: d.data,
          tip: `${subtip} (PENDING ${currentUser.nume})`,
          beneficiar: d.beneficiar,
          intrare: sumaVal < 0 ? Math.abs(sumaVal) : 0,
          iesire: sumaVal >= 0 ? sumaVal : 0,
          observatii: d.observatii || '',
          utilizator: currentUser.nume,
          completat_la: new Date().toISOString()
        })
      });
    }

    showToast('Decont trimis pentru verificare!');
    await incarcaDate();
    // Scroll sus
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } catch (e) { showToast('Eroare: ' + e.message); }
}

async function stergeIstoricDecont(idsStr, dtLabel) {
  if (!currentUser || currentUser.nume !== 'EUGEN') {
    showToast('Doar EUGEN poate șterge');
    return;
  }
  if (!confirm(`Șterge definitiv decontul din ${dtLabel}?\n\nSe vor șterge:\n- ${idsStr.split(',').length} operațiuni din deconturi\n- operațiunile corespondente din caiet\n\nAcțiunea este IREVERSIBILĂ.`)) return;

  try {
    const ids = idsStr.split(',').map(Number);
    // Găsește beneficiari + data + sume din deconturi ca să identifice rândurile corespondente din caiet
    const respDec = await fetch(`${API}/deconturi?id=in.(${ids.join(',')})&select=*`, { headers: HEADERS });
    const decItems = await respDec.json();

    // Șterge operațiunile corespondente din caiet
    // Caiet entries au: data, beneficiar, suma, utilizator=utilizatorul decontului
    for (const d of decItems) {
      const sumaVal = parseFloat(d.suma);
      const intrare = sumaVal < 0 ? Math.abs(sumaVal) : 0;
      const iesire = sumaVal >= 0 ? sumaVal : 0;
      // Match pe: data, beneficiar, intrare, iesire, utilizator
      const benEnc = encodeURIComponent(d.beneficiar);
      await fetch(`${API}/caiet?data=eq.${d.data}&beneficiar=eq.${benEnc}&intrare=eq.${intrare}&iesire=eq.${iesire}&utilizator=eq.${encodeURIComponent(d.utilizator)}`, {
        method: 'DELETE',
        headers: { ...HEADERS, 'Prefer': 'return=minimal' }
      });
    }

    // Șterge din deconturi
    await fetch(`${API}/deconturi?id=in.(${ids.join(',')})`, {
      method: 'DELETE',
      headers: { ...HEADERS, 'Prefer': 'return=minimal' }
    });

    showToast(`✓ Decont ${dtLabel} șters`);
    await incarcaDate();
  } catch (e) {
    showToast('Eroare: ' + e.message);
  }
}

async function acceptaRetur() {
  try {
    // Marcheaza returnatele ca nou (le pune inapoi in draft)
    await fetch(`${API}/deconturi?utilizator=eq.${encodeURIComponent(currentUser.nume)}&returnat=eq.true&confirmat=eq.false`, {
      method: 'PATCH',
      headers: { ...HEADERS, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ returnat: false, status: 'nou' })
    });
    await incarcaDate();
  } catch (e) { showToast('Eroare'); }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function escHtml(str) {
  return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
