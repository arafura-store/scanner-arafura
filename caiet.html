<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caiet — ARAFURA</title>
  <script src="config.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #1e293b;
      --navy-dark: #0f172a;
      --blue: #1e40af;
      --blue-light: #dbeafe;
      --green: #047857;
      --green-light: #d1fae5;
      --red: #b91c1c;
      --red-light: #fee2e2;
      --orange: #c2410c;
      --orange-light: #ffedd5;
      --purple: #6d28d9;
      --purple-light: #ede9fe;
      --teal: #0f766e;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --sub: #64748b;
      --border: #e2e8f0;
      --radius: 12px;
    }
    body {
      font-family: 'Segoe UI', -apple-system, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
    }
    .header {
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy-dark) 100%);
      color: white;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 12px rgba(15,23,42,.25);
      position: sticky;
      top: 0;
      z-index: 100;
      gap: 16px;
    }
    .header-left { display: flex; align-items: center; gap: 14px; min-width: 0; }
    .header h1 { font-size: 19px; font-weight: 700; letter-spacing: .3px; white-space: nowrap; }
    .header-user {
      font-size: 12px; opacity: .85; background: rgba(255,255,255,.08);
      padding: 4px 12px; border-radius: 14px; border: 1px solid rgba(255,255,255,.12);
      white-space: nowrap;
    }
    .header-sold {
      display: flex; flex-direction: column; align-items: center; gap: 1px;
      background: rgba(255,255,255,.08);
      padding: 6px 22px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,.15);
    }
    .header-sold .label {
      font-size: 10px; text-transform: uppercase; color: rgba(255,255,255,.7);
      letter-spacing: 1px; font-weight: 600;
    }
    .header-sold .value { font-size: 22px; font-weight: 800; color: white; line-height: 1.15; font-variant-numeric: tabular-nums; }
    .header-sold .value.neg { color: #fca5a5; }
    .header button {
      padding: 8px 16px; font-size: 13px; font-weight: 600;
      border: none; border-radius: 8px; cursor: pointer;
      background: rgba(255,255,255,.1); color: white;
      border: 1px solid rgba(255,255,255,.15); transition: background .15s;
    }
    .header button:hover { background: rgba(255,255,255,.2); }

    /* MAIN LAYOUT */
    .main-layout {
      max-width: 1400px; margin: 20px auto 0; padding: 0 16px;
      display: grid; grid-template-columns: minmax(0, 1fr) 360px; gap: 20px;
    }
    @media (max-width: 960px) {
      .main-layout { grid-template-columns: 1fr; }
    }
    .main-left, .main-right { display: flex; flex-direction: column; gap: 14px; min-width: 0; }
    .side-card {
      background: var(--card); border-radius: var(--radius); padding: 18px;
      box-shadow: 0 1px 3px rgba(15,23,42,.06), 0 0 0 1px rgba(15,23,42,.04);
    }
    .side-card h4 {
      font-size: 12px; text-transform: uppercase; letter-spacing: 1px;
      color: var(--sub); margin-bottom: 10px; font-weight: 700;
    }

    /* LOGIN */
    .login-screen {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 60px 24px; gap: 20px;
    }
    .login-screen .icon { font-size: 64px; }
    .login-screen h2 { font-size: 24px; font-weight: 700; }
    .login-screen input {
      width: 200px; padding: 18px; font-size: 32px; text-align: center;
      letter-spacing: 12px; border: 2px solid var(--border); border-radius: var(--radius);
    }
    .login-screen input:focus { border-color: var(--blue); outline: none; }

    /* FORM */
    .form-section {
      max-width: 700px; margin: 20px auto; padding: 0 16px;
    }
    .form-card {
      background: var(--card); border-radius: var(--radius); padding: 20px;
      box-shadow: 0 1px 3px rgba(15,23,42,.06), 0 0 0 1px rgba(15,23,42,.04);
      margin-bottom: 0;
    }
    .form-card h3 { font-size: 15px; margin-bottom: 14px; color: var(--navy); font-weight: 700; }
    .form-row {
      display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap;
    }
    .form-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 140px; }
    .form-group label { font-size: 12px; font-weight: 600; color: var(--sub); }
    .form-group input, .form-group select, .form-group textarea {
      padding: 12px; font-size: 15px; border: 1px solid var(--border);
      border-radius: 8px; background: white;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: var(--blue); outline: none;
    }
    .form-group textarea { resize: none; }
    .btn-submit {
      width: 100%; padding: 16px; font-size: 18px; font-weight: 700;
      background: var(--green); color: white; border: none;
      border-radius: var(--radius); cursor: pointer; margin-top: 10px;
    }
    .btn-submit:active { background: #166a3a; }

    /* Tabs */
    .tab-btn {
      background: #f1f5f9;
      color: var(--sub);
      transition: all .2s;
      border: 1px solid var(--border);
    }
    .tab-btn.tab-active {
      background: var(--navy);
      color: white;
      border-color: var(--navy);
      box-shadow: 0 2px 6px rgba(15,23,42,.2);
    }
    #tab-amanet.tab-active {
      background: var(--purple);
      border-color: var(--purple);
      box-shadow: 0 2px 6px rgba(109,40,217,.25);
    }
    #tab-incasare.tab-active {
      background: var(--green);
      border-color: var(--green);
      box-shadow: 0 2px 6px rgba(4,120,87,.25);
    }

    /* TABLE */
    .table-section {
      max-width: 1400px; margin: 20px auto 30px; padding: 0 16px;
    }
    .table-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px; flex-wrap: wrap; gap: 10px;
    }
    .table-header h3 { font-size: 16px; }
    .table-filters { display: flex; gap: 8px; flex-wrap: wrap; }
    .table-filters select, .table-filters input {
      padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px;
    }
    .search-panel {
      background: var(--card); border-radius: var(--radius); padding: 18px; margin-bottom: 14px;
      box-shadow: 0 1px 3px rgba(15,23,42,.06), 0 0 0 1px rgba(15,23,42,.04);
    }
    .search-panel h3 {
      font-size: 12px; margin-bottom: 14px; color: var(--sub);
      text-transform: uppercase; letter-spacing: 1px; font-weight: 700;
    }
    .search-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; align-items: center; }
    .search-row:last-child { margin-bottom: 0; }
    .search-row input[type=text], .search-row input[type=date], .search-row select {
      padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px;
      font-family: inherit; background: white; color: var(--text);
    }
    .search-row input[type=text]:focus, .search-row input[type=date]:focus, .search-row select:focus {
      outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-light);
    }
    .search-row input[type=text] { flex: 1; min-width: 220px; font-size: 14px; }
    .quick-dates { display: flex; gap: 6px; flex-wrap: wrap; }
    .qd-btn {
      padding: 7px 14px; border: 1px solid var(--border); background: white;
      border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; color: var(--sub);
      transition: all .15s;
    }
    .qd-btn:hover { background: var(--navy); color: white; border-color: var(--navy); }
    .qd-btn.active { background: var(--navy); color: white; border-color: var(--navy); }
    .search-summary {
      background: var(--card);
      border-left: 3px solid var(--navy);
      padding: 10px 20px; border-radius: var(--radius); margin-bottom: 12px;
      font-size: 13px; display: flex; flex-wrap: nowrap; gap: 28px; align-items: center;
      box-shadow: 0 1px 3px rgba(15,23,42,.06), 0 0 0 1px rgba(15,23,42,.04);
      overflow-x: auto; white-space: nowrap;
    }
    .search-summary .ss-item {
      display: inline-flex; align-items: baseline; gap: 8px; flex-shrink: 0;
    }
    .search-summary .ss-label { font-size: 10px; color: var(--sub); text-transform: uppercase; letter-spacing: .5px; font-weight: 700; }
    .search-summary .ss-value { font-size: 14px; font-weight: 800; color: var(--text); font-variant-numeric: tabular-nums; }
    .search-summary .ss-value.green { color: var(--green); }
    .search-summary .ss-value.red { color: var(--red); }
    .search-summary .ss-divider { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; }
    .clickable-ben { cursor: pointer; text-decoration: underline dotted; text-decoration-color: #cbd5e1; }
    .clickable-ben:hover { color: var(--blue); }
    table {
      width: 100%; border-collapse: separate; border-spacing: 0;
      background: var(--card);
      border-radius: var(--radius); overflow: hidden;
      box-shadow: 0 1px 3px rgba(15,23,42,.06), 0 0 0 1px rgba(15,23,42,.04);
      font-size: 13px;
    }
    th {
      background: var(--navy); color: white; padding: 12px;
      text-align: center; font-size: 11px; white-space: nowrap;
      letter-spacing: .5px; text-transform: uppercase; font-weight: 700;
    }
    th.th-left { text-align: left; }
    td {
      padding: 11px 12px;
      border-bottom: 1px solid #f1f5f9;
    }
    td.td-center { text-align: center; }
    tr:last-child td { border-bottom: none; }
    tr:nth-child(even) td { background: #fafbfc; }
    tr:hover td { background: #f1f5f9; }
    .num { text-align: right; font-variant-numeric: tabular-nums; }
    .bold { font-weight: 700; }
    .intrare {
      color: var(--green); font-weight: 700;
      background: var(--green-light); padding: 4px 10px; border-radius: 6px;
      display: inline-block; font-variant-numeric: tabular-nums;
    }
    .iesire {
      color: var(--red); font-weight: 700;
      background: var(--red-light); padding: 4px 10px; border-radius: 6px;
      display: inline-block; font-variant-numeric: tabular-nums;
    }
    .fond-display-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 3px solid var(--purple);
      border-radius: var(--radius);
      padding: 16px 18px;
      margin-bottom: 0;
      display: flex; flex-direction: column; gap: 10px;
      box-shadow: 0 1px 3px rgba(15,23,42,.06);
    }
    .fond-display-box .fond-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
    .fond-display-box .fond-info {
      font-size: 10px; font-weight: 700; color: var(--purple);
      text-transform: uppercase; letter-spacing: 1px;
    }
    .fond-display-box .fond-suma { font-size: 24px; font-weight: 800; color: var(--purple); font-variant-numeric: tabular-nums; }
    .fond-display-box .btn-edit-fond {
      padding: 7px 14px; background: var(--purple); color: white;
      border: none; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer;
    }
    .alerta-decont-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 3px solid var(--orange);
      border-radius: var(--radius);
      padding: 16px 18px;
      margin-bottom: 0;
      display: flex; flex-direction: column;
      gap: 12px;
      box-shadow: 0 1px 3px rgba(15,23,42,.06);
    }
    .alerta-decont-box .alerta-icon { font-size: 26px; }
    .alerta-decont-box .alerta-text { flex: 1; min-width: 0; }
    .alerta-decont-box .alerta-nume { font-size: 13px; font-weight: 700; color: var(--orange); text-transform: uppercase; letter-spacing: .5px; }
    .alerta-decont-box .alerta-suma { font-size: 22px; font-weight: 800; color: var(--red); font-variant-numeric: tabular-nums; }
    .alerta-decont-box .btn-deconteaza {
      padding: 10px 18px; font-size: 13px; font-weight: 700;
      background: var(--green); color: white; border: none;
      border-radius: 8px; cursor: pointer; width: 100%;
    }
    .alerta-decont-box .btn-deconteaza:hover { background: #036548; }

    .btn-edit, .btn-del {
      background: none; border: none; color: #ccc; cursor: pointer; font-size: 14px;
      padding: 4px;
    }
    .btn-edit:hover { color: var(--blue); }
    .btn-del:hover { color: var(--red); }
    .edit-row input, .edit-row select {
      padding: 6px 8px; border: 1px solid var(--blue); border-radius: 6px;
      font-size: 13px; width: 100%;
    }
    .edit-row .btn-save-edit {
      padding: 6px 14px; background: var(--green); color: white;
      border: none; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer;
    }
    .edit-row .btn-cancel-edit {
      padding: 6px 14px; background: var(--sub); color: white;
      border: none; border-radius: 6px; font-size: 12px; cursor: pointer;
    }
    .toast {
      position: fixed; bottom: 30px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1a2e; color: white;
      padding: 12px 22px; border-radius: 24px;
      font-size: 15px; z-index: 200;
      transition: transform .3s ease; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    .suggestions {
      position: absolute; background: white; border: 1px solid var(--border);
      border-radius: 8px; max-height: 200px; overflow-y: auto;
      box-shadow: 0 4px 12px rgba(0,0,0,.1); z-index: 50; width: 100%;
    }
    .suggestions div {
      padding: 10px 12px; cursor: pointer; font-size: 14px;
    }
    .suggestions div:hover { background: var(--bg); }

    @media print {
      .header, .main-layout, .search-panel, .btn-del { display: none; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>ARAFURA — Caiet</h1>
    <span class="header-user" id="header-user"></span>
  </div>
  <div class="header-sold" id="header-sold" style="display:none;">
    <span class="label">Sold curent</span>
    <span class="value" id="sold-curent">—</span>
  </div>
  <button onclick="logout()" id="btn-logout" style="display:none">Ieși</button>
</div>

<div class="toast" id="toast"></div>

<!-- LOGIN -->
<div id="screen-login" class="login-screen">
  <div class="icon">📒</div>
  <h2>Registru de casă</h2>
  <p style="color:var(--sub);">Introdu PIN-ul tău</p>
  <input type="password" inputmode="numeric" maxlength="4" placeholder="****"
    id="login-pin" oninput="onLoginPin()" autocomplete="off" autofocus>
</div>

<!-- MAIN -->
<div id="screen-main" style="display:none;">

  <div class="main-layout">
    <!-- LEFT: formulare -->
    <div class="main-left">
    <!-- TABS: Normală / AMANET-BANCĂ / ÎNCASĂRI -->
    <div class="form-tabs" style="display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap;">
      <button type="button" id="tab-normala" class="tab-btn tab-active" onclick="switchTab('normala')" style="flex:1; min-width:150px; padding:12px; border:none; border-radius:10px; font-size:15px; font-weight:700; cursor:pointer;">📒 Operațiune normală</button>
      <button type="button" id="tab-amanet" class="tab-btn" onclick="switchTab('amanet')" style="flex:1; min-width:150px; padding:12px; border:none; border-radius:10px; font-size:15px; font-weight:700; cursor:pointer;">💎 AMANET / BANCĂ</button>
      <button type="button" id="tab-incasare" class="tab-btn" onclick="switchTab('incasare')" style="flex:1; min-width:150px; padding:12px; border:none; border-radius:10px; font-size:15px; font-weight:700; cursor:pointer;">💰 ÎNCASARE MAGAZIN</button>
    </div>

    <div class="form-card" id="form-normala">
      <h3>Operațiune nouă</h3>
      <div class="form-row">
        <div class="form-group" style="max-width:160px;">
          <label>Data chitanță</label>
          <input type="date" id="f-data">
        </div>
        <div class="form-group">
          <label>Tip operațiune</label>
          <div style="position:relative;">
            <input type="text" id="f-tip" placeholder="ex: INCASARE" autocomplete="off"
              oninput="showSuggestions('tip', this.value); checkTipDirection();" onfocus="showSuggestions('tip', this.value)">
            <div class="suggestions" id="sug-tip" style="display:none;"></div>
          </div>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Beneficiar</label>
          <div style="position:relative;">
            <input type="text" id="f-beneficiar" placeholder="ex: TOMIS 3" autocomplete="off"
              oninput="showSuggestions('beneficiar', this.value)" onfocus="showSuggestions('beneficiar', this.value)">
            <div class="suggestions" id="sug-beneficiar" style="display:none;"></div>
          </div>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Intrare (RON)</label>
          <input type="number" step="0.01" id="f-intrare" placeholder="0.00">
        </div>
        <div class="form-group">
          <label>Ieșire (RON)</label>
          <input type="number" step="0.01" id="f-iesire" placeholder="0.00">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Observații</label>
          <input type="text" id="f-obs" placeholder="opțional">
        </div>
      </div>
      <button class="btn-submit" onclick="adaugaOperatiune()">Adaugă operațiune</button>
    </div>

    <!-- FORMULAR AMANET / BANCĂ -->
    <div class="form-card" id="form-amanet" style="display:none; border-left:5px solid #7c3aed;">
      <h3 style="color:#7c3aed;">💎 Operațiune AMANET / BANCĂ</h3>
      <div class="form-row">
        <div class="form-group" style="max-width:160px;">
          <label>Data chitanță</label>
          <input type="date" id="fa-data">
        </div>
        <div class="form-group">
          <label>Tip operațiune</label>
          <select id="fa-tip" onchange="onTipAmanetChange()">
            <option value="">— Alege —</option>
            <option value="DP AMANET">DP AMANET — dispoziție plată (INTRARE)</option>
            <option value="DI AMANET">DI AMANET — dispoziție încasare (IEȘIRE)</option>
            <option value="RETRAGERE BANCA">RETRAGERE BANCĂ (INTRARE)</option>
            <option value="DEPUNERE BANCA">DEPUNERE BANCĂ (IEȘIRE)</option>
          </select>
        </div>
      </div>
      <div class="form-row" id="fa-row-firma" style="display:none;">
        <div class="form-group">
          <label>Firma</label>
          <select id="fa-firma">
            <option value="">— Alege firma —</option>
            <option value="ARAFURA">ARAFURA</option>
            <option value="PERFECTA INVEST">PERFECTA INVEST</option>
            <option value="DOMADAMI">DOMADAMI</option>
            <option value="VIENEZ">VIENEZ</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Nr. dispoziție / document</label>
          <input type="text" id="fa-nr" placeholder="ex: DP 1234 / OP 5678" autocomplete="off">
        </div>
        <div class="form-group">
          <label>Beneficiar</label>
          <select id="fa-beneficiar">
            <option value="">— Alege tipul întâi —</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label id="fa-suma-label">Sumă (RON)</label>
          <input type="number" step="0.01" id="fa-suma" placeholder="0.00">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Observații</label>
          <input type="text" id="fa-obs" placeholder="opțional">
        </div>
      </div>
      <div id="fa-preview" style="display:none; padding:10px 14px; border-radius:10px; margin-bottom:10px; font-size:14px; font-weight:600;"></div>
      <button class="btn-submit" onclick="adaugaOperatiuneAmanet()" style="background:#7c3aed;">Adaugă operațiune AMANET/BANCĂ</button>
    </div>

    <!-- FORMULAR ÎNCASARE MAGAZIN -->
    <div class="form-card" id="form-incasare" style="display:none; border-left:5px solid #16a34a;">
      <h3 style="color:#16a34a;">💰 Încasare magazin (cash)</h3>
      <div class="form-row">
        <div class="form-group" style="max-width:160px;">
          <label>Data chitanță</label>
          <input type="date" id="fi-data">
        </div>
        <div class="form-group">
          <label>Magazin</label>
          <select id="fi-magazin">
            <option value="">— Alege magazin —</option>
            <option value="TOMIS 3">TOMIS 3</option>
            <option value="SERVICII">SERVICII</option>
            <option value="BABADAG">BABADAG</option>
            <option value="MEDGIDIA">MEDGIDIA</option>
            <option value="NAVODARI">NAVODARI</option>
            <option value="MARVIMEX">MARVIMEX</option>
            <option value="POARTA 6">POARTA 6</option>
            <option value="KOGALNICEANU">KOGALNICEANU</option>
            <option value="SHOWROOM">SHOWROOM</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group" style="max-width:200px;">
          <label>Nr. chitanță / bon</label>
          <input type="text" id="fi-nr" placeholder="opțional" autocomplete="off">
        </div>
        <div class="form-group">
          <label style="color:#16a34a;">Sumă ÎNCASARE (RON)</label>
          <input type="number" step="0.01" id="fi-suma" placeholder="0.00">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Observații</label>
          <input type="text" id="fi-obs" placeholder="opțional">
        </div>
      </div>
      <div style="padding:10px 14px; border-radius:10px; margin-bottom:10px; font-size:14px; font-weight:600; background:var(--green-light); color:var(--green);">↑ INTRARE în caiet (cash)</div>
      <button class="btn-submit" onclick="adaugaIncasare()" style="background:var(--green);">Adaugă încasare</button>
    </div>
    </div> <!-- /main-left -->

    <!-- RIGHT: Fond Nicu + Alerte -->
    <div class="main-right">
      <div id="fond-display" style="display:none;"></div>
      <div id="alerta-decont" style="display:none;"></div>
    </div>
  </div> <!-- /main-layout -->

  <div class="table-section">
    <div class="search-panel">
      <h3>🔍 Căutare în caiet</h3>

      <div class="search-row">
        <input type="text" id="t-search" placeholder="Caută: beneficiar / observații / nr. dispoziție / tip..." oninput="onSearchInput()">
        <button class="qd-btn" onclick="clearSearch()" style="background:var(--red-light); color:var(--red); border-color:#fecaca;">Șterge filtre</button>
      </div>

      <div class="search-row">
        <div class="quick-dates">
          <button class="qd-btn" data-qd="azi" onclick="setQuickDate('azi')">Azi</button>
          <button class="qd-btn" data-qd="7" onclick="setQuickDate('7')">7 zile</button>
          <button class="qd-btn" data-qd="luna" onclick="setQuickDate('luna')">Luna</button>
          <button class="qd-btn" data-qd="3" onclick="setQuickDate('3')">3 luni</button>
          <button class="qd-btn" data-qd="6" onclick="setQuickDate('6')">6 luni</button>
          <button class="qd-btn" data-qd="12" onclick="setQuickDate('12')">1 an</button>
          <button class="qd-btn" data-qd="tot" onclick="setQuickDate('tot')">Tot</button>
        </div>
      </div>

      <div class="search-row">
        <input type="date" id="t-data-start" onchange="incarcaOperatiuni()">
        <span>→</span>
        <input type="date" id="t-data-end" onchange="incarcaOperatiuni()">
        <select id="t-tip" onchange="renderOperatiuni()"><option value="">Tip: toate</option></select>
        <select id="t-utilizator" onchange="renderOperatiuni()"><option value="">Utilizator: toți</option></select>
        <select id="t-directie" onchange="renderOperatiuni()">
          <option value="">Direcție: toate</option>
          <option value="in">Doar intrări</option>
          <option value="out">Doar ieșiri</option>
        </select>
      </div>
    </div>

    <div id="search-summary" class="search-summary" style="display:none;"></div>
    <div id="tabel-operatiuni"></div>
  </div>
</div>

<script>
const HEADERS = { 'apikey': window.SUPABASE_KEY, 'Authorization': `Bearer ${window.SUPABASE_KEY}` };
const API = window.SUPABASE_URL + '/rest/v1';
let currentUser = null;

// Tipuri si beneficiari cunoscuti (se completeaza din DB)
let tipuriCunoscute = [];
let beneficiariCunoscuti = [];

async function onLoginPin() {
  const pin = document.getElementById('login-pin').value;
  if (pin.length < 4) return;

  try {
    const resp = await fetch(`${API}/caiet_utilizatori?pin=eq.${pin}&activ=eq.true&select=id,nume`, { headers: HEADERS });
    const data = await resp.json();
    if (!Array.isArray(data) || data.length === 0) {
      showToast('PIN incorect');
      document.getElementById('login-pin').value = '';
      return;
    }
    currentUser = data[0];
    // NICU nu are acces la registru - doar la decont
    if (currentUser.nume === 'NICU') {
      document.getElementById('login-pin').value = '';
      document.getElementById('screen-login').innerHTML = `
        <div style="text-align:center; padding:60px 24px;">
          <div style="font-size:120px; line-height:1;">&#9888;</div>
          <div style="font-size:32px; font-weight:800; color:#c0392b; margin-top:20px; letter-spacing:1px;">
            FOLOSEȘTE PAGINA DE DECONT!
          </div>
          <div style="font-size:16px; color:#6b7280; margin-top:16px;">
            Nu ai acces la registrul de casă.
          </div>
        </div>`;
      return;
    }
    document.getElementById('header-user').textContent = currentUser.nume;
    document.getElementById('btn-logout').style.display = '';
    document.getElementById('header-sold').style.display = '';
    document.getElementById('screen-login').style.display = 'none';
    document.getElementById('screen-main').style.display = '';
    document.getElementById('login-pin').value = '';

    // Set default date
    document.getElementById('f-data').value = new Date().toISOString().slice(0, 10);

    // Set filter dates (luna curenta)
    const today = new Date();
    const primaZi = new Date(today.getFullYear(), today.getMonth(), 1);
    document.getElementById('t-data-start').value = primaZi.toISOString().slice(0, 10);
    document.getElementById('t-data-end').value = today.toISOString().slice(0, 10);

    await Promise.all([incarcaSold(), incarcaOperatiuni(), incarcaSugestii(), verificaDeconturi()]);
  } catch (e) {
    showToast('Eroare conexiune');
  }
}

function logout() {
  currentUser = null;
  document.getElementById('screen-login').style.display = '';
  document.getElementById('screen-main').style.display = 'none';
  document.getElementById('btn-logout').style.display = 'none';
  document.getElementById('header-sold').style.display = 'none';
  document.getElementById('header-user').textContent = '';
}

async function incarcaSold() {
  try {
    // Calculeaza sold din toate operatiunile
    let allEntries = [];
    let off = 0;
    while (true) {
      const resp = await fetch(`${API}/caiet?select=intrare,iesire&order=data.asc,created_at.asc&limit=1000&offset=${off}`, { headers: HEADERS });
      const d = await resp.json();
      if (!Array.isArray(d) || d.length === 0) break;
      allEntries.push(...d);
      off += 1000;
      if (d.length < 1000) break;
    }

    let sold = 0;
    for (const d of allEntries) {
      // PENDING si CONFIRMAT nu afecteaza soldul (sunt doar info)
      if (d.tip && (d.tip.includes('PENDING') || d.tip.includes('CONFIRMAT'))) continue;
      sold += parseFloat(d.intrare || 0) - parseFloat(d.iesire || 0);
    }

    const el = document.getElementById('sold-curent');
    el.textContent = sold.toLocaleString('ro-RO', { minimumFractionDigits: 2 }) + ' RON';
    el.className = sold < 0 ? 'value neg' : 'value';
  } catch (e) {}
}

async function incarcaSugestii() {
  try {
    const resp = await fetch(`${API}/caiet?select=tip,beneficiar&limit=5000`, { headers: HEADERS });
    const data = await resp.json();
    if (!Array.isArray(data)) return;
    const tipSet = new Set(), benSet = new Set();
    for (const d of data) {
      if (d.tip) tipSet.add(d.tip.trim().toUpperCase());
      if (d.beneficiar) benSet.add(d.beneficiar.trim().toUpperCase());
    }
    tipuriCunoscute = [...tipSet].sort();
    beneficiariCunoscuti = [...benSet].sort();
  } catch (e) {}
}

function showSuggestions(field, value) {
  const list = field === 'tip' ? tipuriCunoscute : beneficiariCunoscuti;
  const container = document.getElementById(`sug-${field}`);
  const val = value.trim().toUpperCase();

  if (!val) { container.style.display = 'none'; return; }

  const matches = list.filter(item => item.includes(val)).slice(0, 8);
  if (matches.length === 0) { container.style.display = 'none'; return; }

  container.innerHTML = matches.map(m => `<div onclick="selectSuggestion('${field}', '${m.replace(/'/g, "\\'")}')">${m}</div>`).join('');
  container.style.display = '';
}

function selectSuggestion(field, value) {
  document.getElementById(`f-${field}`).value = value;
  document.getElementById(`sug-${field}`).style.display = 'none';
  if (field === 'tip') checkTipDirection();
}

function checkTipDirection() {
  const tip = document.getElementById('f-tip').value.trim().toUpperCase();
  const intrareEl = document.getElementById('f-intrare');
  const iesireEl = document.getElementById('f-iesire');

  // Tipuri care sunt doar INTRARE
  const tipuriIntrare = ['INCASARE', 'RETRAGERE'];
  // Tipuri care sunt doar IESIRE
  const tipuriIesire = ['COMBUSTIBIL', 'DEPUNERE', 'CHIRIE SPATIU', 'UTILITATI', 'ROVINIETA', 'MANCARE', 'TRECERE POD'];

  if (tipuriIntrare.includes(tip)) {
    iesireEl.value = '';
    iesireEl.disabled = true;
    iesireEl.style.opacity = '0.4';
    intrareEl.disabled = false;
    intrareEl.style.opacity = '1';
    intrareEl.focus();
  } else if (tipuriIesire.includes(tip)) {
    intrareEl.value = '';
    intrareEl.disabled = true;
    intrareEl.style.opacity = '0.4';
    iesireEl.disabled = false;
    iesireEl.style.opacity = '1';
    iesireEl.focus();
  } else {
    intrareEl.disabled = false;
    intrareEl.style.opacity = '1';
    iesireEl.disabled = false;
    iesireEl.style.opacity = '1';
  }
}

// Hide suggestions on click outside
document.addEventListener('click', (e) => {
  if (!e.target.closest('.form-group')) {
    document.querySelectorAll('.suggestions').forEach(s => s.style.display = 'none');
  }
});

function switchTab(tab) {
  const tabs = {
    normala: { btn: 'tab-normala', form: 'form-normala' },
    amanet:  { btn: 'tab-amanet',  form: 'form-amanet'  },
    incasare:{ btn: 'tab-incasare',form: 'form-incasare'}
  };
  for (const k of Object.keys(tabs)) {
    const btn = document.getElementById(tabs[k].btn);
    const form = document.getElementById(tabs[k].form);
    if (k === tab) {
      btn.classList.add('tab-active');
      form.style.display = '';
    } else {
      btn.classList.remove('tab-active');
      form.style.display = 'none';
    }
  }
  // Auto-completează data cu azi
  if (tab === 'amanet' && !document.getElementById('fa-data').value) {
    document.getElementById('fa-data').value = new Date().toISOString().slice(0, 10);
  }
  if (tab === 'incasare' && !document.getElementById('fi-data').value) {
    document.getElementById('fi-data').value = new Date().toISOString().slice(0, 10);
  }
}

const AMANETURI = ['BABADAG', 'CUMPANA', 'TOMIS 3', 'KOGALNICEANU', 'MEDGIDIA', 'NAVODARI', 'MARVIMEX', 'POARTA 6', 'LUMINA', 'POPORULUI'];
const BANCI = ['TRANSILVANIA', 'VISTA BANK', 'LIBRA BANK'];

function onTipAmanetChange() {
  const tip = document.getElementById('fa-tip').value;
  const preview = document.getElementById('fa-preview');
  const sumaLabel = document.getElementById('fa-suma-label');
  const benef = document.getElementById('fa-beneficiar');

  const rowFirma = document.getElementById('fa-row-firma');
  const firmaSelect = document.getElementById('fa-firma');

  if (!tip) {
    preview.style.display = 'none';
    sumaLabel.textContent = 'Sumă (RON)';
    benef.innerHTML = '<option value="">— Alege tipul întâi —</option>';
    rowFirma.style.display = 'none';
    return;
  }

  const isIntrare = tip === 'DP AMANET' || tip === 'RETRAGERE BANCA';
  const culoare = isIntrare ? '#16a34a' : '#c0392b';
  const bgCol = isIntrare ? '#dcfce7' : '#fee2e2';
  const textDir = isIntrare ? '↑ INTRARE în caiet' : '↓ IEȘIRE din caiet';

  preview.style.display = '';
  preview.style.background = bgCol;
  preview.style.color = culoare;
  preview.textContent = textDir;

  sumaLabel.textContent = isIntrare ? 'Sumă INTRARE (RON)' : 'Sumă IEȘIRE (RON)';
  sumaLabel.style.color = culoare;

  // Populate beneficiar dropdown based on tip
  const isBanca = tip.includes('BANCA');
  const lista = isBanca ? BANCI : AMANETURI;
  const label = isBanca ? 'bancă' : 'amanet';
  let opts = `<option value="">— Alege ${label} —</option>`;
  for (const name of lista) {
    opts += `<option value="${name}">${name}</option>`;
  }
  benef.innerHTML = opts;

  // Firma selector: doar pentru BANCA; pentru AMANET e fix PERFECTA INVEST
  if (isBanca) {
    rowFirma.style.display = '';
    firmaSelect.value = '';
  } else {
    rowFirma.style.display = 'none';
    firmaSelect.value = 'PERFECTA INVEST';
  }
}

async function adaugaOperatiuneAmanet() {
  const data = document.getElementById('fa-data').value;
  const tip = document.getElementById('fa-tip').value;
  const nrDisp = document.getElementById('fa-nr').value.trim();
  const beneficiar = document.getElementById('fa-beneficiar').value.trim().toUpperCase();
  const firma = document.getElementById('fa-firma').value.trim().toUpperCase();
  const suma = parseFloat(document.getElementById('fa-suma').value) || 0;
  const obs = document.getElementById('fa-obs').value.trim();

  if (!data) { showToast('Selectează data'); return; }
  if (!tip) { showToast('Alege tipul operațiunii'); return; }
  if (!nrDisp) { showToast('Completează nr. dispoziție/document'); return; }
  if (!beneficiar) { showToast('Completează beneficiarul'); return; }
  if (!firma) { showToast('Alege firma'); return; }
  if (suma <= 0) { showToast('Completează suma'); return; }

  const isIntrare = tip === 'DP AMANET' || tip === 'RETRAGERE BANCA';
  const intrare = isIntrare ? suma : 0;
  const iesire = isIntrare ? 0 : suma;

  try {
    const resp = await fetch(`${API}/caiet`, {
      method: 'POST',
      headers: { ...HEADERS, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({
        data, tip, beneficiar, firma,
        intrare, iesire,
        observatii: obs,
        nr_dispozitie: nrDisp,
        utilizator: currentUser.nume,
        completat_la: new Date().toISOString()
      })
    });
    if (resp.ok) {
      showToast('Operațiune AMANET/BANCĂ adăugată!');
      document.getElementById('fa-tip').value = '';
      document.getElementById('fa-nr').value = '';
      document.getElementById('fa-beneficiar').innerHTML = '<option value="">— Alege tipul întâi —</option>';
      document.getElementById('fa-firma').value = '';
      document.getElementById('fa-row-firma').style.display = 'none';
      document.getElementById('fa-suma').value = '';
      document.getElementById('fa-obs').value = '';
      document.getElementById('fa-preview').style.display = 'none';
      document.getElementById('fa-suma-label').textContent = 'Sumă (RON)';
      document.getElementById('fa-suma-label').style.color = '';
      await Promise.all([incarcaSold(), incarcaOperatiuni(), incarcaSugestii()]);
    } else {
      showToast('Eroare la salvare');
    }
  } catch (e) {
    showToast('Eroare: ' + e.message);
  }
}

async function adaugaIncasare() {
  const data = document.getElementById('fi-data').value;
  const magazin = document.getElementById('fi-magazin').value.trim().toUpperCase();
  const nrChit = document.getElementById('fi-nr').value.trim();
  const suma = parseFloat(document.getElementById('fi-suma').value) || 0;
  const obs = document.getElementById('fi-obs').value.trim();

  if (!data) { showToast('Selectează data'); return; }
  if (!magazin) { showToast('Alege magazinul'); return; }
  if (suma <= 0) { showToast('Completează suma'); return; }

  try {
    const resp = await fetch(`${API}/caiet`, {
      method: 'POST',
      headers: { ...HEADERS, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({
        data,
        tip: 'INCASARE',
        beneficiar: magazin,
        intrare: suma,
        iesire: 0,
        observatii: obs,
        nr_dispozitie: nrChit || null,
        utilizator: currentUser.nume,
        completat_la: new Date().toISOString()
      })
    });
    if (resp.ok) {
      showToast(`Încasare ${magazin}: ${suma} RON`);
      document.getElementById('fi-magazin').value = '';
      document.getElementById('fi-nr').value = '';
      document.getElementById('fi-suma').value = '';
      document.getElementById('fi-obs').value = '';
      await Promise.all([incarcaSold(), incarcaOperatiuni(), incarcaSugestii()]);
    } else {
      showToast('Eroare la salvare');
    }
  } catch (e) {
    showToast('Eroare: ' + e.message);
  }
}

async function adaugaOperatiune() {
  const data = document.getElementById('f-data').value;
  const tip = document.getElementById('f-tip').value.trim().toUpperCase();
  const beneficiar = document.getElementById('f-beneficiar').value.trim().toUpperCase();
  const intrare = parseFloat(document.getElementById('f-intrare').value) || 0;
  const iesire = parseFloat(document.getElementById('f-iesire').value) || 0;
  const obs = document.getElementById('f-obs').value.trim();

  if (!data) { showToast('Selectează data'); return; }
  if (!tip) { showToast('Completează tipul operațiunii'); return; }
  if (!beneficiar) { showToast('Completează beneficiarul'); return; }
  if (intrare === 0 && iesire === 0) { showToast('Completează intrare sau ieșire'); return; }

  try {
    const resp = await fetch(`${API}/caiet`, {
      method: 'POST',
      headers: { ...HEADERS, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({
        data, tip, beneficiar,
        intrare: intrare || 0,
        iesire: iesire || 0,
        observatii: obs,
        utilizator: currentUser.nume,
        completat_la: new Date().toISOString()
      })
    });
    if (resp.ok) {
      showToast('Operațiune adăugată!');
      // Reset form (keep date)
      document.getElementById('f-tip').value = '';
      document.getElementById('f-beneficiar').value = '';
      document.getElementById('f-intrare').value = '';
      document.getElementById('f-iesire').value = '';
      document.getElementById('f-obs').value = '';
      // Refresh
      await Promise.all([incarcaSold(), incarcaOperatiuni(), incarcaSugestii()]);
    } else {
      showToast('Eroare la salvare');
    }
  } catch (e) {
    showToast('Eroare: ' + e.message);
  }
}

let allOperatiuni = [];
let searchTimer = null;

function onSearchInput() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(renderOperatiuni, 200);
}

function setQuickDate(kind) {
  const today = new Date();
  const end = today.toISOString().slice(0, 10);
  let start;
  if (kind === 'azi') start = end;
  else if (kind === 'luna') {
    start = new Date(today.getFullYear(), today.getMonth(), 1).toISOString().slice(0, 10);
  } else if (kind === 'tot') {
    start = '';
  } else {
    const days = kind === '7' ? 7 : (parseInt(kind) * 30);
    const d = new Date(today); d.setDate(d.getDate() - days);
    start = d.toISOString().slice(0, 10);
  }
  document.getElementById('t-data-start').value = start;
  document.getElementById('t-data-end').value = kind === 'tot' ? '' : end;
  // Marchează butonul activ
  document.querySelectorAll('.qd-btn[data-qd]').forEach(b => b.classList.remove('active'));
  const active = document.querySelector(`.qd-btn[data-qd="${kind}"]`);
  if (active) active.classList.add('active');
  incarcaOperatiuni();
}

function clearSearch() {
  document.getElementById('t-search').value = '';
  document.getElementById('t-tip').value = '';
  document.getElementById('t-utilizator').value = '';
  document.getElementById('t-directie').value = '';
  document.querySelectorAll('.qd-btn[data-qd]').forEach(b => b.classList.remove('active'));
  setQuickDate('luna');
}

function filtreazaBeneficiar(ben) {
  document.getElementById('t-search').value = ben;
  renderOperatiuni();
  window.scrollTo({ top: document.querySelector('.search-panel').offsetTop - 20, behavior: 'smooth' });
}

async function incarcaOperatiuni() {
  const dataStart = document.getElementById('t-data-start').value;
  const dataEnd = document.getElementById('t-data-end').value;
  const container = document.getElementById('tabel-operatiuni');

  let url = `${API}/caiet?select=*&order=data.desc,completat_la.desc&limit=5000`;
  if (dataStart) url += `&data=gte.${dataStart}`;
  if (dataEnd) url += `&data=lte.${dataEnd}`;

  try {
    const resp = await fetch(url, { headers: HEADERS });
    const data = await resp.json();
    if (!Array.isArray(data)) return;
    allOperatiuni = data;
    populeazaDropdownuri();
    renderOperatiuni();
  } catch (e) {
    container.innerHTML = '<div style="color:var(--red); padding:20px;">Eroare la încărcare</div>';
  }
}

function populeazaDropdownuri() {
  const tipSet = new Set();
  const userSet = new Set();
  for (const d of allOperatiuni) {
    if (d.tip) tipSet.add(d.tip.trim());
    if (d.utilizator) userSet.add(d.utilizator.trim());
  }

  const selTip = document.getElementById('t-tip');
  const selUser = document.getElementById('t-utilizator');
  const curTip = selTip.value;
  const curUser = selUser.value;

  selTip.innerHTML = '<option value="">Tip: toate</option>' +
    [...tipSet].sort().map(t => `<option value="${escHtml(t)}">${escHtml(t)}</option>`).join('');
  selUser.innerHTML = '<option value="">Utilizator: toți</option>' +
    [...userSet].sort().map(u => `<option value="${escHtml(u)}">${escHtml(u)}</option>`).join('');

  if ([...tipSet].includes(curTip)) selTip.value = curTip;
  if ([...userSet].includes(curUser)) selUser.value = curUser;
}

function renderOperatiuni() {
  const container = document.getElementById('tabel-operatiuni');
  const summary = document.getElementById('search-summary');
  const q = document.getElementById('t-search').value.trim().toLowerCase();
  const fTip = document.getElementById('t-tip').value;
  const fUser = document.getElementById('t-utilizator').value;
  const fDir = document.getElementById('t-directie').value;

  let data = allOperatiuni;

  if (q) {
    data = data.filter(d => {
      const hay = [d.beneficiar, d.observatii, d.nr_dispozitie, d.tip, d.firma]
        .filter(Boolean).join(' ').toLowerCase();
      return hay.includes(q);
    });
  }
  if (fTip) data = data.filter(d => (d.tip || '').trim() === fTip);
  if (fUser) data = data.filter(d => (d.utilizator || '').trim() === fUser);
  if (fDir === 'in') data = data.filter(d => parseFloat(d.intrare || 0) > 0);
  if (fDir === 'out') data = data.filter(d => parseFloat(d.iesire || 0) > 0);

  // Sumar
  let totalIn = 0, totalOut = 0;
  for (const d of data) {
    totalIn += parseFloat(d.intrare || 0);
    totalOut += parseFloat(d.iesire || 0);
  }
  const net = totalIn - totalOut;
  const fmt = n => n.toLocaleString('ro-RO', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

  if (data.length > 0) {
    const ultima = data[0];
    const prima = data[data.length - 1];
    summary.innerHTML = `
      <div class="ss-item"><span class="ss-label">Operațiuni</span><span class="ss-value">${data.length}</span></div>
      <div class="ss-divider"></div>
      <div class="ss-item"><span class="ss-label">Intrări</span><span class="ss-value green">${fmt(totalIn)}</span></div>
      <div class="ss-item"><span class="ss-label">Ieșiri</span><span class="ss-value red">${fmt(totalOut)}</span></div>
      <div class="ss-item"><span class="ss-label">Net</span><span class="ss-value" style="color:${net>=0?'var(--green)':'var(--red)'};">${net>=0?'+':''}${fmt(net)}</span></div>
      <div class="ss-divider"></div>
      <div class="ss-item"><span class="ss-label">Ultima</span><span class="ss-value" style="font-size:12px; font-weight:600;">${new Date(ultima.data).toLocaleDateString('ro-RO')}</span></div>
      <div class="ss-item"><span class="ss-label">Prima</span><span class="ss-value" style="font-size:12px; font-weight:600;">${new Date(prima.data).toLocaleDateString('ro-RO')}</span></div>
    `;
    summary.style.display = '';
  } else {
    summary.style.display = 'none';
  }

  if (data.length === 0) {
    container.innerHTML = `<div style="text-align:center; padding:40px; color:var(--sub);">${q || fTip || fUser || fDir ? 'Nicio operațiune nu corespunde filtrelor' : 'Nicio operațiune în perioada selectată'}</div>`;
    return;
  }

  let html = `<table>
    <thead><tr>
      <th>Completat</th><th>Data chitanță</th><th>Tip</th><th>Beneficiar</th>
      <th>Intrare</th><th>Ieșire</th>
      <th style="padding-left:40px;">Observații</th><th>Completat de:</th><th></th>
    </tr></thead><tbody>`;

  for (const d of data) {
    const dtChitanta = new Date(d.data).toLocaleDateString('ro-RO', { day: '2-digit', month: '2-digit', year: 'numeric' });
    const dtCompletat = new Date(d.completat_la || d.created_at).toLocaleString('ro-RO', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
    const intrareStr = d.intrare > 0 ? parseFloat(d.intrare).toLocaleString('ro-RO', { minimumFractionDigits: 2 }) : '';
    const iesireStr = d.iesire > 0 ? parseFloat(d.iesire).toLocaleString('ro-RO', { minimumFractionDigits: 2 }) : '';
    const firmaChip = d.firma ? `<strong style="color:#0891b2; background:#cffafe; padding:2px 6px; border-radius:4px; font-size:11px;">${escHtml(d.firma)}</strong> ` : '';
    const nrChip = d.nr_dispozitie ? `<strong style="color:#7c3aed;">[${d.nr_dispozitie}]</strong> ` : '';
    const obsFinal = (firmaChip + nrChip + escHtml(d.observatii || '')).trim() || '';
    const isAdmin = currentUser && currentUser.nume === 'EUGEN';
    const isPending = d.tip && d.tip.includes('PENDING');
    const isConfirmat = d.tip && d.tip.includes('CONFIRMAT');
    const rowStyle = isPending ? 'opacity:0.45; background:#fffef0;' : (isConfirmat ? 'opacity:0.7; background:#f0fdf4;' : '');
    const benEsc = escHtml(d.beneficiar || '').replace(/'/g, "\\'");
    html += `<tr id="row-${d.id}" style="${rowStyle}">
      <td style="white-space:nowrap; font-size:12px; color:#555; text-align:center;">${dtCompletat}</td>
      <td style="font-weight:600; white-space:nowrap; text-align:center;">${dtChitanta}</td>
      <td style="text-align:center;"><span style="background:#e8f0fe; color:#1a56a8; padding:3px 10px; border-radius:6px; font-size:12px; font-weight:700;">${escHtml(d.tip)}</span></td>
      <td style="font-weight:500; text-align:center;"><span class="clickable-ben" onclick="filtreazaBeneficiar('${benEsc}')" title="Click: filtrează după acest beneficiar">${escHtml(d.beneficiar)}</span></td>
      <td class="td-center">${intrareStr ? `<span class="intrare">${intrareStr}</span>` : ''}</td>
      <td class="td-center">${iesireStr ? `<span class="iesire">${iesireStr}</span>` : ''}</td>
      <td style="color:#888; font-size:12px; max-width:260px; padding-left:40px; text-align:center;">${obsFinal}</td>
      <td style="font-size:11px; color:#aaa; text-align:center;">${d.utilizator}</td>
      <td style="white-space:nowrap; text-align:center;">${isAdmin ? `<button class="btn-edit" onclick="editOperatiune(${d.id})" title="Editează">✎</button><button class="btn-del" onclick="stergeOperatiune(${d.id})" title="Șterge">✕</button>` : ''}</td>
    </tr>`;
  }

  html += '</tbody></table>';
  container.innerHTML = html;
}

async function verificaDeconturi() {
  const fondDisplay = document.getElementById('fond-display');
  const container = document.getElementById('alerta-decont');

  try {
    // Afiseaza fondurile
    const respFonduri = await fetch(`${API}/fonduri?select=*`, { headers: HEADERS });
    const fonduri = await respFonduri.json();

    if (Array.isArray(fonduri) && fonduri.length > 0) {
      let fondHtml = '';
      for (const f of fonduri) {
        fondHtml += `<div class="fond-display-box">
          <div class="fond-header">
            <div>
              <div class="fond-info">FOND ${f.utilizator}</div>
              <div class="fond-suma">${parseFloat(f.suma).toLocaleString('ro-RO', {minimumFractionDigits:2})} RON</div>
            </div>
          </div>
          ${currentUser && currentUser.nume === 'EUGEN' ? `
            <div style="display:flex; gap:6px; align-items:center;">
              <input type="number" step="0.01" value="${f.suma}" id="fond-edit-${f.id}" style="flex:1; padding:8px; border:1px solid var(--border); border-radius:6px; text-align:right; font-size:13px;">
              <button class="btn-edit-fond" onclick="editFond(${f.id})">Salvează</button>
            </div>
          ` : ''}
        </div>`;
      }
      fondDisplay.innerHTML = fondHtml;
      fondDisplay.style.display = '';
    } else {
      fondDisplay.style.display = 'none';
    }

    // Verifica deconturi trimise (asteapta confirmare)
    const resp = await fetch(`${API}/deconturi?select=*&status=eq.trimis&confirmat=not.eq.true&returnat=not.eq.true&order=utilizator,data.asc`, { headers: HEADERS });
    const data = await resp.json();

    if (!Array.isArray(data) || data.length === 0) {
      container.style.display = 'none';
      return;
    }

    // Grupeaza pe utilizator
    const perUser = {};
    for (const d of data) {
      if (!perUser[d.utilizator]) perUser[d.utilizator] = { items: [], total: 0 };
      const s = parseFloat(d.suma || 0);
      perUser[d.utilizator].items.push(d);
      perUser[d.utilizator].total += s;
    }

    let html = '';
    for (const [user, val] of Object.entries(perUser)) {
      html += `<div class="alerta-decont-box">
        <div style="display:flex; align-items:center; gap:12px;">
          <div class="alerta-icon">📋</div>
          <div class="alerta-text">
            <div class="alerta-nume">Decont ${user}</div>
            <div class="alerta-suma">${val.total.toLocaleString('ro-RO', {minimumFractionDigits:2})} RON</div>
            <div style="font-size:11px; color:var(--sub); margin-top:2px;">${val.items.length} cheltuieli — așteaptă verificare</div>
          </div>
        </div>
        <div style="display:flex; gap:8px;">
          <button class="btn-deconteaza" onclick="confirmaDecont('${user}', ${val.total.toFixed(2)})" style="flex:1;">Confirmă</button>
          <button style="flex:1; padding:10px 14px; font-size:13px; font-weight:700; background:var(--red); color:white; border:none; border-radius:8px; cursor:pointer;" onclick="returneazaDecont('${user}')">Returnează</button>
        </div>
        <table style="margin-top:12px; box-shadow:none;">
          <thead><tr><th>Data</th><th>Beneficiar</th><th class="num">Suma</th><th>Obs</th></tr></thead>
          <tbody>`;
      for (const d of val.items) {
        const dt = new Date(d.data).toLocaleDateString('ro-RO', {day:'2-digit', month:'2-digit'});
        const s = parseFloat(d.suma);
        html += `<tr>
          <td>${dt}</td><td>${escHtml(d.beneficiar)}</td>
          <td class="num" style="color:${s<0?'var(--green)':'var(--red)'}; font-weight:700;">${s<0?'+':''}${Math.abs(s).toLocaleString('ro-RO',{minimumFractionDigits:2})}</td>
          <td style="font-size:12px; color:#888;">${escHtml(d.observatii||'')}</td>
        </tr>`;
      }
      html += `</tbody></table></div>`;
    }

    container.innerHTML = html;
    container.style.display = '';
  } catch(e) {
    container.style.display = 'none';
  }
}

async function editFond(id) {
  const suma = parseFloat(document.getElementById(`fond-edit-${id}`).value) || 0;
  try {
    await fetch(`${API}/fonduri?id=eq.${id}`, {
      method: 'PATCH',
      headers: { ...HEADERS, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ suma, updated_at: new Date().toISOString() })
    });
    showToast('Fond actualizat!');
    await verificaDeconturi();
  } catch(e) { showToast('Eroare'); }
}

async function confirmaDecont(utilizator, suma) {
  if (!confirm(`Confirmi decontul de ${suma.toLocaleString('ro-RO',{minimumFractionDigits:2})} RON pentru ${utilizator}?\n\nCheltuielile vor intra în sold.`)) return;

  try {
    // 1. Marcheaza cheltuielile ca confirmate
    await fetch(`${API}/deconturi?utilizator=eq.${encodeURIComponent(utilizator)}&status=eq.trimis&confirmat=eq.false`, {
      method: 'PATCH',
      headers: { ...HEADERS, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ confirmat: true, status: 'confirmat', confirmat_de: currentUser.nume })
    });

    // 2. Cheltuielile raman ca INFO in caiet (nu afecteaza soldul)
    // Doar marcam PENDING ca CONFIRMAT (tot fara sold)
    const respPending = await fetch(`${API}/caiet?select=id,tip&tip=like.DECONT ${encodeURIComponent(utilizator)}*PENDING*`, { headers: HEADERS });
    const pending = await respPending.json();
    if (Array.isArray(pending)) {
      for (const p of pending) {
        const newTip = p.tip.replace('(PENDING)', '(CONFIRMAT)');
        await fetch(`${API}/caiet?id=eq.${p.id}`, {
          method: 'PATCH',
          headers: { ...HEADERS, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
          body: JSON.stringify({ tip: newTip })
        });
      }
    }

    // 3. Adauga reincarcare fond (doar asta afecteaza soldul)
    const today = new Date().toISOString().slice(0, 10);
    await fetch(`${API}/caiet`, {
      method: 'POST',
      headers: { ...HEADERS, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({
        data: today, tip: 'DECONT', beneficiar: utilizator,
        intrare: 0, iesire: suma,
        observatii: 'REÎNCĂRCARE FOND DECONT',
        utilizator: currentUser.nume
      })
    });

    showToast(`Decont confirmat! ${utilizator} primește ${suma.toFixed(2)} RON`);
    await Promise.all([incarcaSold(), incarcaOperatiuni(), verificaDeconturi()]);
  } catch(e) { showToast('Eroare: ' + e.message); }
}

async function returneazaDecont(utilizator) {
  const motiv = prompt(`De ce returnezi decontul lui ${utilizator}?`);
  if (motiv === null) return;

  try {
    // 1. Marcheaza ca returnat
    await fetch(`${API}/deconturi?utilizator=eq.${encodeURIComponent(utilizator)}&status=eq.trimis&confirmat=eq.false`, {
      method: 'PATCH',
      headers: { ...HEADERS, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ returnat: true, status: 'returnat', motiv_retur: motiv || 'Verifică și retrimite' })
    });

    // 2. Sterge PENDING din caiet
    await fetch(`${API}/caiet?tip=like.DECONT ${encodeURIComponent(utilizator)}*PENDING*`, {
      method: 'DELETE', headers: HEADERS
    });

    showToast(`Decont returnat către ${utilizator}`);
    await Promise.all([incarcaSold(), incarcaOperatiuni(), verificaDeconturi()]);
  } catch(e) { showToast('Eroare: ' + e.message); }
}

let editData = {};

async function editOperatiune(id) {
  // Fetch original data
  try {
    const resp = await fetch(`${API}/caiet?id=eq.${id}&select=*`, { headers: HEADERS });
    const data = await resp.json();
    if (!Array.isArray(data) || data.length === 0) return;
    const d = data[0];
    editData = d;

    const row = document.getElementById(`row-${id}`);
    row.className = 'edit-row';
    row.innerHTML = `
      <td colspan="2"><input type="date" id="edit-data" value="${d.data}"></td>
      <td><input type="text" id="edit-tip" value="${escHtml(d.tip)}"></td>
      <td><input type="text" id="edit-beneficiar" value="${escHtml(d.beneficiar)}"></td>
      <td><input type="number" step="0.01" id="edit-intrare" value="${d.intrare || ''}" placeholder="0"></td>
      <td><input type="number" step="0.01" id="edit-iesire" value="${d.iesire || ''}" placeholder="0"></td>
      <td><input type="text" id="edit-obs" value="${escHtml(d.observatii || '')}"></td>
      <td></td>
      <td style="white-space:nowrap;">
        <button class="btn-save-edit" onclick="salveazaEdit(${id})">Salvează</button>
        <button class="btn-cancel-edit" onclick="incarcaOperatiuni()">Anulează</button>
      </td>`;
  } catch(e) {
    showToast('Eroare');
  }
}

async function salveazaEdit(id) {
  const data = document.getElementById('edit-data').value;
  const tip = document.getElementById('edit-tip').value.trim().toUpperCase();
  const beneficiar = document.getElementById('edit-beneficiar').value.trim().toUpperCase();
  const intrare = parseFloat(document.getElementById('edit-intrare').value) || 0;
  const iesire = parseFloat(document.getElementById('edit-iesire').value) || 0;
  const obs = document.getElementById('edit-obs').value.trim();

  if (!data || !tip || !beneficiar) { showToast('Completează câmpurile obligatorii'); return; }

  try {
    const resp = await fetch(`${API}/caiet?id=eq.${id}`, {
      method: 'PATCH',
      headers: { ...HEADERS, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ data, tip, beneficiar, intrare, iesire, observatii: obs })
    });
    if (resp.ok) {
      showToast('Modificare salvată!');
      await Promise.all([incarcaSold(), incarcaOperatiuni()]);
    } else {
      showToast('Eroare la salvare');
    }
  } catch(e) {
    showToast('Eroare: ' + e.message);
  }
}

async function stergeOperatiune(id) {
  if (!confirm('Sigur vrei să ștergi această operațiune?')) return;
  try {
    await fetch(`${API}/caiet?id=eq.${id}`, { method: 'DELETE', headers: HEADERS });
    await Promise.all([incarcaSold(), incarcaOperatiuni()]);
    showToast('Operațiune ștearsă');
  } catch (e) {
    showToast('Eroare');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function escHtml(str) {
  return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
