<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Device ID ARAFURA</title>
<style>
body { font-family: system-ui; background: #0f172a; color: white; padding: 40px 20px; min-height: 100vh; margin: 0; }
.box { max-width: 500px; margin: 0 auto; background: #1e293b; padding: 30px; border-radius: 12px; }
h1 { margin: 0 0 20px; font-size: 20px; }
.field { background: #0f172a; padding: 16px; border-radius: 8px; margin: 14px 0; border: 1px solid #334155; }
.label { color: #94a3b8; font-size: 12px; text-transform: uppercase; margin-bottom: 6px; }
.value { font-size: 18px; font-weight: 700; font-family: monospace; color: #60a5fa; word-break: break-all; user-select: all; }
.copy-btn { background: #2563eb; color: white; border: 0; padding: 10px 18px; border-radius: 6px; font-size: 15px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 8px; }
.copy-btn:active { background: #1e40af; }
.toast { background: #16a34a; color: white; padding: 10px; border-radius: 6px; margin-top: 10px; display: none; text-align: center; }
</style>
</head>
<body>
<div class="box">
  <h1>🔑 Informații dispozitiv</h1>
  <div class="field">
    <div class="label">Device ID</div>
    <div class="value" id="did">—</div>
    <button class="copy-btn" onclick="copy('did','did')">📋 Copiază Device ID</button>
  </div>
  <div class="field">
    <div class="label">Magazin instalat</div>
    <div class="value" id="mag">—</div>
  </div>
  <div class="field">
    <div class="label">Admin</div>
    <div class="value" id="adm">—</div>
  </div>
  <div class="toast" id="toast">✅ Copiat în clipboard!</div>
  <div style="margin-top:20px; font-size:13px; color:#94a3b8; text-align:center;">
    Trimite Device ID-ul lui Eugen pentru activare
  </div>
</div>
<script>
document.getElementById('did').textContent = localStorage.getItem('arafura_device_id') || '(nu există — deschide app-ul întâi)';
document.getElementById('mag').textContent = localStorage.getItem('arafura_magazin') || '(nesetat)';
document.getElementById('adm').textContent = localStorage.getItem('arafura_admin') === 'true' ? 'DA' : 'nu';
function copy(srcId, label) {
  const txt = document.getElementById(srcId).textContent;
  navigator.clipboard.writeText(txt).then(() => {
    const t = document.getElementById('toast');
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2000);
  });
}
</script>
</body>
</html>
